name: giskard

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  zeroth:
    name: zeroth@all
    runs-on: ubuntu-latest

    steps:
      - name: Checkout zeroth
        uses: actions/checkout@v4

      - name: zeroth@all
        uses: Malstrom/giskard@main
        with:
          repo: .
          mode: zeroth
          github-token: ${{ secrets.GITHUB_TOKEN }}
