name: Calvin engine

on:
  workflow_call:
    inputs:
      issue_number:
        required: true
        type: number
      target_repo:
        required: true
        type: string
      aider_mode:
        required: false
        type: boolean
        default: false
    secrets:
      SYNCA_TOKEN:
        required: true
      MISTRAL_API_KEY:
        required: false

jobs:
  calvin:
    runs-on: ubuntu-latest
    steps:
      # 1. Clona zeroth per avere calvin.rb e lib/
      - name: Checkout zeroth (scripts)
        uses: actions/checkout@v4
        with:
          repository: Malstrom/zeroth
          path: zeroth

      # 2. Clona il repo target
      - name: Checkout target repo
        uses: actions/checkout@v4
        with:
          repository: ${{ inputs.target_repo }}
          token: ${{ secrets.SYNCA_TOKEN }}
          path: target

      # 3. Git identity (necessaria per i commit di Aider)
      - name: Configure git identity
        run: |
          git config --global user.email "calvin@synca.app"
          git config --global user.name "Calvin"

      # 4. Ruby per calvin.rb (scripts zeroth)
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'

      - name: Install Ruby dependencies (zeroth scripts)
        run: bundle install
        working-directory: zeroth/frameworks/calvin/scripts

      # 5. Python + Aider (solo modalità aider)
      - name: Install Aider
        if: ${{ inputs.aider_mode }}
        run: pip install --quiet aider-chat

      # 6. Bundle install nel repo target (necessario per rails test)
      - name: Bundle install (target repo)
        if: ${{ inputs.aider_mode }}
        run: bundle install
        working-directory: target/backend/api

      # 7. Setup PostgreSQL per i test
      - name: Start PostgreSQL
        if: ${{ inputs.aider_mode }}
        uses: ikalnytskyi/action-setup-postgres@v6
        with:
          username: postgres
          password: postgres
          database: synca_test

      # 8. Crea il database di test
      - name: Setup test database
        if: ${{ inputs.aider_mode }}
        run: bundle exec rails db:schema:load
        working-directory: target/backend/api
        env:
          RAILS_ENV: test
          DATABASE_URL: postgres://postgres:postgres@localhost/synca_test
          SECRET_KEY_BASE: a_dummy_secret_for_ci_at_least_64_chars_long_so_hmac_is_happy_1234

      # 9. Esegue Calvin
      - name: Run Calvin
        run: bundle exec ruby $GITHUB_WORKSPACE/zeroth/frameworks/calvin/scripts/calvin.rb
        working-directory: target
        env:
          BUNDLE_GEMFILE: ${{ github.workspace }}/zeroth/frameworks/calvin/scripts/Gemfile
          ISSUE_NUMBER: ${{ inputs.issue_number }}
          GITHUB_REPOSITORY: ${{ inputs.target_repo }}
          GITHUB_TOKEN: ${{ secrets.SYNCA_TOKEN }}
          MISTRAL_API_KEY: ${{ secrets.MISTRAL_API_KEY }}
          CALVIN_MODEL: ${{ inputs.aider_mode && 'codestral-latest' || 'mistral-medium-3' }}
          DATABASE_URL: postgres://postgres:postgres@localhost/synca_test
          RAILS_ENV: test
          SECRET_KEY_BASE: a_dummy_secret_for_ci_at_least_64_chars_long_so_hmac_is_happy_1234
