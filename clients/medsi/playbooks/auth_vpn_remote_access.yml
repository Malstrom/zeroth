steps:
  - "VPS giskard su Timeweb (account vx380398 / igormir87@gmail.com), ID 8608137, IP 103.88.242.246, Ubuntu 22.04, 1vCPU 1GB RAM. Saldo da ricaricare prima del 14 ago 2026."
  - "WireGuard installato. Server pubkey: 4fxmYwITn6/Et2lTVlstbZHK9vfHLh8SC+E3V8RAzSc=. Client pubkey: YMynV9C+EdLFcWyRocQRjkTf4j/dua22hoZYZtgNszg=. Chiavi private in /etc/wireguard/ sul server — non condividere mai."
  - "Config server /etc/wireguard/wg0.conf: Address=10.0.0.1/24, ListenPort=51820, masquerade iptables su eth0. Peer = client pubkey, AllowedIPs=10.0.0.2/32."
  - "Config client Mac tunnel 'giskard': Address=10.0.0.2/24, DNS=1.1.1.1, Endpoint=103.88.242.246:51820, AllowedIPs=0.0.0.0/0, PersistentKeepalive=25. SSH shortcut: Host giskard / HostName 103.88.242.246 / User root."
  - "Test superato: curl https://ipinfo.io/ip → 103.88.242.246."
  - "VPN aziendale: GlobalProtect (Palo Alto). Ricevere portal address da IT Medsi. HIP check: assicurarsi FileVault e Firewall Mac attivi prima del primo login."
  - "Verificare split tunnel dopo primo login: route -n get default. Gateway 10.x.x.x = no split tunnel → dig +short <portal-medsi> per IP gateway → AllowedIPs=<IP_gateway>/32 nel tunnel giskard."
  - "Checklist Mac pre-connessione dall'estero: WireGuard attivo, timezone sudo systemsetup -settimezone 'Europe/Moscow', Location Services off per app VDI, WiFi spento, lingua/locale OS impostato su Russia se VDI fa check aggressivi."
  - "Comunicare 103.88.242.246 all'IT Medsi per whitelist se richiesto. Testare in ordine: Jira → GitLab → VDI."
  - "Aggiungere peer iPhone: generare nuova coppia di chiavi sul server, aggiungere [Peer] in wg0.conf, importare config su iPhone via QR code dall'app WireGuard."
  - "Dopo primo accesso GP: valutare split routing definitivo — netstat -rn con GP attivo per mappare route aziendali → AllowedIPs = solo range Medsi invece di 0.0.0.0/0."
  - "Fallback se UDP 51820 bloccato dall'ISP: installare udp2raw sul VPS oppure riconfigurare WireGuard su OpenVPN TCP/443."
  - "Monitoring: UptimeRobot su 103.88.242.246. Ricaricare saldo Timeweb prima del 14 agosto 2026."

notes: >
