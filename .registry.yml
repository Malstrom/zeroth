# .registry.yml
# Cross-repo connection map for zeroth.
# Read-only for the AI. Managed manually or via PR.

framework: zeroth
version: 0.2.0
description: spec and foundational rules for all Malstrom frameworks

connections:
  - repo: Malstrom/giskard
    role: validation tool — enforces zeroth checklists on all framework repos
    sync_trigger:
      - rule-updated
      - framework-added
    access: read-write
    note: |
      When a checklist in zeroth changes, giskard.py may need updating.
      When a new framework is added, add it to ZEROTH_CHECKLISTS in giskard.py.

  - repo: Malstrom/dojo
    role: dojo instance — spawned 2026-06-15
    framework: dojo
    sync_trigger:
      - rule-updated
    access: read-write
    note: |
      Onboarding pending — student_name and language not yet filled.

  - repo: Malstrom/dojo-demo
    role: dojo instance — spawned 2026-06-21
    framework: dojo
    sync_trigger:
      - rule-updated
    access: read-write
    note: |
      Demo instance. Onboarding pending — student_name and language not yet filled.

  - repo: Malstrom/dojo-framework
    role: dojo instance — spawned 2026-06-21
    framework: dojo
    sync_trigger:
      - rule-updated
    access: read-write
    note: |
      Onboarding pending — student_name and language not yet filled.

  - repo: Malstrom/tensho
    role: registered framework
    sync_trigger:
      - rule-updated
    access: read-write

  - repo: Malstrom/sudo-hire-me
    role: sudo-hire-me instance
    framework: sudo-hire-me
    sync_trigger:
      - rule-updated
    access: read-write
    note: |
      Framework scaffold created 2026-06-17.
      Instance .agent.yml and .scenarios.yml to be aligned in a follow-up issue.

  - repo: Malstrom/daneel
    role: daneel instance — spawned 2026-07-14
    framework: daneel
    sync_trigger:
      - rule-updated
    access: read-write
    note: |
      Instance spawned via zeroth#352.
      Onboarding pending — no clients yet.
