# zeroth — laws
# Source of truth for all rules in the Malstrom ecosystem.
# L1: universal laws — apply to every repo, framework, session, user.
# L2: operative rules — derive from L1, cover specific categories.
# L3: framework rules — live in frameworks/{name}/structure.yml
#     L3 examples: folder structure, file schemas, scenarios, immutable file list.
#
# Hierarchy: L1 > L2 > L3. More specific rule prevails at equal level.
# Status: DRAFT — open for refinement (issue #59)

# ---------------------------------------------------------------------------
# L1 — UNIVERSAL LAWS
# Axioms. No how/fail. Everything derives from them.
# Also hardcoded in Space instructions for users who cannot access this file.
# ---------------------------------------------------------------------------

L1:

  - id: L1-1
    name: repo_is_for_ai
    law: >
      The repo is the AI's mind. The human uses chat — not GitHub.
      The AI acts on GitHub without interruptions or mid-execution approval requests.
      Doubts are resolved in chat BEFORE starting, never during execution.
      The repo is not documentation — it is executable code for the AI.

  - id: L1-2
    name: immutability
    law: >
      What has happened cannot be deleted. Immutable files are never overwritten.
      Corrections are appended only — never overwrite.

  - id: L1-3
    name: single_source_of_truth
    law: >
      Every piece of information exists in exactly one place. No duplication.
      If two files conflict, the more specific one prevails.
      The Space holds L1+L2 as a runtime cache — zeroth is the authoritative source.

  - id: L1-4
    name: explicit_over_implicit
    law: >
      No assumptions. Every rule, step, and enum value is declared explicitly.
      Vague does not exist. If it is not written, it does not apply.

  - id: L1-5
    name: zeroth_first
    law: >
      In case of conflict: L1 > L2 > L3.
      zeroth prevails over everything.
      At equal level, the more specific rule prevails.

# ---------------------------------------------------------------------------
# L2 — OPERATIVE RULES
# Derive from L1. Each has: derives_from, rule, how, fail.
# Also hardcoded in Space instructions + given during onboarding.
# ---------------------------------------------------------------------------

L2:

  # --- FILE AND STRUCTURE (derives from L1-1) ---

  - id: L2-1
    name: yml_for_machine_md_for_human
    derives_from: L1-1
    source: rules/structure.yml
    rule: >
      Files read by the AI must be .yml.
      Files read by humans must be .md.
      No mixed formats. No markdown frontmatter.
    exceptions: [README.md, LICENSE]
    how:
      - list all non-hidden files in the repo
      - for each file read by the AI in any scenario: assert extension is .yml
      - files in output/ or named summary.md: .md is correct
      - any other .md not in output/ is a violation
    fail: list violating files with path and the scenario that reads them

  - id: L2-2
    name: single_file_single_responsibility
    derives_from: L1-1
    source: rules/structure.yml
    rule: Every file has one responsibility. No monoliths.
    how: verify no file contains sections from different domains
    fail: suggest split with proposed file names

  - id: L2-3
    name: max_400_lines
    derives_from: L1-1
    source: rules/structure.yml
    rule: No file exceeds 400 lines. If exceeded, split is mandatory.
    how: count lines in every .yml file
    fail: list files over limit with line count

  - id: L2-4
    name: folders_group_by_function
    derives_from: L1-1
    source: rules/structure.yml
    rule: Folders group by function, not by file type.
    how: verify folders with mixed .yml and .md have a single declared function
    fail: flag folders with mixed functions

  # --- IMMUTABILITY (derives from L1-2) ---

  - id: L2-5
    name: append_only_immutable_files
    derives_from: L1-2
    source: rules/log.yml
    rule: >
      Files declared immutable in .agent.yml are never overwritten. Append only.
      The name of the folder or file does not matter — immutability is declared
      explicitly in .agent.yml, not inferred from the file name.
    how: verify no scenario uses write/update on files declared immutable in .agent.yml
    fail: block operation immediately, notify Igor in chat

  - id: L2-6
    name: write_ahead_log
    derives_from: L1-2
    source: rules/log.yml
    rule: Immutable records are written BEFORE the AI responds. Never after.
    how: verify step order in every scenario containing a write to an immutable file — write step must precede response
    fail: reorder steps, write must precede response

  - id: L2-7
    name: immutable_files_declared
    derives_from: L1-2
    source: rules/log.yml
    rule: Every immutable file is explicitly declared in .agent.yml file_access.
    how: for every append-only file in the repo, find its declaration in .agent.yml
    fail: list undeclared immutable files

  # --- SINGLE SOURCE OF TRUTH (derives from L1-3) ---

  - id: L2-8
    name: no_duplication
    derives_from: L1-3
    source: rules/structure.yml
    rule: No information is duplicated across files. One file references the other.
    how: AI-assisted manual audit on request
    fail: flag duplications with merge proposal

  - id: L2-9
    name: profile_is_single_source
    derives_from: L1-3
    rule: >
      The profile file (.gakusei.yml, .aurora.yml, etc.) is the only source of truth
      for user state. No copies exist elsewhere.
    how: verify no other file contains state fields already present in the profile
    fail: remove duplication, update only the profile

  - id: L2-10
    name: index_links_to_source
    derives_from: L1-3
    rule: >
      Index files contain references to source files, not copies of their content.
      An index is a map, not an aggregate.
    how: verify every index file contains file references, not duplicated content fields
    fail: remove duplicated content, replace with file reference

  - id: L2-11
    name: space_is_cache_not_source
    derives_from: L1-3
    rule: >
      The Space instructions (L1+L2 hardcoded) are a runtime cache.
      zeroth rules/laws.yml is the authoritative source.
      If Space and zeroth conflict, zeroth prevails.
    how: on conflict detection, read zeroth rules/laws.yml and apply it
    fail: update Space instructions to match zeroth

  # --- EXPLICIT OVER IMPLICIT (derives from L1-4) ---

  - id: L2-12
    name: explicit_enum_values
    derives_from: L1-4
    rule: Every field with a fixed set of values has its enum declared in the template.
    how: verify templates have enums declared for every fixed-value field
    fail: add missing enums to the template

  - id: L2-13
    name: snake_case_files_and_folders
    derives_from: L1-4
    source: rules/naming.yml
    rule: >
      All file and folder names use snake_case (lowercase, underscore separator).
      No kebab-case, no camelCase, no spaces.
      Exception: repository names follow their own naming rule (see rules/naming.yml).
    exceptions: [repo names]
    how: regex check on all file and folder names — pattern ^[a-z0-9]+(_[a-z0-9]+)*(\.\w+)?$
    fail: list violations with correct snake_case name

  - id: L2-14
    name: template_before_generate
    derives_from: L1-4
    source: rules/structure.yml
    rule: The AI reads the template BEFORE generating any file. No deviation from template structure.
    how: verify every scenario with file generation has step "read template" before generate
    fail: add missing step

  - id: L2-15
    name: scenarios_no_vague_steps
    derives_from: L1-4
    source: rules/scenarios.yml
    rule: >
      Every step in a scenario is an atomic verifiable action.
      Forbidden: 'consider', 'evaluate', 'do what seems right', 'handle appropriately'.
    how: analyze text of every step in .scenarios.yml for vague language
    fail: list vague steps with proposed atomic rewrite

  - id: L2-16
    name: english_for_ai_files
    derives_from: L1-4
    source: rules/naming.yml
    rule: All files read by the AI are written in English. Human-facing files may use any language.
    how: verify language of content in .yml files declared in repo_map
    fail: list non-English AI files

  - id: L2-17
    name: evocative_not_descriptive
    derives_from: L1-4
    source: rules/naming.yml
    rule: Repo and folder names are evocative, not descriptive. Max 2 words.
    how: verify length and style of names
    fail: suggest evocative alternative

  # --- HIERARCHY AND CONFLICT RESOLUTION (derives from L1-5) ---

  - id: L2-18
    name: zeroth_agent_read_only
    derives_from: L1-5
    source: .agent.yml
    rule: zeroth .agent.yml is read-only for the AI. Never modified directly. All changes via PR.
    how: verify no scenario uses write on .agent.yml
    fail: block operation immediately

  - id: L2-19
    name: l3_cannot_override_l2
    derives_from: L1-5
    rule: >
      A framework's L3 rules (structure.yml, scenarios) cannot contradict L2.
      L3 can restrict or extend L2 within its scope, never override it.
    how: during framework validation, check every L3 rule against L2 for contradictions
    fail: list contradictions with the L2 rule being violated

  - id: L2-20
    name: conflict_resolved_by_specificity
    derives_from: L1-5
    rule: >
      When two rules at the same level conflict, the more specific one prevails.
      Specificity order: framework rule > category rule > global rule.
      If specificity is equal, flag the conflict and ask Igor.
    how: on detected conflict between two L2 or two L3 rules, compare scope
    fail: if scope equal, stop and present conflict to Igor in chat

  - id: L2-21
    name: laws_change_requires_issue
    derives_from: L1-5
    rule: >
      Any change to rules/laws.yml requires an open issue discussing the change
      before the PR is created. No silent law changes.
    how: verify an open or recently closed issue references the laws.yml change
    fail: block merge, open issue first
