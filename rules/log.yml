# zeroth — log rules
# Applies to: all session logs and event records in Malstrom frameworks

immutability:
  rule: critical event logs are immutable once written
  critical_events: [shinsa, decision, hire, milestone]
  correction_policy: append only — never overwrite
  declaration: immutable files must be listed explicitly in .agent.yml

naming:
  format: YYYY-MM-DD_{type}_{topic}.yml
  examples:
    - 2026-06-09_shinsa_ruby-blocks.yml
    - 2026-06-09_study_activerecord.yml
    - 2026-06-09_randori_rails.yml
    - 2026-06-09_quiz_ruby.yml

structure:
  required_fields:
    - date
    - type          # shinsa | study | randori | quiz | decision
    - topic
    - summary
  optional_fields:
    - score         # for shinsa logs
    - weak_chapters # for shinsa logs — subject areas with low score
    - weak_spots    # for randori logs — specific concepts missed
