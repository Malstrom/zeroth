# rules/files.yml
# Question: "How do I name, organize and handle files?"

# ---------------------------------------------------------------------------
# REPOS AND FOLDERS
# ---------------------------------------------------------------------------
repos:
  rule: names must be evocative, not descriptive — suggest the essence, not the function
  max_words: 2
  case: lowercase
  separator: hyphen
  valid_examples: [dojo, tensho, zeroth, sudo-hire-me]
  invalid_examples: [ai-learning-framework, skill-tracker-v2, my-repo]

folders:
  rule: evocative of content, not technical — max 2 words, lowercase
  separator: none if possible
  valid_examples: [kata, kiroku, templates]
  invalid_examples: [training-data, session-logs, user-profiles]

# ---------------------------------------------------------------------------
# FILES
# ---------------------------------------------------------------------------
files:
  rule: all files read or written by an AI agent must be in English
  case: lowercase
  separator: hyphen or underscore (consistent per repo)

  ai_operational:
    rule: always dot-prefixed YAML
    examples: [.agent.yml, .registry.yml, .gakusei.yml, .scenarios.yml]

  human_facing:
    rule: readable Markdown, language defined by framework
    examples: [README.md, gakusei.md]

  reserved:
    .agent.yml:     AI manifest, entry point — read-only for AI
    .registry.yml:  cross-repo connection map — read-only for AI
    .scenarios.yml: AI scenario catalog — read-only for AI
    README.md:      human navigation hub — AI writes, never reads

# ---------------------------------------------------------------------------
# REPO STRUCTURE
# ---------------------------------------------------------------------------
structure:
  required_files:
    - .agent.yml
    - .scenarios.yml
    - .registry.yml
    - README.md
  principles:
    - one file = one responsibility
    - max_lines_per_file: 400 — if exceeded, split the file
    - folders group by function, not by file type
    - AI navigation files are hidden YAML when possible

  framework_readme:
    rule: every frameworks/*/README.md must start with the following HTML comment as its very first line
    required_first_line: "<!-- AI: before editing this file, read templates/framework_readme.md in zeroth. -->"
    reason: ensures the AI reads the canonical framework README template before any edit
    enforced_by: giskard

# ---------------------------------------------------------------------------
# TEMPLATES
# ---------------------------------------------------------------------------
templates:
  rule: every generatable document has a template in templates/ — read it before generating
  placeholder_format: "{{TOKEN}}"
  forbidden: deviate from template structure — update template first, then use it

  framework_readme:
    file: templates/framework_readme.md
    applies_to: "frameworks/*/README.md"
    rule: read this template before creating or editing any framework README

# ---------------------------------------------------------------------------
# IMMUTABILITY AND LOGS
# ---------------------------------------------------------------------------
immutability:
  rule: critical event logs are immutable once written — append only, never overwrite
  critical_events: [shinsa, decision, hire, milestone]
  declaration: immutable files must be declared in workspace with access: append-only

logs:
  naming_format: YYYY-MM-DD_{type}_{topic}.yml
  examples:
    - 2026-06-09_shinsa_ruby-blocks.yml
    - 2026-06-09_study_activerecord.yml
  required_fields: [date, type, topic, summary]
  optional_fields: [score, weak_chapters, weak_spots]

# ---------------------------------------------------------------------------
# FILENAME PATTERNS
# Canonical regex per file type. Used by giskard to validate generated files.
# Declared here — referenced in each scenario's create action via pattern_ref.
# ---------------------------------------------------------------------------
filename_patterns:

  # --- dojo ---
  dojo_nikki:
    description: immutable session log (study, randori, shinsa)
    pattern: "YYYY-MM-DD_{subject}_{type}.yml"
    regex: '^\d{4}-\d{2}-\d{2}_[a-z0-9]+_(study|randori|shinsa)\.yml$'
    examples:
      - 2026-06-09_ruby-blocks_study.yml
      - 2026-06-09_activerecord_shinsa.yml

  dojo_makimono:
    description: study scroll
    pattern: "{subject}.yml"
    regex: '^[a-z0-9][a-z0-9-]*\.yml$'
    examples:
      - ruby-blocks.yml
      - activerecord.yml

  dojo_kata:
    description: practice exercise
    pattern: "{slug}.{ext}"
    regex: '^[a-z0-9][a-z0-9_-]*\.(rb|py|js|ts|md|yml)$'
    examples:
      - fibonacci.rb
      - binary-search.py

  # --- aurora ---
  aurora_log:
    description: immutable daily work log
    pattern: "YYYY-MM-DD.yml"
    regex: '^\d{4}-\d{2}-\d{2}\.yml$'
    examples:
      - 2026-06-09.yml

  aurora_log_index:
    description: monthly log index, AI-generated
    pattern: "YYYY-MM.index.yml"
    regex: '^\d{4}-\d{2}\.index\.yml$'
    examples:
      - 2026-06.index.yml

  aurora_inbox:
    description: raw incoming task, write-once
    pattern: "YYYY-MM-DD_{client_slug}.yml"
    regex: '^\d{4}-\d{2}-\d{2}_[a-z0-9][a-z0-9_-]*\.yml$'
    examples:
      - 2026-06-09_acme.yml
      - 2026-06-09_mario-rossi.yml

  aurora_output:
    description: AI-generated output for human delivery
    pattern: "YYYY-MM-DD_{client_slug}.md"
    regex: '^\d{4}-\d{2}-\d{2}_[a-z0-9][a-z0-9_-]*\.md$'
    examples:
      - 2026-06-09_acme.md

  aurora_contact:
    description: contact profile
    pattern: "{client}_{firstname}_{lastname}.yml"
    regex: '^[a-z0-9][a-z0-9_-]*_[a-z0-9]+_[a-z0-9]+\.yml$'
    examples:
      - acme_mario_rossi.yml
      - internal_luca_bianchi.yml

  # --- sudo-hire-me ---
  sudo_hire_me_scenario:
    description: scenario file for index-based .scenarios.yml
    pattern: "{scenario_id}.md"
    regex: '^[a-z0-9][a-z0-9_]*\.md$'
    examples:
      - job_offer_received.md
      - round_completed_debrief.md
      - session_start.md

  # --- universal ---
  branch_name:
    description: git branch name
    pattern: "{type}/{short-description}"
    regex: '^(feat|fix|docs|test|chore)/[a-z0-9][a-z0-9-]*$'
    examples:
      - feat/add-shinsa-scenario
      - fix/zeroth-agent-yml
