# rules/agent.yml
# Question: "How do I structure .agent.yml?"

# ---------------------------------------------------------------------------
# STRUCTURE
# ---------------------------------------------------------------------------
structure:
  required_blocks_in_order:
    - connector_check
    - global
    - repo_map
    - file_access
    - tool_approval
    - write_ahead
    - scenarios
    - post_action_hook
    - handlers

# ---------------------------------------------------------------------------
# CONNECTOR CHECK
# ---------------------------------------------------------------------------
connector_check:
  rule: must be the first block — if connector not active, show clear message and stop
  forbidden: fall back to web or browser

# ---------------------------------------------------------------------------
# GLOBAL
# ---------------------------------------------------------------------------
global:
  language:
    rule: always declared or read from an identity file (e.g. .gakusei.yml) — single source
    forbidden: extra language fields (e.g. replies_in)
  pr_strategy: batch_per_session — exception only for immutable logs
  merge_strategy: squash — always squash merge PRs into main
  dedup_scope: current_session — each handler runs at most once per topic per session
  trigger_matching: pattern_first — fallthrough to unknown_scenario if no match

# ---------------------------------------------------------------------------
# SPACE INSTRUCTIONS
# ---------------------------------------------------------------------------
space_instructions:
  rule: every framework instance must have a space-instructions.md at repo root
  template: templates/space-instructions.md
  generated_by: add_framework scenario
  required_sections:
    - browser_policy
    - entry_point
    - connector_failure
    - tool_approval
    - user_preferences
    - hard_rules
  browser_policy:
    rule: must include an explicit forbidden_tools list — ambiguous "no browser" phrasing is forbidden
    forbidden_tools:
      - search_web
      - get_full_page_content
      - search_browser
      - list_files
      - search_files_v2
      - search_user_memories
      - search_email
      - search_calendar
      - email_calendar_agent
      - open_page
    open_page_exception: only when Igor explicitly asks to view a page

# ---------------------------------------------------------------------------
# SCENARIOS
# ---------------------------------------------------------------------------
scenarios:
  rule: scenarios live in .scenarios.yml — never inline in .agent.yml
  required: [session_start, unknown_scenario]
  note: giskard validates .scenarios.yml directly — see rules/scenarios.yml

# ---------------------------------------------------------------------------
# HANDLERS
# ---------------------------------------------------------------------------
handlers:
  rule: reactive to state_changes — never called directly by the user
  empty: use handlers: {} — never omit the block
  required_fields: [listen, dedup, actions, state_changes]
  dedup_values:
    - once per session
    - once per {variable} per session
  forbidden_in_actions: [say, ask, propose]
  cross_repo_refs: use owner/repo:path format in actions — never in the read field

# ---------------------------------------------------------------------------
# POST ACTION HOOK
# ---------------------------------------------------------------------------
post_action_hook:
  rule: mandatory — must read .registry.yml after every state_change
  empty: post_action_hook: {} is NOT valid
  structure:
    after_every_state_change:
      allowed_modules: [read, if, call_handlers]
      note: call_handlers is post_action_hook-exclusive — forbidden in scenarios and handlers
    conflict_check:
      if_open_pr_on_same_file: stop | warn | proceed
  minimal_valid_example: |
    post_action_hook:
      after_every_state_change:
        - read: .registry.yml
        - if:
            condition: matching_sync_triggers_exist
            then:
              - call_handlers: matching
      conflict_check:
        if_open_pr_on_same_file: stop and notify user

# ---------------------------------------------------------------------------
# WRITE AHEAD
# ---------------------------------------------------------------------------
write_ahead:
  rule: commit before responding — NEVER push directly to main
  branch_strategy: feature branch → PR → squash merge
  branch_naming: "{type}/{short-description} — types: feat, fix, docs, test, chore"
  immutable_logs: immediate PR → squash merge, not batched

# ---------------------------------------------------------------------------
# FILE ACCESS
# ---------------------------------------------------------------------------
file_access:
  rule: every file must have its permission declared explicitly
  defaults:
    .agent.yml: read-only
    .registry.yml: read-only

# ---------------------------------------------------------------------------
# TOOL APPROVAL
# ---------------------------------------------------------------------------
tool_approval:
  rule: follow this mapping for _requires_user_approval on every tool call — never ask approval for false entries
  mapping:
    feature_branch: false
    file_edit: false
    push_files: false
    create_pr: false
    merge_to_main: false
    delete_file: true
    destructive_ops: true
  destructive_ops: "delete_file, overwrite without branch, clear directory, any operation that cannot be reverted by reverting a PR"

# ---------------------------------------------------------------------------
# YAML VALIDITY
# ---------------------------------------------------------------------------
yaml_validity:
  rule: all .agent.yml and dot-prefixed YAML files must be parseable by yaml.safe_load
  forbidden: flow sequences [...] when values contain { } characters
  placeholders: template placeholders like {topic} must be quoted inside sequences

# ---------------------------------------------------------------------------
# VALIDATION
# ---------------------------------------------------------------------------
validation:
  - connector_check is the first block
  - repo_map is present
  - file_access is present
  - tool_approval is present
  - write_ahead is present
  - scenarios declares scenarios_file
  - handlers is present
  - post_action_hook declares after_every_state_change with read: .registry.yml
  - space_instructions.md exists at repo root for every framework instance
