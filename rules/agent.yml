# zeroth — agent rules
# Applies to: every .agent.yml in every Malstrom framework

structure:
  required_blocks_in_order:
    - connector_check
    - global
    - repo_map
    - scenarios
  optional_blocks:
    - handlers
    - template_rule
    - file_access
    - tool_approval
    - write_ahead
    - post_action_hook

  scenarios_pattern:
    rule: scenarios always live in .scenarios.yml — never inline in .agent.yml
    rationale: structural separation, not a size threshold
    agent_yml_declares: scenarios_file pointing to .scenarios.yml
    agent_yml_scenarios_block: reference only — no inline scenario definitions
    example_agent_yml: |
      scenarios:
        scenarios_file: .scenarios.yml
    validation: giskard reads and validates .scenarios.yml directly

rules:

  connector_check:
    - must be the first block
    - if connector not active: show clear message and stop immediately
    - never fall back to web or browser

  global:
    - language: always declared or read from an identity file (for example .gakusei.yml)
    - pr_strategy: batch_per_session is default — exception only for immutable logs
    - merge_strategy: squash — always squash merge PRs into main
    - dedup_scope: current_session_log — each handler runs at most once per topic per session
    - trigger_matching: pattern_first — fallthrough to unknown_scenario if no match

  scenarios:
    - scenarios live in .scenarios.yml — never inline in .agent.yml
    - every scenario must follow the syntax defined in rules/scenarios.yml
    - session_start is mandatory
    - unknown_scenario is mandatory — no message may be left unhandled
    - triggers are natural language patterns, not technical commands
    - scenarios are user-triggered — handlers are not
    - giskard validates .scenarios.yml, not the scenarios block in .agent.yml

  handlers:
    - reactive to state_changes emitted by scenarios
    - never called directly by the user
    - must declare dedup
    - listen: list of events they react to

  write_ahead:
    - rule: commit before responding
    - NEVER push directly to main — always feature branch → PR → squash merge
    - branch naming: {type}/{short-description} where type is feat/fix/docs/test/chore
    - critical logs (exam): immediate PR → squash merge, immutable
    - everything else: batch per session

  file_access:
    - .agent.yml: read-only
    - .registry.yml: read-only
    - every file must have its permission declared explicitly

  tool_approval:
    mapping:
      feature_branch: false
      file_edit: false
      push_files: false
      create_pr: false
      merge_to_main: false
      delete_file: true
      destructive_ops: true
    definition:
      destructive_ops: |
        delete_file, overwrite without branch, clear directory, any operation
        that cannot be reverted by reverting a PR
    note: |
      This mapping applies to the _requires_user_approval flag on every tool call.
      The AI must follow this mapping and never ask approval for false entries.

  yaml_validity:
    - all .agent.yml files must be parseable by yaml.safe_load without errors
    - all dot-prefixed YAML files used by the AI must be parseable by yaml.safe_load without errors
    - never use flow sequences [...] when values contain { } characters
    - use block sequences for read: lists in scenarios and handlers
    - correct:
        read:
          - .gakusei.yml
          - "kata/{topic}.md"
    - incorrect:
        read: [.gakusei.yml, kata/{topic}.md]
    - template placeholders like {topic} or {course} must be quoted when inside sequences
