# zeroth — sync rules
# Applies to: cross-repo synchronisation in the Malstrom ecosystem

principle: all cross-repo sync is declared in .registry.yml — never implicit

patterns:

  state_driven:
    description: a state_change in repo A triggers an action in repo B
    how: post_action_hook reads .registry.yml and executes matching sync_triggers
    approval_required: false (unless destructive)

  batch_per_session:
    description: all PRs in a session are batched into one PR per affected file group
    exception: immutable logs — immediate PR, not batched

  conflict_check:
    rule: if an open PR already exists on the same file, stop and notify the user
    never: force-push or silent overwrite

rules:
  - sync is always unidirectional per connection declaration
  - circular sync between two repos must be explicitly documented and justified
  - a repo must never modify files in another repo outside declared connections

post_action_hook_obligation:
  rule: |
    post_action_hook MUST read .registry.yml after every state_change.
    This is mandatory, not a recommendation.
    If a framework has no sync connections, post_action_hook still reads .registry.yml
    and executes nothing (zero matching triggers).
  rationale: ensures all sync logic is driven by .registry.yml, never hardcoded
