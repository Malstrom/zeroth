# zeroth — naming rules
# Applies to: every framework repo in the Malstrom ecosystem

fundamental_rule: names must be evocative, not descriptive — the name suggests the essence, not the function

language_rule:
  rule: all files read or written by an AI agent must be in English
  applies_to:
    - .agent.yml and .registry.yml
    - any file declared in repo_map inside .agent.yml
    - all framework spec files (rules/, frameworks/)
  exceptions:
    - README.md may be in any language (human-only file)

repo:
  max_words: 2
  case: lowercase
  separator: hyphen
  style: evocative not technical
  valid_examples: [dojo, tensho, zeroth, sudo-hire-me]
  invalid_examples: [ai-learning-framework, skill-tracker-v2, my-repo]

folders:
  max_words: 2
  case: lowercase
  separator: none if possible
  style: evocative of content not technical
  valid_examples: [kata, scroll, forge, hunt, log]
  invalid_examples: [training-data, session-logs, user-profiles]

files:
  case: lowercase
  separator: hyphen or underscore (consistent per repo)
  ai_special_files: always dot-prefixed (.agent.yml, .registry.yml)
  identity_files: lowercase proper name (e.g. sensei.yml, igor.yml)
  logs: format YYYY-MM-DD_{type}_{topic}.yml

reserved_files:
  .agent.yml:
    role: AI manifest, entry point
    ai_access: read-only
  .registry.yml:
    role: cross-repo connection map
    ai_access: read-only, never proactive
  README.md:
    role: human navigation hub
    ai_access: write-only (AI does not read)
