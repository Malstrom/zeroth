# rules/scenarios.yml
# Question: "How do I write a scenario?"
#
# Model: GitHub Actions workflows
# Each scenario = one workflow: trigger → read → steps → output
# Canonical anatomy declared below. Validation rules at the bottom.

# ---------------------------------------------------------------------------
# ROUTING
# How the AI picks a scenario before executing anything.
# ---------------------------------------------------------------------------
routing:
  rule: read ALL on: patterns before picking a scenario
  match: first semantic match wins — pick the most specific
  on_no_match: call unknown_scenario
  order: scenarios evaluated top to bottom
  note: |
    The AI resolves the user's language, then matches intent.
    on: patterns are always written in English — language-independent.

# ---------------------------------------------------------------------------
# EVENT ROUTING
# How the AI handles state_change events emitted by scenarios.
# ---------------------------------------------------------------------------
event_routing:
  # When a scenario emits a state_change (via output.state_changes or emit:),
  # the AI scans ALL scenarios for on: events: lists that include that event name.
  # Matching scenarios are queued and executed in declaration order.
  mechanism: sequential           # matching scenarios run one after the other
  on_conflict: all_matches        # ALL matching scenarios run — not just first
  execution: automatic            # no user prompt — runs immediately after emitting scenario
  context_inheritance: true       # event-triggered scenario inherits calling scenario's context
                                  # (subject, topic, slug, etc.)
  forbidden_steps: [say, ask, propose, issue]
                                  # event-triggered scenarios are silent — no user interaction.
                                  # They compute, write, and emit. Interaction happens in
                                  # a follow-up user-triggered scenario that reads the result.
  note: |
    Pattern: emit → silent handler (compute + write + emit) → user-triggered reporter (say + propose).
    The reporter scenario is called automatically by the framework after all event handlers complete,
    if a reporter is registered for that event chain.

# ---------------------------------------------------------------------------
# SCENARIO ANATOMY
# Every scenario is one named key under required_scenarios.
# Fields are listed in reading order — top = evaluated first.
# ---------------------------------------------------------------------------
anatomy:

  # --- identity ---
  name:
    rule: snake_case, lowercase, English
    examples: [study_open, shinsa, readme_sync]

  # --- routing ---
  on:
    rule: exactly one form — never both
    forms:
      user_triggered:
        syntax: |
          on:
            - intent description in English
            - another intent description
        note: semantic intent — not literal phrases. The AI matches meaning, not words.
      event_triggered:
        syntax: |
          on:
            events: [event-name-1, event-name-2]
        note: |
          Runs automatically when a matching event is emitted.
          Silent — no say, ask, propose, or issue steps allowed.
          Computes, writes, emits. Interaction delegated to a reporter scenario.
        required_with: creates_issue == false

  # --- issue lifecycle ---
  creates_issue:
    rule: required on every scenario — the AI never decides autonomously
    values:
      true: AI opens issue before starting, closes on complete
      false: no issue, no lifecycle management

  issue:
    rule: required if and only if creates_issue == true
    fields:
      title:
        rule: short, English, may use {placeholder} for runtime values
        example: "Shinsa: {subject}"
      body:
        rule: markdown, use - [ ] for checklist items
        example: |
          - [ ] exam conducted
          - [ ] nikki written
          - [ ] .gakusei.yml updated
      on_complete:
        values: [close]
        default: close
      on_fail:
        values: [comment]
        default: comment

  # --- dedup (event-triggered only) ---
  dedup:
    rule: optional, event-triggered scenarios only
    values:
      - once per session
      - once per {variable} per session

  # --- input ---
  read:
    rule: list all files to read BEFORE executing steps
    format: block sequence
    empty: use read: [] — never omit
    note: use glob patterns for directories (e.g. "kata/{subject}/")

  input_sources:
    rule: optional — declare when scenario accepts multiple input types
    allowed_values: [google_drive, attached_file, pasted_text, ai_knowledge]

  # --- logic ---
  steps:
    rule: ordered list of actions — each step uses exactly one module
    modules:

      say:
        description: emit a message to the user
        syntax: "- say: \"message text\""
        note: may use {{token}} for runtime values

      ask:
        description: ask the user a question and wait for answer before continuing
        syntax: "- ask: \"question text\""
        note: may use {{token}} for runtime values

      propose:
        description: present an option, wait for confirmation, then execute on_confirm
        syntax: |
          - propose: "action description"
            on_confirm:
              - call: scenario_name
            on_reject:
              - say: "fallback message"

      compute:
        description: calculate a derived value from available data — stores result as named variable
        syntax: "- compute: variable_name"
        note: |
          Available in event-triggered scenarios.
          The AI derives the value from read: files and inherited context.
          Result is available as {{variable_name}} in subsequent steps.

      write:
        description: write a file — behavior declared via access field
        syntax: |
          - write:
              path: "folder/"           # folder path OR exact file path
              filename: "YYYY-MM-DD_{slug}.yml"  # required when path is a folder
              from: templates/file.yml  # template to use — required for new files
              fields: [field1, field2]  # optional — limit write to specific fields
              access: append-only       # required — see access values below
              via: PR                   # always PR unless stated otherwise
        access_values:
          read-write:   create if missing, overwrite if exists
          append-only:  create if missing, append if exists — never overwrite
          write-once:   create if missing, error if exists
          read-only:    never write — error if attempted
        note: |
          filename is required when path ends with /.
          filename pattern must match a key in rules/files.yml#filename_patterns.

      commit_before_reply:
        description: |
          Execute all pending write steps and wait for PRs to merge before
          any say, emit, or propose step runs.
          Use when all writes for the current scenario must be persisted to
          GitHub before the AI communicates any result to the user.
          GitHub is the source of truth — chat is ephemeral.
        syntax: "- commit_before_reply"
        note: no parameters. Place after the last write, before the first say/emit/propose.

      call:
        description: invoke another scenario by name
        syntax: "- call: scenario_name"
        note: may be used inside on_confirm or if/then/else

      issue:
        description: mid-scenario issue update — opt-in, only when needed
        syntax: |
          - issue:
              check: "checklist item text"  # checks that item in issue body
          # OR
          - issue:
              comment: "free text comment"  # adds a comment to the open issue
        note: |
          Use only for mid-scenario checklist updates or progress comments.
          Open and close are automatic — do not replicate with issue steps.
        forbidden_in: event-triggered scenarios

      if:
        description: conditional branch
        syntax: |
          - if:
              condition: expression
              then:
                - step
              else:
                - step
        note: else is optional

      emit:
        description: emit a state_change event conditionally (inside if/then/else only)
        syntax: "- emit: event-name"
        note: use inside if/then/else only — never unconditionally outside if

    forbidden_in_event_triggered: [say, ask, propose, issue]

  # --- output ---
  output:
    rule: required on every scenario
    fields:
      state_changes:
        rule: list of event names emitted when scenario completes unconditionally
        format: block sequence or []
        naming: kebab-case
        empty: use state_changes: [] — never omit
        note: |
          Conditional emits go inside if/then/else steps using emit:.
          Do not list conditional events here — only unconditional ones.

# ---------------------------------------------------------------------------
# REQUIRED SCENARIOS
# Every .scenarios.yml must have these two, in this order.
# ---------------------------------------------------------------------------
required_scenarios:
  - session_start   # first — triggered when session opens
  - unknown_scenario  # last — fallthrough for unmatched intents

# ---------------------------------------------------------------------------
# VALIDATION
# Rules enforced by giskard.
# ---------------------------------------------------------------------------
validation:
  - root key must be required_scenarios
  - session_start must be present
  - unknown_scenario must be present and last
  - every scenario must have: on, creates_issue, read, steps, output
  - on: must be a list (user-triggered) OR have events: key (event-triggered) — never both
  - if creates_issue == true, issue: block must be present with title and body
  - if creates_issue == false, issue: block must be absent
  - every write step must have: path, access, via
  - every write step where path ends with / must have filename
  - filename must match a key in rules/files.yml#filename_patterns
  - say, ask, propose, issue steps are forbidden in event-triggered scenarios
  - output.state_changes must never be omitted
  - dedup is only valid on event-triggered scenarios
  - trigger patterns and on: events must be in English
  - compute steps are only valid in event-triggered scenarios
