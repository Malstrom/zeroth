# rules/scenarios.yml
# Question: "How do I write a scenario?"
#
# Model: GitHub Actions workflows
# Each scenario = one workflow: trigger → read → steps → output
# Canonical anatomy declared below. Validation rules at the bottom.

# ---------------------------------------------------------------------------
# ROUTING
# How the AI picks a scenario before executing anything.
# ---------------------------------------------------------------------------
routing:
  precondition_check: before trigger match — scenarios with failing preconditions are excluded
  rule: read ALL triggers before picking a scenario
  match: first semantic match wins — pick the most specific
  order: sorted by priority DESC, then declaration order
  on_no_match: call unknown_scenario
  trigger_format:
    rule: |
      Triggers must describe user intent in English — never literal phrases or keywords.
      The AI matches meaning, not words. This makes triggers language-independent:
      a user writing in Russian, Italian, or any other language is matched correctly
      because the LLM evaluates intent, not string equality.
    forbidden_patterns:
      - 'user says "..."'
      - 'user writes "..."'
      - 'user types "..."'
      - any trigger that is a quoted literal string the user must type verbatim
    correct_examples:
      - user greets the system or initiates a new session
      - user wants to set a goal
      - user wants to practice a concept
    wrong_examples:
      - 'user says "ciao", "inizio", "start"'
      - '"ho ricevuto un offerta"'
      - '"received offer from"'
    rationale: |
      Keyword triggers break silently for any language not explicitly listed.
      Semantic intent triggers work universally because the LLM is multilingual.
  escape_triggers:
    description: |
      Keywords that immediately interrupt ANY active scenario and return to routing.
      The AI aborts the current scenario, says a brief interruption acknowledgement,
      then re-routes the next user message from scratch.
    default_keywords: ["stop", "cancel", "abort", "wrong", "reset", "esci", "annulla"]
    override: frameworks can extend this list in their .agent.yml under hard_rules.escape_triggers
    note: escape_triggers are evaluated BEFORE scenario trigger matching on every message.
  note: |
    The AI resolves the user's language, then matches intent.
    triggers are always written in English — language-independent.

# ---------------------------------------------------------------------------
# SCENARIO TYPES
# Three types. Declared via on: form. Each has different constraints.
# ---------------------------------------------------------------------------
scenario_types:

  user_triggered:
    on_form: list of intent strings
    description: |
      Started by the user. Can use all step modules.
      Interaction (say, ask, propose) is expected.
    allowed_steps: all
    note: compute is allowed — it has no side effects and is useful for
          deriving values mid-scenario (e.g. score after an exam loop).

  event_triggered:
    on_form: "on: events: [event-name]"
    description: |
      Runs automatically when a matching event is emitted.
      SILENT — no user interaction. Computes, writes, emits only.
      Interaction delegated to a reporter scenario.
    forbidden_steps: [say, ask, propose, issue]
    allowed_steps: [compute, write, emit, if, call]

  reporter:
    on_form: "on: events: [event-name]"
    description: |
      Runs automatically after event_triggered handlers complete.
      User-facing — communicates results and proposes next actions.
      Does NOT compute or write — reads results written by event_triggered handlers.
      Declared with type: reporter to distinguish from silent event_triggered.
    forbidden_steps: [compute, write, emit]
    allowed_steps: [say, ask, propose, call, if]
    required_field: type: reporter
    note: |
      Pattern: emit → event_triggered (compute + write + emit) → reporter (say + propose).
      The reporter reads from files written by the event_triggered handler.
      It never writes and never emits — it only communicates.

# ---------------------------------------------------------------------------
# EVENT ROUTING
# How the AI handles state_change events emitted by scenarios.
# ---------------------------------------------------------------------------
event_routing:
  mechanism: sequential           # matching scenarios run one after the other
  on_conflict: all_matches        # ALL matching scenarios run — not just first
  execution: automatic            # no user prompt — runs immediately after emitting scenario
  context_inheritance: true       # event-triggered and reporter scenarios inherit calling
                                  # scenario's context (subject, topic, slug, etc.)
  execution_order: |
    For a given event:
    1. All event_triggered scenarios run first (silent, in declaration order)
    2. All reporter scenarios run after (user-facing, in declaration order)
  note: |
    Pattern: emit → silent handler (compute + write + emit) → reporter (say + propose).

# ---------------------------------------------------------------------------
# SCENARIO ANATOMY
# Every scenario is one named key under required_scenarios.
# Fields are listed in reading order — top = evaluated first.
# ---------------------------------------------------------------------------
anatomy:

  # --- identity ---
  name:
    rule: snake_case, lowercase, English
    examples: [study_open, shinsa, readme_sync]

  # --- type (optional, required for reporter) ---
  type:
    rule: omit for user_triggered and event_triggered — required only for reporter
    values: [reporter]
    note: the AI infers user_triggered vs event_triggered from the on: form.
          reporter must be declared explicitly because it shares the events: on: form
          with event_triggered but has different constraints.

  # --- preconditions (optional) ---
  preconditions:
    rule: |
      Optional. Declare when a scenario can only run if a specific state is present.
      The AI checks all preconditions BEFORE evaluating trigger match.
      A scenario whose preconditions are not met is EXCLUDED from routing candidates.
      This prevents impossible scenarios from winning semantic match.
    values:
      - any
      - symbolic conditions defined by the framework (e.g. active_goal_exists)
    note: keep preconditions high-level and boolean — not procedural.

  # --- trigger ---
  on:
    rule: |
      Required. Exactly one form:
      - user_triggered: list of intent strings
      - event_triggered / reporter: events: [event-name, ...]
      Events are symbolic state changes emitted by scenarios.
    examples:
      user_triggered:
        - user wants to practice a concept
        - user wants to set a goal
      event_triggered:
        events: [topic-studied, score-computed]

  # --- side-effect declaration ---
  creates_issue:
    rule: required boolean
    values: [true, false]
    note: true only if the scenario itself creates a GitHub issue/sub-issue.

  # --- issue contract (only when creates_issue: true) ---
  issue:
    rule: |
      Required only when creates_issue: true.
      Declares the issue template, labels, and lifecycle policy.
    required_fields: [title, from, approval]
    optional_fields: [labels, update, on_complete, on_fail]

  # --- read set ---
  read:
    rule: |
      Declare everything the scenario needs before steps begin.
      Use repo-relative paths for local files.
      Use symbolic sources for GitHub data (issues, comments, labels).
      If a scenario needs additional instructions that are not instance data
      (e.g. onboarding spec, another scenario file), prefer explicit `read:` or explicit
      `call:` with file + load:on_demand instead of relying on implicit resolution.
    note: read set should be minimal but sufficient.

  # --- preprocess (optional) ---
  preprocess:
    rule: |
      Optional. Runs before steps. Use to infer missing variables from user message
      or normalize refs/slugs so the steps block stays simpler.
    allowed_steps: [compute]

  # --- steps ---
  steps:
    rule: ordered list of actions
    allowed_modules:
      - say
      - ask
      - propose
      - read
      - compute
      - write
      - issue
      - update_issue
      - ensure_label
      - ensure_labels_on_issues
      - emit
      - if
      - for_each
      - call
      - merge
      - stop
      - continue

  call:
    description: |
      Invoke another scenario by ID. Always use the explicit form — implicit
      `call: scenario_id` is forbidden.
    syntax:
      explicit:
        scenario: scenario_id
        file: path/to/scenarios/file.yml
        load: on_demand
        with:
          key: value
    required_fields: [scenario, file, load]
    optional_fields: [with]
    required_values:
      load: on_demand
    forbidden:
      - 'call: scenario_id'
    rationale: |
      Explicit file path makes inter-scenario dependencies self-documenting
      and prevents silent failures if a file is moved.
      load: on_demand prevents eager loading at parse time and keeps context usage minimal.
    examples:
      correct:
        - call:
            scenario: study_open
            file: frameworks/dojo/scenarios/study.yml
            load: on_demand
            with:
              topic: "{{topic}}"
        - call:
            scenario: close_task
            file: frameworks/daneel/scenarios/close_task.yml
            load: on_demand
            with:
              issue_number: "{{issue_number}}"
      wrong:
        - call: study_open
        - call: close_task
          with:
            issue_number: "{{issue_number}}"

  # --- output ---
  output:
    rule: |
      Required. Declare state_changes emitted to routing after scenario completes.
      Use [] when the scenario emits nothing.
    required_field: state_changes

# ---------------------------------------------------------------------------
# VALIDATION RULES
# Machine-checkable rules for giskard / linting.
# ---------------------------------------------------------------------------
validation:
  required_top_level_fields: [id, on, creates_issue, read, steps, output]
  reporter_requires_type: true
  creates_issue_requires_issue_block: true
  output_requires_state_changes: true
  call_requires_explicit_file: true
  call_requires_load_on_demand: true
  call_implicit_form_forbidden: true
  event_triggered_forbidden_steps: [say, ask, propose, issue]
  reporter_forbidden_steps: [compute, write, emit]
