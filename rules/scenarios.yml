# rules/scenarios.yml
# Question: "How do I write a scenario?"
# Model: GitHub Actions workflows — trigger → read → steps → output

# ---------------------------------------------------------------------------
# ROUTING
# ---------------------------------------------------------------------------
routing:
  rule: read ALL triggers before picking — first semantic match wins (priority DESC, then declaration order)
  precondition_check: scenarios with failing preconditions excluded before trigger match
  on_no_match: call unknown_scenario
  trigger_format:
    rule: |
      Describe user intent in English — never literal phrases or keywords.
      The AI matches meaning, not words — language-independent by design.
    forbidden: 'user says "...", user writes "...", any quoted verbatim string'
    correct: user wants to set a goal | user greets the system
    wrong:   '"ho ricevuto un offerta" | user says "start"'
  escape_triggers:
    rule: keywords that abort ANY active scenario and return to routing
    default: [stop, cancel, abort, wrong, reset, esci, annulla]
    override: extend in framework .agent.yml under hard_rules.escape_triggers

# ---------------------------------------------------------------------------
# SCENARIO TYPES
# ---------------------------------------------------------------------------
scenario_types:

  user_triggered:
    on_form: list of intent strings
    allowed: all modules
    note: started by user — interaction (say, ask, propose) expected

  event_triggered:
    on_form: "events: [event-name]"
    allowed: [compute, write, emit, if, call]
    forbidden: [say, ask, propose, issue]
    note: SILENT — no user interaction. Delegates communication to a reporter.

  reporter:
    on_form: "events: [event-name]"
    allowed: [say, ask, propose, call, if]
    forbidden: [compute, write, emit]
    required_field: type: reporter
    note: runs after event_triggered handlers. Reads their output, never writes.

# ---------------------------------------------------------------------------
# EVENT ROUTING
# ---------------------------------------------------------------------------
event_routing:
  mechanism: sequential
  on_conflict: all_matches        # ALL matching scenarios run
  execution: automatic            # no user prompt
  context_inheritance: true       # inherits calling scenario context
  execution_order: |
    1. All event_triggered scenarios (silent, declaration order)
    2. All reporter scenarios (user-facing, declaration order)

# ---------------------------------------------------------------------------
# SCENARIO ANATOMY
# Fields in reading order — top = evaluated first.
# ---------------------------------------------------------------------------
anatomy:

  name:         snake_case, lowercase, English
  type:         omit unless reporter — required_values: [reporter]
  dedup:        optional, event-triggered/reporter only — values: [once per session, once per {var} per session]
  input_sources: optional — values: [google_drive, attached_file, pasted_text, ai_knowledge]

  preconditions:
    rule: |
      Optional. Checked BEFORE trigger match — failing scenarios excluded from routing.
      Use "any" to signal no precondition.
    identifiers: declared in framework overview.yml or .agent.yml under state_conditions
    examples: [active_goal_exists, no_active_goal, any]

  on:
    rule: exactly one form — never both
    user_triggered:          "on: [intent in English, another intent]"
    event_triggered/reporter: "on: events: [event-name-1, event-name-2]"
    note: reporter disambiguated by type: reporter field

  # --- issue lifecycle ---
  creates_issue:
    rule: required on every scenario — the AI never decides autonomously
    values: {true: opens issue before start / closes on complete, false: no lifecycle management}

  issue:
    rule: required if and only if creates_issue == true
    fields:
      title:      short, English, {placeholder} allowed
      from:       path to markdown template — inline body forbidden
      update:     check (ticks checkbox) | comment (adds comment, never edits body) — default: check
      approval:   none (only valid value — create immediately, no confirmation)
      on_complete: close
      on_fail:    comment

  issue_updates:
    rule: |
      Optional. Only when creates_issue == false.
      Declares the external issue variable used by update_issue steps.
      Forbidden when creates_issue == true — use issue: block instead.
    fields:
      target:    compute variable holding the issue identifier
      condition: optional runtime expression — if false, all update_issue steps silently skipped

  # --- read set ---
  read:
    rule: list all files to read BEFORE steps. Use read: [] — never omit.
    note: glob patterns ok (e.g. "kata/{subject}/")
    special_sources:
      issues:   "issues: {repo} {state} ordered_by {field} {direction}"
      comments: "comments: {repo} issue {{variable}}"  # variable must be computed first

  # --- steps ---
  steps:
    rule: ordered list — each step uses exactly one module

    # Simple modules — one-liners
    simple_modules:
      say:    "- say: \"text\"             # forbidden_in: [event_triggered]"
      ask:    "- ask: \"question\"         # forbidden_in: [event_triggered]"
      if:     "- if: {condition, then, else}  # else optional"
      emit:   "- emit: event-name         # inside if/then/else only. forbidden_in: [reporter]"
      stop:   "- stop"
      continue: "- continue"
      merge:  "- merge: {strategy, target}"
      compute: "- compute: var_name       # derives value from read files. forbidden_in: [reporter]"

    propose:
      syntax: |
        - propose: "action description"
          on_confirm:
            - call:
                scenario: scenario_name
                file: path/to/file.yml
                load: on_demand
          on_reject:
            - say: "fallback"
      forbidden_in: [event_triggered]

    write:
      syntax: |
        - write:
            path: "folder/"                   # or exact file path
            filename: "YYYY-MM-DD_{slug}.yml" # required when path ends with /
            from: templates/file.yml          # required for write-once / read-write
            vars: {key: "{variable}"}         # optional — requires from:
            fields: [f1, f2]                  # optional — limit to specific fields
            access: append-only               # read-write | append-only | write-once | read-only
            via: PR
            approval: none
      access:
        read-write:  create if missing, overwrite if exists
        append-only: create if missing, append if exists — from: forbidden
        write-once:  create if missing, error if exists
        read-only:   never write
      rules:
        - from: required when access is write-once or read-write
        - from: forbidden when access is append-only
        - vars: requires from:
        - filename required when path ends with /
        - filename must match a key in rules/files.yml#filename_patterns
      forbidden_in: [reporter]

    call:
      description: invoke another scenario by ID — always explicit form
      syntax:
        - call:
            scenario: scenario_id
            file: path/to/scenarios/file.yml
            load: on_demand
            with: {key: value}    # optional
      required: [scenario, file, "load: on_demand"]
      forbidden: "call: scenario_id  # implicit form"
      rationale: explicit file = self-documenting deps + safe on rename. on_demand = no eager loading.
      examples:
        correct:
          - call: {scenario: study_open, file: frameworks/dojo/scenarios/study.yml, load: on_demand, with: {topic: "{{topic}}"}}
          - call: {scenario: close_task, file: frameworks/daneel/scenarios/close_task.yml, load: on_demand}
        wrong:
          - call: study_open
          - call: close_task
            with: {issue_number: "{{issue_number}}"}

    commit_before_reply:
      description: flush all pending writes before any say/emit/propose
      syntax: "- commit_before_reply"
      forbidden_in: [event_triggered, reporter]

    issue:
      description: mid-scenario issue update — only when creates_issue == true
      syntax: |
        - issue:
            check: "item"          # ticks checkbox (requires update: check)
        - issue:
            comment: {from: templates/comment.md, vars: {key: "{{value}}"}}
      note: for EXTERNAL issues use update_issue instead
      forbidden_in: [event_triggered, reporter]

    update_issue:
      description: edit an external issue — only when issue_updates declared
      actions:
        add_kata_link: inline edit — appends kata link next to checklist item. required: [target, topic, kata_url]
        close:         closes issue — optional comment field
        add_comment:   adds comment without editing body — required: [from]
      syntax: |
        - update_issue:
            target: matching_goal_issue
            action: add_kata_link | close | add_comment
      rules:
        - target must match issue_updates.target
        - if issue_updates.condition is false — step silently skipped
      forbidden_in: [event_triggered, reporter]

  # --- output ---
  output:
    rule: required. Declare state_changes emitted on unconditional completion. Use [] if none.
    note: conditional emits go inside if/then/else using emit: — do not list them here

# ---------------------------------------------------------------------------
# FILE FORMAT
# ---------------------------------------------------------------------------
file_format:
  monolithic: legacy — all scenarios inline in .scenarios.yml. root_key: required_scenarios
  index:
    description: lightweight index — AI fetches only the matched scenario file
    root_key: scenarios
    entry_required_fields: [id, triggers, file]
    entry_optional_fields: [deprecated, replaced_by, priority, preconditions]
    scenario_file_rules:
      - starts with: "# source: https://raw.githubusercontent.com/{owner}/{repo}/main/{path}"
      - filename: snake_case .yml under scenarios/
      - content: id, creates_issue, read, steps, output
    fetch_pattern: get_file_contents(owner=Malstrom, repo=zeroth, path=entry.file)

# ---------------------------------------------------------------------------
# REQUIRED SCENARIOS
# ---------------------------------------------------------------------------
required_scenarios:
  - session_start:
      note: first message with no other match OR explicit greeting. Never "session opens automatically".
  - unknown_scenario:  # last — fallthrough
      note: surface top 3 nearest scenarios. Never a silent dead end.

# ---------------------------------------------------------------------------
# VALIDATION
# ---------------------------------------------------------------------------
validation:
  # structure
  - root key must be required_scenarios (monolithic) or scenarios (index)
  - session_start must be present
  - unknown_scenario must be present and last
  - every scenario must have: on, creates_issue, read, steps, output
  - on: must be a list (user-triggered) OR have events: key — never both
  # issue lifecycle
  - if creates_issue == true: issue block required with title, from, update, approval, on_complete, on_fail
  - if creates_issue == true: inline issue.body forbidden — use issue.from
  - if creates_issue == false: issue block must be absent
  - if creates_issue == false: issue: steps forbidden — use update_issue instead
  - if issue_updates declared: target must be a computed variable available before update_issue
  - update_issue requires: target, action
  - update_issue target must match issue_updates.target
  - update_issue action add_kata_link requires: topic, kata_url
  - update_issue forbidden when issue_updates not declared
  # write
  - every write step must have: path, access, via, approval
  - write write-once or read-write: from required
  - write append-only: from forbidden
  - write with vars: from required
  - write path ending /: filename required
  - filename must match rules/files.yml#filename_patterns
  # type constraints
  - say, ask, propose, issue forbidden in event_triggered
  - compute, write, emit forbidden in reporter
  - commit_before_reply forbidden in event_triggered and reporter
  - type: reporter required when events: on: form AND has say/propose steps
  # output
  - output.state_changes must never be omitted
  # misc
  - dedup only valid on event-triggered and reporter
  - triggers must be in English, describe intent — keyword-literal form forbidden
  - issue: check only valid when issue.update == check
  - issue: comment only valid when issue.update == comment
  - read: entries may be paths, globs, or special sources (issues:, comments:)
  - priority must be non-negative integer
  - preconditions: each identifier must be in framework state_conditions or literal "any"
  # index-specific
  - index entries must have: id, triggers, file
  - deprecated entries must have replaced_by
  - scenario files must start with # source: comment
  - file path must match scenarios/{id}.yml or frameworks/{fw}/scenarios/{id}.yml
  # call: explicit form (#322)
  - every call: must have scenario, file, load: on_demand
  - implicit call: scenario_id form forbidden
  - call: without file: forbidden
