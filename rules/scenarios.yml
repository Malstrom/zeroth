# rules/scenarios.yml
# Question: "How do I write a scenario?"
#
# Model: GitHub Actions workflows
# Each scenario = one workflow: trigger → read → steps → output
# Canonical anatomy declared below. Validation rules at the bottom.

# ---------------------------------------------------------------------------
# ROUTING
# How the AI picks a scenario before executing anything.
# ---------------------------------------------------------------------------
routing:
  rule: read ALL on: patterns before picking a scenario
  match: first semantic match wins — pick the most specific
  on_no_match: call unknown_scenario
  order: scenarios evaluated top to bottom
  note: |
    The AI resolves the user's language, then matches intent.
    on: patterns are always written in English — language-independent.

# ---------------------------------------------------------------------------
# SCENARIO TYPES
# Three types. Declared via on: form. Each has different constraints.
# ---------------------------------------------------------------------------
scenario_types:

  user_triggered:
    on_form: list of intent strings
    description: |
      Started by the user. Can use all step modules.
      Interaction (say, ask, propose) is expected.
    allowed_steps: all
    note: compute is allowed — it has no side effects and is useful for
          deriving values mid-scenario (e.g. score after an exam loop).

  event_triggered:
    on_form: "on: events: [event-name]"
    description: |
      Runs automatically when a matching event is emitted.
      SILENT — no user interaction. Computes, writes, emits only.
      Interaction delegated to a reporter scenario.
    forbidden_steps: [say, ask, propose, issue]
    allowed_steps: [compute, write, emit, if, call]

  reporter:
    on_form: "on: events: [event-name]"
    description: |
      Runs automatically after event_triggered handlers complete.
      User-facing — communicates results and proposes next actions.
      Does NOT compute or write — reads results written by event_triggered handlers.
      Declared with type: reporter to distinguish from silent event_triggered.
    forbidden_steps: [compute, write, emit]
    allowed_steps: [say, ask, propose, call, if]
    required_field: type: reporter
    note: |
      Pattern: emit → event_triggered (compute + write + emit) → reporter (say + propose).
      The reporter reads from files written by the event_triggered handler.
      It never writes and never emits — it only communicates.

# ---------------------------------------------------------------------------
# EVENT ROUTING
# How the AI handles state_change events emitted by scenarios.
# ---------------------------------------------------------------------------
event_routing:
  mechanism: sequential           # matching scenarios run one after the other
  on_conflict: all_matches        # ALL matching scenarios run — not just first
  execution: automatic            # no user prompt — runs immediately after emitting scenario
  context_inheritance: true       # event-triggered and reporter scenarios inherit calling
                                  # scenario's context (subject, topic, slug, etc.)
  execution_order: |
    For a given event:
    1. All event_triggered scenarios run first (silent, in declaration order)
    2. All reporter scenarios run after (user-facing, in declaration order)
  note: |
    Pattern: emit → silent handler (compute + write + emit) → reporter (say + propose).

# ---------------------------------------------------------------------------
# SCENARIO ANATOMY
# Every scenario is one named key under required_scenarios.
# Fields are listed in reading order — top = evaluated first.
# ---------------------------------------------------------------------------
anatomy:

  # --- identity ---
  name:
    rule: snake_case, lowercase, English
    examples: [study_open, shinsa, readme_sync]

  # --- type (optional, required for reporter) ---
  type:
    rule: omit for user_triggered and event_triggered — required only for reporter
    values: [reporter]
    note: the AI infers user_triggered vs event_triggered from the on: form.
          reporter must be declared explicitly because it shares the events: on: form
          with event_triggered but has different constraints.

  # --- routing ---
  on:
    rule: exactly one form — never both
    forms:
      user_triggered:
        syntax: |
          on:
            - intent description in English
            - another intent description
        note: semantic intent — not literal phrases. The AI matches meaning, not words.
      event_triggered_or_reporter:
        syntax: |
          on:
            events: [event-name-1, event-name-2]
        note: |
          Used by both event_triggered and reporter types.
          Disambiguated by presence of type: reporter field.

  # --- issue lifecycle ---
  creates_issue:
    rule: required on every scenario — the AI never decides autonomously
    values:
      true: AI opens issue before starting, closes on complete
      false: no issue, no lifecycle management

  issue:
    rule: required if and only if creates_issue == true
    fields:
      title:
        rule: short, English, may use {placeholder} for runtime values
        example: "Topic shinsa: {topic}"
      from:
        rule: required — path to markdown template for the issue body
        format: relative path from framework root
        example: "templates/issue_topic_shinsa.md"
        note: |
          inline body: is not allowed — template file is the single source of truth.
          The template may contain {placeholder} values, checklist items, and sections.
      update:
        rule: required — defines how mid-scenario issue steps update the issue
        values:
          check: |
            issue: check: "item" steps edit the issue body and tick the matching checkbox.
            Use when issue.from template contains - [ ] checklist items.
          comment: |
            issue: comment: "text" steps add a comment to the issue.
            The body is never edited after creation.
        default: check
      approval:
        rule: required
        values:
          none: create issue immediately — do not ask for confirmation under any circumstance
        default: none
        note: none is the only valid value — there is no approval flow for issue creation.
      on_complete:
        values: [close]
        default: close
      on_fail:
        values: [comment]
        default: comment

  # --- dedup (event-triggered and reporter only) ---
  dedup:
    rule: optional, event-triggered and reporter scenarios only
    values:
      - once per session
      - once per {variable} per session

  # --- input ---
  read:
    rule: list all files to read BEFORE executing steps
    format: block sequence
    empty: use read: [] — never omit
    note: use glob patterns for directories (e.g. "kata/{subject}/")

  input_sources:
    rule: optional — declare when scenario accepts multiple input types
    allowed_values: [google_drive, attached_file, pasted_text, ai_knowledge]

  # --- logic ---
  steps:
    rule: ordered list of actions — each step uses exactly one module
    modules:

      say:
        description: emit a message to the user
        syntax: "- say: \"message text\""
        note: may use {{token}} for runtime values
        forbidden_in: [event_triggered]

      ask:
        description: ask the user a question and wait for answer before continuing
        syntax: "- ask: \"question text\""
        note: may use {{token}} for runtime values
        forbidden_in: [event_triggered]

      propose:
        description: present an option, wait for confirmation, then execute on_confirm
        syntax: |
          - propose: "action description"
            on_confirm:
              - call: scenario_name
            on_reject:
              - say: "fallback message"
        forbidden_in: [event_triggered]

      compute:
        description: |
          Calculate a derived value from available data — stores result as named variable.
          No side effects. Available in all scenario types.
        syntax: "- compute: variable_name"
        note: |
          The AI derives the value from read: files and inherited context.
          Result is available as {{variable_name}} in subsequent steps.
          Typical uses: score after exam loop, readiness metrics, gap lists.
        forbidden_in: [reporter]

      write:
        description: write a file — behavior declared via access field
        syntax: |
          - write:
              path: "folder/"              # folder path OR exact file path
              filename: "YYYY-MM-DD_{slug}.yml"  # required when path is a folder
              from: templates/file.yml     # required when access is write-once or read-write on new file
              fields: [field1, field2]     # optional — limit write to specific fields
              access: append-only          # required — see access values below
              via: PR                      # always PR — create and merge, no approval needed
              approval: none               # required — execute immediately, no confirmation
        access_values:
          read-write:   create if missing, overwrite if exists
          append-only:  create if missing, append if exists — never overwrite
          write-once:   create if missing, error if exists
          read-only:    never write — error if attempted
        from_rule: |
          from: is required when access is write-once or read-write on a file that may not exist.
          from: is forbidden when access is append-only.
        approval:
          rule: required on every write step
          values:
            none: create PR and merge immediately — do not ask for confirmation under any circumstance
          default: none
          note: none is the only valid value in this framework.
        note: |
          filename is required when path ends with /.
          filename pattern must match a key in rules/files.yml#filename_patterns.
        forbidden_in: [reporter]

      commit_before_reply:
        description: |
          Execute all pending write steps and wait for PRs to merge before
          any say, emit, or propose step runs.
          Use when all writes for the current scenario must be persisted to
          GitHub before the AI communicates any result to the user.
          GitHub is the source of truth — chat is ephemeral.
        syntax: "- commit_before_reply"
        note: no parameters. Place after the last write, before the first say/emit/propose.
        forbidden_in: [event_triggered, reporter]

      call:
        description: invoke another scenario by name
        syntax: "- call: scenario_name"
        note: may be used inside on_confirm or if/then/else

      issue:
        description: mid-scenario issue update — opt-in, only when needed
        syntax: |
          - issue:
              check: "checklist item text"  # ticks that checkbox in issue body (requires update: check)
          # OR
          - issue:
              comment: "free text"          # adds a comment to the open issue (requires update: comment)
        note: |
          Use only for mid-scenario checklist updates or progress comments.
          Must match the issue.update value declared in the issue block.
          Open and close are automatic — do not replicate with issue steps.
        forbidden_in: [event_triggered, reporter]

      if:
        description: conditional branch
        syntax: |
          - if:
              condition: expression
              then:
                - step
              else:
                - step
        note: else is optional

      emit:
        description: emit a state_change event conditionally (inside if/then/else only)
        syntax: "- emit: event-name"
        note: use inside if/then/else only — never unconditionally outside if
        forbidden_in: [reporter]

  # --- output ---
  output:
    rule: required on every scenario
    fields:
      state_changes:
        rule: list of event names emitted when scenario completes unconditionally
        format: block sequence or []
        naming: kebab-case
        empty: use state_changes: [] — never omit
        note: |
          Conditional emits go inside if/then/else steps using emit:.
          Do not list conditional events here — only unconditional ones.

# ---------------------------------------------------------------------------
# REQUIRED SCENARIOS
# Every .scenarios.yml must have these two, in this order.
# ---------------------------------------------------------------------------
required_scenarios:
  - session_start   # first — triggered when session opens
  - unknown_scenario  # last — fallthrough for unmatched intents

# ---------------------------------------------------------------------------
# VALIDATION
# Rules enforced by giskard.
# ---------------------------------------------------------------------------
validation:
  - root key must be required_scenarios
  - session_start must be present
  - unknown_scenario must be present and last
  - every scenario must have: on, creates_issue, read, steps, output
  - on: must be a list (user-triggered) OR have events: key (event-triggered/reporter) — never both
  - if creates_issue == true, issue: block must be present with title, from, update, approval, on_complete, on_fail
  - if creates_issue == true, issue.body inline is forbidden — use issue.from
  - if creates_issue == false, issue: block must be absent
  - every write step must have: path, access, via, approval
  - every write step where access is write-once or read-write must have: from
  - every write step where access is append-only must NOT have: from
  - every write step where path ends with / must have filename
  - filename must match a key in rules/files.yml#filename_patterns
  - say, ask, propose, issue steps are forbidden in event_triggered scenarios
  - compute, write, emit steps are forbidden in reporter scenarios
  - commit_before_reply is forbidden in event_triggered and reporter scenarios
  - output.state_changes must never be omitted
  - dedup is only valid on event-triggered and reporter scenarios
  - trigger patterns and on: events must be in English
  - type: reporter is required when scenario uses events: on: form AND has say/propose steps
  - issue: check steps are only valid when issue.update == check
  - issue: comment steps are only valid when issue.update == comment
