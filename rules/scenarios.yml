# rules/scenarios.yml
# Question: "How do I write scenarios and handlers?"

# ---------------------------------------------------------------------------
# STRUCTURE
# ---------------------------------------------------------------------------
structure:
  root_key: required_scenarios
  required_scenarios: [session_start, unknown_scenario]
  scenario_fields:
    required: [trigger_patterns, read, actions, state_changes]
    optional: [input_sources, when]

# ---------------------------------------------------------------------------
# TRIGGER PATTERNS
# ---------------------------------------------------------------------------
trigger_patterns:
  rule: describe user intent in plain English — semantic matching, not literal phrases
  note: the AI resolves language from global.language or the identity file
  unknown_scenario: must always be the last fallthrough

# ---------------------------------------------------------------------------
# READ
# ---------------------------------------------------------------------------
read:
  rule: list all files to read BEFORE executing actions
  format: block sequence — never flow sequence
  empty: use read: [] — never omit the field

# ---------------------------------------------------------------------------
# ACTIONS
# ---------------------------------------------------------------------------
actions:
  rule: every action uses exactly one declared module — no prose, no loops

  scenario_modules: [say, ask, propose]
  shared_modules: [read, call, update, create, emit, if]
  post_action_hook_only: [call_handlers]

  modules:
    say:
      description: emit a fixed or templated message to the user
      syntax: "- say: \"message text\""

    ask:
      description: ask the user a question and wait for their answer before continuing
      syntax: "- ask: \"question text\""

    propose:
      description: present an option, wait for confirmation, then execute on_confirm
      syntax: |
        - propose: "action description"
          on_confirm:
            - module: ...

    call:
      description: invoke another scenario by name
      syntax: "- call: scenario_name"

    update:
      description: write or modify a file — always via PR unless stated otherwise
      syntax: |
        - update:
            file: path/to/file.yml
            fields: [field1, field2]
            via: PR
            mode: append | overwrite

    create:
      description: create a new file from a template
      syntax: |
        - create:
            file: path/to/new_file.yml
            from: path/to/template.yml
            via: PR

    emit:
      description: emit a state_change event — use inside if only, not unconditionally
      syntax: "- emit: event-name"
      note: do not declare the same event in both emit and state_changes

    if:
      description: conditional branch
      syntax: |
        - if:
            condition: expression
            then:
              - module: ...
            else:
              - module: ...

    read:
      description: conditional file read inside actions
      note: prefer the top-level read field for unconditional reads

    call_handlers:
      description: invoke all handlers matching the current state_change
      post_action_hook_only: true
      syntax: "- call_handlers: matching"

# ---------------------------------------------------------------------------
# HANDLERS
# ---------------------------------------------------------------------------
handlers:
  rule: reactive to state_changes — never user-triggered
  forbidden_in_actions: [say, ask, propose]
  required_fields: [listen, dedup, actions, state_changes]
  dedup_values:
    - once per session
    - once per {variable} per session

# ---------------------------------------------------------------------------
# STATE_CHANGES
# ---------------------------------------------------------------------------
state_changes:
  rule: list of event names emitted when the scenario completes
  format: block sequence or []
  naming: kebab-case
  empty: use state_changes: [] — never omit

# ---------------------------------------------------------------------------
# INPUT_SOURCES
# ---------------------------------------------------------------------------
input_sources:
  rule: optional field for scenarios that accept multiple input types
  allowed_values: [google_drive, attached_file, pasted_text, ai_knowledge]

# ---------------------------------------------------------------------------
# VALIDATION
# ---------------------------------------------------------------------------
validation:
  - root key must be required_scenarios
  - session_start and unknown_scenario must be present
  - unknown_scenario must be last
  - every action item must use a declared module
  - say/ask/propose forbidden in handler actions
  - emit and state_changes must not declare the same event
  - trigger patterns must be intent descriptions in English — not phrases in any language
  - placeholders in file paths must be quoted strings
  - read must never be omitted
  - state_changes must never be omitted
