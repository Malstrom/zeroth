  #         path: "some/folder/"
  #         filename: "YYYY-MM-DD_{slug}.yml"
  #         from: templates/x.yml
  #         access: write-once
  #         via: PR
  #     - issue:
  #         check: "file created"
  #     - write:
  #         path: .state.yml
  #         fields: [last_x]
  #         access: read-write
  #         via: PR
  #     - issue:
  #         check: "state updated"
  #   output:
  #     state_changes: [x-created]

