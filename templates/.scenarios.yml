# .scenarios.yml
# AI-only scenario catalog.
# Model: GitHub Actions workflows — on: for routing, steps: for logic
# Each scenario = one workflow: trigger → read → steps → output
# Syntax: rules/scenarios.yml
# Spec: github.com/Malstrom/zeroth

required_scenarios:

  session_start:
    on:
      - session opens automatically
    creates_issue: false
    # declare identity or state file here (e.g. .gakusei.yml)
    read: []
    steps:
      - say: "{{greeting_with_current_state}}"
      - propose: "{{most_relevant_next_action}}"
        on_confirm:
          - call: # most_relevant_scenario
    output:
      state_changes: []

  unknown_scenario:
    on:
      - any message that does not match any other scenario
    creates_issue: false
    read: []
    steps:
      - propose: "Did you mean: {{closest_scenario}}?"
        on_confirm:
          - call: "{{closest_scenario}}"
      - if:
          condition: no_match
          then:
            - say: "Scenario not defined. Want me to add it?"
    output:
      state_changes: []

  # ---------------------------------------------------------------------------
  # Add framework-specific scenarios below.
  # Syntax reference: rules/scenarios.yml
  # ---------------------------------------------------------------------------

  # EXAMPLE — user-triggered scenario that writes a file and opens an issue:
  #
  # example_create:
  #   on:
  #     - user wants to create a new X
  #     - user asks to start a new X
  #   creates_issue: true
  #   issue:
  #     title: "Create X: {slug}"
