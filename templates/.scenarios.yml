# .scenarios.yml
# AI-only scenario catalog.
# All user-triggered flows live here. Referenced by .agent.yml.
# Syntax: rules/scenarios.yml
# Spec: github.com/Malstrom/zeroth

required_scenarios:

  session_start:
    trigger_patterns:
      - session opens automatically
    read:
      - # declare identity file here (e.g. .gakusei.yml)
    actions:
      - say: "intent: greet user and summarise current state"
      - propose: "intent: suggest the most relevant next action"
        on_confirm:
          - call: # most_relevant_scenario
    state_changes: []

  unknown_scenario:
    trigger_patterns:
      - any message that does not match any other scenario
    read: []
    actions:
      - propose: "Did you mean: {{closest_scenario}}?"
        on_confirm:
          - call: "{{closest_scenario}}"
      - if:
          condition: no_match
          then:
            - say: "Scenario not defined. Want me to add it?"
    state_changes: []

  # add framework-specific scenarios below
  # syntax reference: rules/scenarios.yml
  # every scenario must have: trigger_patterns, read, actions, state_changes
  # actions must use declared modules only — no free-form prose
