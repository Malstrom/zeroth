# .agent.yml
# AI-only operational manifest for the {framework} framework.

# ---------------------------------------------------------------------------
# LANGUAGE
# ---------------------------------------------------------------------------
language:
  chat: read from .{identity}.yml # language used when speaking with the user
  files: english                  # all file content, commits, PR/issue bodies
  filenames: english              # all file names AND folder names (snake_case, lowercase)

# ---------------------------------------------------------------------------
# WORK RULES
# ---------------------------------------------------------------------------
work_rules:
  branch_per_issue: true
  branch_naming: "{type}/{short-description}"
  all_writes_via_pr: true
  merge_strategy: squash
  # framework-specific rules: key: value — explanation

# ---------------------------------------------------------------------------
# TOOL APPROVAL
# false = execute immediately, no confirmation needed
# true  = always ask before executing
# ---------------------------------------------------------------------------
tool_approval:
  create_branch: false
  push_files: false
  create_pr: false
  create_issue: false
  create_sub_issue: false
  update_issue: false
  merge_to_main: false
  delete_file: true
  destructive_ops: true

# ---------------------------------------------------------------------------
# SCENARIOS
# Read .scenarios.yml BEFORE any reasoning.
# Every user message must be matched against scenarios first.
# ---------------------------------------------------------------------------
scenarios:
  file: .scenarios.yml
  spec: zeroth/rules/scenarios.yml
  read_before_responding: true
  on_no_match: propose new scenario to user before proceeding

# ---------------------------------------------------------------------------
# WORKSPACE
# Exact paths: named keys
# Glob patterns: under patterns list
# Filename conventions live in each scenario's create action, not here.
# ---------------------------------------------------------------------------
workspace:
  .{identity}.yml:
    role: user/student identity, progress, language
    access: read-write
  .scenarios.yml:
    role: scenario catalog
    access: read-only
  .registry.yml:
    role: cross-repo connections
    access: read-only
  templates/:
    role: file templates
    access: read-only
  # add framework-specific named keys here
  patterns:
    # - path: "some/glob/**"
    #   role: description
    #   access: read-only | read-write | append-only | write-once
