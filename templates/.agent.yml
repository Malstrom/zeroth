# .agent.yml
# AI-only operational manifest. Not for humans.
# Read this at the start of every session.
# Spec: Malstrom/zeroth:rules/agent.yml

# ---------------------------------------------------------------------------
# CONNECTOR CHECK
# Must be first. If connector not active, stop.
# ---------------------------------------------------------------------------
connector_check:
  on_failure: say "GitHub connector not active. Click + → GitHub → new chat." and stop
  forbidden: fall back to web or browser

# ---------------------------------------------------------------------------
# GLOBAL
# ---------------------------------------------------------------------------
global:
  language:
    chat: read from identity file   # language used in conversation with the user
    files: english                  # all file content, commits, PR/issue bodies
    filenames: english              # all file names AND folder names (snake_case, lowercase)
  pr_strategy: batch_per_session
  merge_strategy: squash
  dedup_scope: current_session
  trigger_matching: pattern_first
  # add framework-specific global rules here

# ---------------------------------------------------------------------------
# REPO MAP
# ---------------------------------------------------------------------------
repo_map:
  this: "{{owner}}/{{repo}}"
  zeroth: Malstrom/zeroth

# ---------------------------------------------------------------------------
# FRAMEWORK
# Cross-repo references — owner/repo:path format (see Malstrom/zeroth:rules/agent.yml)
# ---------------------------------------------------------------------------
framework:
  name: "{{framework_name}}"
  scenarios: "Malstrom/zeroth:frameworks/{{framework_name}}/.scenarios.yml"
  templates: "Malstrom/zeroth:frameworks/{{framework_name}}/templates/"
  rules: "Malstrom/zeroth:rules/"

# ---------------------------------------------------------------------------
# FILE ACCESS
# ---------------------------------------------------------------------------
file_access:
  .agent.yml: read-only
  .registry.yml: read-only
  # add all framework-specific paths here
  # examples:
  #   identity_file.yml: read-write
  #   "logs/**": append-only
  #   "output/**": read-write

# ---------------------------------------------------------------------------
# TOOL APPROVAL
# false = execute immediately, no confirmation needed
# true  = always ask before executing
# ---------------------------------------------------------------------------
tool_approval:
  create_branch: false
  push_files: false
  create_pr: false
  create_issue: false
  create_sub_issue: false
  update_issue: false
  merge_to_main: false
  delete_file: true
  destructive_ops: true

# ---------------------------------------------------------------------------
# WRITE AHEAD
# ---------------------------------------------------------------------------
write_ahead:
  rule: never push directly to main — always branch → PR → squash merge
  branch_naming: "{type}/{short-description}"
  immutable_logs: immediate PR, not batched

# ---------------------------------------------------------------------------
# SCENARIOS
# Read .scenarios.yml BEFORE any reasoning.
# Every user message must be matched against scenarios first.
# ---------------------------------------------------------------------------
scenarios:
  scenarios_file: "Malstrom/zeroth:frameworks/{{framework_name}}/.scenarios.yml"
  spec: Malstrom/zeroth:rules/scenarios.yml
  read_before_responding: true
  on_no_match: propose new scenario to user before proceeding

# ---------------------------------------------------------------------------
# POST ACTION HOOK
# ---------------------------------------------------------------------------
post_action_hook:
  after_every_state_change:
    - read: .registry.yml
    - if:
        condition: matching_sync_triggers_exist
        then:
          - call_handlers: matching
  conflict_check:
    if_open_pr_on_same_file: stop and notify user

# ---------------------------------------------------------------------------
# HANDLERS
# ---------------------------------------------------------------------------
handlers: {}
