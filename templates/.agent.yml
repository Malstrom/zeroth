# .agent.yml
# AI-only operational manifest. Not for humans.
# Read this at the start of every session.
# Spec: github.com/Malstrom/zeroth

# ---------------------------------------------------------------------------
# CONNECTOR CHECK — obbligatorio, primo blocco
# ---------------------------------------------------------------------------
connector_check:
  on_fail: |
    Say: "GitHub connector not active."
    Stop immediately. Do not fall back to web or browser.

# ---------------------------------------------------------------------------
# GLOBAL
# ---------------------------------------------------------------------------
global:
  language: italiano
  pr_strategy: batch_per_session
  dedup_scope: current_session_log
  trigger_matching: pattern_first

# ---------------------------------------------------------------------------
# REPO MAP
# ---------------------------------------------------------------------------
repo_map:
  # definire qui tutti i file con il loro ruolo
  # esempio:
  # sensei.md: identity and profile
  # log/: immutable session records

# ---------------------------------------------------------------------------
# FILE ACCESS
# ---------------------------------------------------------------------------
file_access:
  agent_files: read-only
  registry_files: read-only
  # aggiungere tutti i file con permessi espliciti

# ---------------------------------------------------------------------------
# TOOL APPROVAL
# ---------------------------------------------------------------------------
tool_approval:
  file_edit: false
  create_pr: false
  merge_to_main: false
  destructive_ops: true

# ---------------------------------------------------------------------------
# WRITE-AHEAD
# ---------------------------------------------------------------------------
write_ahead:
  rule: commit before responding

# ---------------------------------------------------------------------------
# SCENARIOS
# ---------------------------------------------------------------------------
scenarios:

  session_start:
    trigger_patterns:
      - session opens (automatic)
    read: []  # definire cosa leggere
    actions:
      - respond in declared language
      - propose next action
    state_changes: []

  unknown_scenario:
    trigger_patterns:
      - any message that does not match any other scenario
    actions:
      - map to closest scenario and ask confirmation
      - if no match: ask user if they want to add it
    state_changes: []

# ---------------------------------------------------------------------------
# HANDLERS
# ---------------------------------------------------------------------------
handlers:
  # definire handler reattivi agli state_changes degli scenari
  # ogni handler DEVE avere dedup dichiarato
