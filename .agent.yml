# .agent.yml
# AI-only operational manifest for zeroth.
# Read this before answering anything. Single entry point.

# ---------------------------------------------------------------------------
# LANGUAGE
# ---------------------------------------------------------------------------
language:
  chat: italian                   # language used in conversation with Igor
  files: english                  # all file content, commits, PR/issue bodies
  filenames: english              # all file names AND folder names (snake_case, lowercase)

# ---------------------------------------------------------------------------
# WORK RULES
# ---------------------------------------------------------------------------
work_rules:
  branch_per_issue: true
  branch_naming: "{type}/{short-description}"
  all_writes_via_pr: true
  merge_strategy: squash

# ---------------------------------------------------------------------------
# TOOL APPROVAL
# false = execute immediately, no exceptions — irreversibility is not a reason to ask
# true  = always ask before executing
# ---------------------------------------------------------------------------
tool_approval:
  create_branch: false
  push_files: false
  create_pr: false
  create_issue: false
  create_sub_issue: false
  update_issue: false
  merge_to_main: false
  delete_file: true
  destructive_ops: true

# ---------------------------------------------------------------------------
# HARD RULES
# zeroth is the source of hard_rules — they are defined here, not inherited.
# ---------------------------------------------------------------------------
hard_rules: {}

# ---------------------------------------------------------------------------
# PHILOSOPHY
# Read .philosophy.yml BEFORE scenarios at every session start.
# ---------------------------------------------------------------------------
philosophy:
  file: .philosophy.yml
  read_before_responding: true

# ---------------------------------------------------------------------------
# SCENARIOS
# Read .scenarios.yml BEFORE any reasoning.
# Every user message must be matched against scenarios first.
# ---------------------------------------------------------------------------
scenarios:
  spec: .scenarios.yml
  read_before_responding: true
  on_no_match: propose new scenario to user before proceeding

# ---------------------------------------------------------------------------
# WORKSPACE
# ---------------------------------------------------------------------------
workspace:
  .agent.yml:
    role: AI manifest
    access: read-only
  .philosophy.yml:
    role: system philosophy and cross-framework model
    access: read-only
  .scenarios.yml:
    role: scenario catalog
    access: read-only
  .registry.yml:
    role: cross-repo connections
    access: read-only
  README.md:
    role: human-facing repo overview
    access: read-write
  rules/:
    role: canonical rules for zeroth spec (agent, scenarios, files, connections)
    access: read-write
  frameworks/:
    role: framework definitions (one subfolder per framework)
    access: read-write
  templates/:
    role: base templates for new framework files
    access: read-write
  patterns:
    - path: "scenarios/*.yml"
      role: zeroth scenario files — one per scenario, referenced by .scenarios.yml index
      access: read-write
    - path: "rules/*.yml"
      role: individual rule files
      access: read-write
    - path: "rules/checks.yml"
      role: giskard validation checks — canonical source of all proxy validation rules used by giskard
      access: read-write
    - path: "frameworks/**/.agent.yml"
      role: framework AI manifests
      access: read-write
    - path: "frameworks/**/.scenarios.yml"
      role: framework scenario catalogs
      access: read-write
    - path: "frameworks/**/*.yml"
      role: framework spec files
      access: read-write
    - path: "templates/*"
      role: template files
      access: read-write

# ---------------------------------------------------------------------------
# DANEEL FRAMEWORK — workspace paths
# All paths below are relative to any daneel instance repo root.
# These are the dynamic paths the AI reads/writes during daneel scenarios.
# Static/canonical paths (templates, scenarios, checks) live in frameworks/daneel/.
# ---------------------------------------------------------------------------
daneel:
  # Source of truth: GitHub issues (not files)
  # Open tasks  → github_issues state:open  label:client:{slug}
  # Task history → github_issues state:closed label:client:{slug}
  # Progress     → issue comments (issue_comment_progress.md template)
  # Closing note → issue comments (issue_comment_close.md template)
  # Draft reply  → issue comments (section: Draft reply)

  # Static client data — read-only during scenarios
  client_context:
    path: "clients/{slug}/context.yml"
    template: "frameworks/daneel/templates/client_context.yml"
    access: read-only
    note: >
      Written once at client onboarding.
      Contains: slug, legal_name, SSH access, tools, timezone, language.

  # Contact profiles — read-only during scenarios
  contact:
    path: "contacts/{client}_{first}_{last}.yml"
    template: "frameworks/daneel/templates/contact.yml"
    access: read-only
    note: >
      One file per person. A contact that works across multiple clients
      has a single file with a clients list.

  # Client playbooks — written by create_playbook, read by work_session
  client_playbook:
    path: "clients/{slug}/playbooks/{work_type}_{descriptor}.yml"
    template: "frameworks/daneel/templates/playbook_client.yml"
    access: read-write
    write_rule: >
      After every write, ALWAYS update clients/{slug}/playbooks/_index.yml.
      No exceptions. Validated by giskard proxy playbook_index_consistent.

  # Client playbook index — written by create_playbook and reindex
  client_playbook_index:
    path: "clients/{slug}/playbooks/_index.yml"
    template: "frameworks/daneel/templates/playbook_index.yml"
    access: read-write
    write_rule: >
      Must be updated atomically with every client_playbook write or delete.
      Action: upsert (insert or update existing entry by file key).
      Validated by giskard checks/frameworks/daneel.py.

  # Root playbooks — written by create_playbook on promotion
  root_playbook:
    path: "playbooks/{work_type}_{descriptor}.yml"
    template: "frameworks/daneel/templates/playbook_root.yml"
    access: read-write
    write_rule: >
      Created only on explicit user confirmation during create_playbook promotion step.
      After every write, ALWAYS update playbooks/_index.yml.

  # Root playbook index
  root_playbook_index:
    path: "playbooks/_index.yml"
    template: "frameworks/daneel/templates/playbook_index.yml"
    access: read-write
    write_rule: >
      Must be updated atomically with every root_playbook write or delete.
      Action: upsert. Validated by giskard.

  # Checks and rules — read-only reference
  checks:
    path: "frameworks/daneel/checks.yml"
    access: read-only
    note: Giskard check definitions for this framework.

  rules:
    playbooks: "frameworks/daneel/rules/playbooks.yml"
    structure: "frameworks/daneel/rules/structure.yml"
    access: read-only

  # Label conventions (must match vocabulary/overview.yml)
  labels:
    client: "client:{slug}"           # e.g. client:acme
    work_type: "work:{work_type}"     # e.g. work:contract_review
    note: >
      Every issue must have exactly one client label and one work_type label.
      Labels are created on first use if they do not exist.

  # Validation — giskard
  giskard:
    repo: Malstrom/giskard
    proxy: playbook_index_consistent
    trigger: >
      Run after any create_playbook or reindex scenario completes.
      On failure: read structured YAML output, run reindex, re-run check.

# ---------------------------------------------------------------------------
# KNOWN REPOS
# ---------------------------------------------------------------------------
known_repos:
  giskard:
    repo: Malstrom/giskard
    description: >
      Universal zeroth rules validator for the Malstrom ecosystem.
      Validates any repo against zeroth/rules/ (files, agent, scenarios, connections).
      Check definitions live in zeroth/rules/checks.yml — giskard reads them at runtime.
      Runs as GitHub Action on PRs.
      Entry point: giskard.py. Core logic: core.py. Framework checks: checks/.
      Two modes: instance (default) and zeroth.
