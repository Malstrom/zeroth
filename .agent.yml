# .agent.yml
# AI-only operational manifest. Not for humans.
# Read this at the start of every session. Single entry point.
# Model: Ansible-inspired — scenarios (user-triggered) + handlers (auto-reactive)
# Spec: github.com/Malstrom/zeroth

# ---------------------------------------------------------------------------
# CONNECTOR CHECK
# ---------------------------------------------------------------------------
connector_check:
  on_fail: |
    Say: "GitHub connector not active. Click + → GitHub → new chat."
    Stop immediately. Do not fall back to web or browser.

# ---------------------------------------------------------------------------
# GLOBAL
# ---------------------------------------------------------------------------
global:
  language: Italian
  pr_strategy: batch_per_session
  merge_strategy: squash
  dedup_scope: current_session
  trigger_matching: pattern_first

# ---------------------------------------------------------------------------
# REPO MAP
# ---------------------------------------------------------------------------
repo_map:
  rules/laws.yml: L1 + L2 hierarchy — read this first for all rules
  rules/agent.yml: universal rules for .agent.yml structure
  rules/scenarios.yml: universal rules for writing scenarios and handlers
  rules/structure.yml: universal rules for repo structure
  rules/naming.yml: universal naming rules + language rule
  rules/registry.yml: universal rules for .registry.yml
  rules/sync.yml: universal cross-repo sync patterns
  rules/log.yml: universal immutability and logging rules
  frameworks/dojo/.agent.yml: dojo framework AI manifest
  frameworks/dojo/.scenarios.yml: dojo framework scenario catalog
  frameworks/dojo/overview.yml: dojo framework overview and vocabulary
  frameworks/dojo/structure.yml: dojo framework directory structure spec
  frameworks/dojo/checklist.yml: dojo framework giskard validation checklist
  frameworks/tensho/: spec and validation rules for the tensho framework
  frameworks/sudo-hire-me/: spec and validation rules for the sudo-hire-me framework
  templates/.agent.yml: base template for new framework agent files
  templates/.scenarios.yml: base template for new framework scenarios files
  templates/.registry.yml: base template for new framework registry files
  templates/overview.yml: base template for new framework overview files

# ---------------------------------------------------------------------------
# FILE ACCESS
# ---------------------------------------------------------------------------
file_access:
  .agent.yml: read-only
  .registry.yml: read-only
  .scenarios.yml: read-only
  rules/laws.yml: read-only
  rules/*.yml: read-write
  frameworks/**/*.yml: read-write
  frameworks/**/.agent.yml: read-write
  frameworks/**/.scenarios.yml: read-write
  templates/*: read-write

# ---------------------------------------------------------------------------
# TOOL APPROVAL
# ---------------------------------------------------------------------------
tool_approval:
  feature_branch: false
  file_edit: false
  push_files: false
  create_pr: false
  create_issue: false
  update_issue: false
  merge_to_main: false
  delete_file: true
  destructive_ops: true

# ---------------------------------------------------------------------------
# WRITE-AHEAD
# ---------------------------------------------------------------------------
write_ahead:
  rule: commit before responding
  branch_strategy: |
    NEVER push directly to main.
    Always: feature branch → PR → squash merge.
    Branch naming: {type}/{short-description}
    Types: feat, fix, docs, test, chore

# ---------------------------------------------------------------------------
# WORK STYLE
# ---------------------------------------------------------------------------
work_style:
  new_topic_in_chat:
    rule: open issue immediately
    precision: low_ok
    update_before_pr: true
  applies_to: all_repos

  issue_discipline:
    rule: issues are the single source of truth for every decision made in chat
    always:
      - every decision or constraint agreed in chat → update current issue before moving on
      - every new topic that emerges → open a new issue immediately, even mid-conversation
      - never let a decision live only in chat — if it's not in the issue, it doesn't exist
    update_trigger: after every decision, clarification, or constraint agreed with Igor
    open_trigger: when topic shifts or a new workstream is identified
    applies_to: all_repos

# ---------------------------------------------------------------------------
# SCENARIOS
# ---------------------------------------------------------------------------
scenarios:
  scenarios_file: .scenarios.yml

# ---------------------------------------------------------------------------
# POST-ACTION HOOK
# ---------------------------------------------------------------------------
post_action_hook:
  after_every_state_change:
    - read: .registry.yml
    - if:
        condition: matching_sync_triggers_exist
        then:
          - call_handlers: matching
  conflict_check:
    if_open_pr_on_same_file: stop and notify Igor

# ---------------------------------------------------------------------------
# HANDLERS
# ---------------------------------------------------------------------------
handlers:

  giskard_sync:
    listen:
      - framework-added
      - giskard-updated
    dedup: once per session
    actions:
      - if:
          condition: event == framework-added
          then:
            - update:
                file: Malstrom/giskard:giskard.py
                fields: [ZEROTH_CHECKLISTS]
                via: PR
      - if:
          condition: event == giskard-updated
          then:
            - update:
                file: Malstrom/giskard:giskard.py
                fields: [REQUIRED_TEMPLATES]
                via: PR
    state_changes: []

  readme_sync:
    listen:
      - framework-added
      - rule-updated
    dedup: once per session
    actions:
      - update:
          file: README.md
          fields: [structure, registered_frameworks]
          via: PR
    state_changes:
      - readme-updated

  propagate_rule:
    listen:
      - rule-updated
    dedup: once per rule per session
    actions:
      - read: .registry.yml
      - if:
          condition: repo.access == read-write and rule_impacts_agent
          then:
            - update:
                file: "{repo}/.agent.yml"
                via: PR
    state_changes: []
