# dojo framework — overview

framework: dojo
purpose: AI-assisted learning framework — the repository is the source of truth, the AI is the sensei, the user is the student

cycle: study -> randori -> final_exam -> level_up

vocabulary:
  kata: unit of knowledge — theory, explanations, examples, and snippets for one topic, organised by subject
  kiroku: immutable session record — what was studied, drilled, or examined
  kiroku_index: human-readable study map — one line per learned topic across all subjects
  randori: interactive drill during study — the AI asks one or two questions after each concept, no score
  final_exam: end-of-book assessment — 10 to 15 questions covering the full book, scored, required before level_up
  gakusei: the student profile
  .gakusei.yml: machine-readable student profile — the AI reads this at every session start
  gakusei.md: human-readable student profile — shows current level and what has been learned
  library: collection of books available for study, from Google Drive, attached files, pasted text, or AI knowledge fallback

key_principles:
  - one repository per student instance
  - the AI reads .gakusei.yml at session start — no exceptions
  - kiroku files are immutable — append-only, never overwrite
  - mastery state lives in .gakusei.yml — not in AI memory
  - files for the AI are hidden YAML files; files for the human are Markdown
  - kata/ and kiroku/ are organised by subject subfolder
  - level progression requires completing a book and passing final_exam
  - the AI proposes level_up, the student confirms

levels:
  - not_started
  - beginner
  - intermediate
  - advanced

library_sources:
  - google_drive: shared folder link — the AI downloads the PDF
  - attached_file: PDF, DOCX, MD, TXT, or similar text-readable attachment from chat
  - pasted_text: chapter text pasted inline in chat
  - ai_knowledge: no book provided — the AI teaches from its own knowledge, adapted to the student level
