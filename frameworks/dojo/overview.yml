# overview.yml
# Framework overview — purpose, vocabulary, key principles.

framework: dojo
purpose: >
  AI-assisted learning framework.
  A dojo is a structured space where a learner and an AI trainer work together
  through deliberate practice: study, test, review, repeat.

cycle:
  - study: learner reads or is taught a topic (kata)
  - test: AI quizzes the learner on the kata
  - review: AI surfaces weak points and suggests next kata
  - repeat: cycle restarts on the next kata or a failed one

vocabulary:
  dojo: a repository instance dedicated to learning one subject
  kata: unit of knowledge for one topic
  sensei: the AI acting as trainer/reviewer
  gakusei: the learner (human)
  belt: progression marker — tracks mastery level across kata
  log: append-only record of completed sessions

key_principles:
  - one repository per instance
  - the AI reads the identity file at session start — no exceptions
  - files for the AI are hidden YAML files
  - files for the human are Markdown
  - immutable logs are declared explicitly and never overwritten
  - no kata is marked mastered until the learner passes a test without hints
  - the sensei always proposes the next kata — the gakusei never chooses blindly
