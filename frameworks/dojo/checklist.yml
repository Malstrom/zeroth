# dojo framework — validation checklist
# A repository is a valid dojo instance if ALL checks below pass.
# Each check declares a proxy — giskard executes it, no framework logic in the runner.

structure:
  - label: .agent.yml exists in root
    proxy: file_exists
    target: .agent.yml

  - label: .scenarios.yml exists in root
    proxy: file_exists
    target: .scenarios.yml

  - label: .registry.yml exists in root
    proxy: file_exists
    target: .registry.yml

  - label: .gakusei.yml exists in root
    proxy: file_exists
    target: .gakusei.yml

  - label: README.md exists in root
    proxy: file_exists
    target: README.md

  - label: "kata/ exists with at least one subject subfolder"
    proxy: dir_has_subfolders
    target: kata/

  - label: kiroku/ exists
    proxy: file_exists
    target: kiroku

  - label: "kiroku/makimono/ exists"
    proxy: file_exists
    target: kiroku/makimono

  - label: "kiroku/nikki/ exists"
    proxy: file_exists
    target: kiroku/nikki

  - label: templates/ exists with all required templates
    proxy: dir_has_templates
    target: templates/
    required_files:
      - kata.md
      - kiroku_nikki.md
      - kiroku_makimono.md
      - shinsa.md

  - label: densho/ does NOT exist
    proxy: file_exists
    target: densho
    must_exist: false

  - label: sensei.yml does NOT exist
    proxy: file_exists
    target: sensei.yml
    must_exist: false

  - label: sensei.md does NOT exist
    proxy: file_exists
    target: sensei.md
    must_exist: false

  - label: scroll/ does NOT exist
    proxy: file_exists
    target: scroll
    must_exist: false

templates:
  - label: "kata.md matches zeroth canonical version"
    proxy: template_matches_zeroth
    framework: dojo
    template: kata.md

  - label: "kiroku_nikki.md matches zeroth canonical version"
    proxy: template_matches_zeroth
    framework: dojo
    template: kiroku_nikki.md

  - label: "kiroku_makimono.md matches zeroth canonical version"
    proxy: template_matches_zeroth
    framework: dojo
    template: kiroku_makimono.md

  - label: "shinsa.md matches zeroth canonical version"
    proxy: template_matches_zeroth
    framework: dojo
    template: shinsa.md

agent_yml:
  block_order:
    - label: connector_check is the first block
      proxy: yaml_first_key
      file: .agent.yml
      expected: connector_check

    - label: repo_map is present
      proxy: yaml_key_exists
      file: .agent.yml
      key: repo_map

    - label: file_access is present
      proxy: yaml_key_exists
      file: .agent.yml
      key: file_access

    - label: tool_approval is present
      proxy: yaml_key_exists
      file: .agent.yml
      key: tool_approval

    - label: write_ahead is present
      proxy: yaml_key_exists
      file: .agent.yml
      key: write_ahead

    - label: scenarios is present and declares scenarios_file
      proxy: yaml_subkeys_exist
      file: .agent.yml
      key: scenarios
      required_subkeys: [scenarios_file]

    - label: handlers is present
      proxy: yaml_key_exists
      file: .agent.yml
      key: handlers

  global:
    - label: global.language reads from .gakusei.yml
      proxy: yaml_key_contains
      file: .agent.yml
      key: global.language
      contains: .gakusei.yml

    - label: global.pr_strategy is batch_per_session
      proxy: yaml_key_equals
      file: .agent.yml
      key: global.pr_strategy
      expected: batch_per_session

    - label: global.merge_strategy is squash
      proxy: yaml_key_equals
      file: .agent.yml
      key: global.merge_strategy
      expected: squash

    - label: global.dedup_scope is current_session
      proxy: yaml_key_equals
      file: .agent.yml
      key: global.dedup_scope
      expected: current_session

  scenarios:
    - label: session_start scenario is present in .scenarios.yml
      proxy: scenario_present
      scenario: session_start

    - label: study_open scenario is present with all 4 input_sources
      proxy: scenario_input_sources
      scenario: study_open
      min_count: 4

    - label: randori scenario is present in .scenarios.yml
      proxy: scenario_present
      scenario: randori

    - label: quiz scenario is present in .scenarios.yml
      proxy: scenario_present
      scenario: quiz

    - label: shinsa scenario is present in .scenarios.yml
      proxy: scenario_present
      scenario: shinsa

    - label: level_up scenario is present in .scenarios.yml
      proxy: scenario_present
      scenario: level_up

    - label: unknown_scenario is the last scenario
      proxy: scenario_last
      scenario: unknown_scenario

    - label: final_exam does NOT exist (renamed to shinsa)
      proxy: scenario_not_present
      scenario: final_exam

  handlers:
    - label: session_end handler is present
      proxy: handler_present
      handler: session_end

    - label: session_end has dedup declared
      proxy: handler_has_key
      handler: session_end
      key: dedup

    - label: session_end has state_changes declared
      proxy: handler_has_key
      handler: session_end
      key: state_changes

gakusei_yml:
  - label: name field exists
    proxy: yaml_key_exists
    file: .gakusei.yml
    key: name

  - label: language field exists
    proxy: yaml_key_exists
    file: .gakusei.yml
    key: language

  - label: subjects field exists as map
    proxy: yaml_key_exists
    file: .gakusei.yml
    key: subjects

  - label: "levels are one of: not_started, beginner, intermediate, advanced"
    proxy: yaml_levels_valid
    file: .gakusei.yml
    key: subjects
    allowed: [not_started, beginner, intermediate, advanced]

  - label: last_session field exists with subject, topic, next
    proxy: yaml_subkeys_exist
    file: .gakusei.yml
    key: last_session
    required_subkeys: [subject, topic, next]

  - label: active_books field exists as list
    proxy: yaml_key_exists
    file: .gakusei.yml
    key: active_books

  - label: completed_books field exists as list
    proxy: yaml_key_exists
    file: .gakusei.yml
    key: completed_books

behaviour:
  - label: the AI reads .gakusei.yml at every session start
    proxy: text_search
    file: .scenarios.yml
    terms: [session_start]

  - label: kiroku/nikki files are append-only — never overwritten
    proxy: file_access_mode
    pattern: "kiroku/nikki/**"
    mode: append

  - label: shinsa records are committed before the AI responds
    proxy: write_ahead_rule
    contains: commit before responding

  - label: shinsa gives no feedback during the exam — only final score
    proxy: text_search
    file: .scenarios.yml
    terms: ["only your final score"]

  - label: shinsa has exactly 10 open-ended questions — never multiple choice
    proxy: token_count
    file: .scenarios.yml
    token: open_exam_question_
    expected: 10

  - label: quiz uses multiple choice (A/B/C/D) from kata — no state saved
    proxy: text_search
    file: .scenarios.yml
    terms: ["mc_question"]

  - label: level_up requires student confirmation — never automatic
    proxy: text_search
    file: .scenarios.yml
    terms: ["AI proposes", "student confirms"]

  - label: templates are read before generating any document
    proxy: text_search
    file: .agent.yml
    terms: ["templates"]
