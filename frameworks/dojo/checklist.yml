# dojo framework — validation checklist
# A repository is a valid dojo instance if ALL items below are true

structure:
  - .agent.yml exists in root
  - .scenarios.yml exists in root
  - .registry.yml exists in root
  - .gakusei.yml exists in root
  - gakusei.md exists in root
  - README.md exists in root
  - kata/ exists with at least one subject subfolder
  - kiroku/ exists with _index.md
  - templates/ exists with all required templates
  - densho/ does NOT exist
  - sensei.yml does NOT exist
  - sensei.md does NOT exist
  - scroll/ does NOT exist

agent_yml:
  - connector_check is the first block
  - global.language reads from .gakusei.yml
  - global.pr_strategy is batch_per_session
  - .agent.yml explicitly references .scenarios.yml
  - session_start scenario is present in .scenarios.yml
  - study_open scenario is present in .scenarios.yml with all 4 input_sources
  - randori scenario is present in .scenarios.yml
  - final_exam scenario is present in .scenarios.yml
  - level_up scenario is present in .scenarios.yml
  - session_end handler is present
  - level_up rule states: AI proposes, student confirms

gakusei_yml:
  - name field exists
  - language field exists
  - subjects field exists as map of subject -> level
  - levels are one of: [not_started, beginner, intermediate, advanced]
  - last_session field exists with subject, topic, next
  - active_books field exists as list
  - completed_books field exists as list
  - exams field exists per subject with status and threshold

behaviour:
  - the AI reads .gakusei.yml at every session start
  - the AI updates .gakusei.yml and gakusei.md after every session
  - kiroku files are append-only — never overwritten
  - exam records are committed before the AI responds
  - level_up requires student confirmation
  - the AI adapts explanation depth to the student level in .gakusei.yml
  - the AI never reads densho/ because it does not exist
  - templates are read before generating any document
