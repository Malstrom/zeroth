# dojo framework — validation checklist
# A repo is a valid dojo instance if ALL items below are true

structure:
  - .agent.yml exists in root
  - .registry.yml exists in root
  - sensei.md exists in root
  - onboarding.yml exists in root
  - kata/ exists with .agent.yml
  - scroll/ exists with .agent.yml and README.md
  - log/ directory exists
  - templates/ exists with all required templates
  - densho/ exists with .agent.yml

agent_yml:
  - connector_check is the first block
  - global.language reads from sensei.md
  - global.pr_strategy is batch_per_session
  - all 6 required scenarios are present
  - all 3 required handlers are present
  - write_ahead.exam_mode is defined
  - tool_approval.destructive_ops is true
  - template_rule mapping covers all required templates

behaviour:
  - exam logs are committed before AI responds
  - exam logs are never overwritten (append-only)
  - AI language is read from sensei.md not hardcoded
  - AI does not read README.md (human-only)
  - templates are read before generating any document

# ---------------------------------------------------------------------------
# STRICT ROOT — no extra files allowed in root
# ---------------------------------------------------------------------------
strict_root:
  allowed:
    - .agent.yml
    - .registry.yml
    - sensei.md
    - onboarding.yml
    - README.md
    - .github

# ---------------------------------------------------------------------------
# DYNAMIC DIRS — content is variable but must match naming patterns
# ---------------------------------------------------------------------------
dynamic_dirs:
  log/:
    pattern: "YYYY-MM-DD_{type}_{topic}.md"
    regex: "^\\d{4}-\\d{2}-\\d{2}_(exam|randori|study)_.+\\.md$"
    allow_empty: true
  kata/:
    pattern: "{topic}.md or .agent.yml"
    regex: "^(.+\\.md|\\.agent\\.yml)$"
    allow_empty: false
  scroll/:
    pattern: "{topic}.md or .agent.yml or README.md"
    regex: "^(.+\\.md|\\.agent\\.yml)$"
    allow_empty: false
  densho/:
    pattern: "{course}.md or .agent.yml"
    regex: "^(.+\\.md|\\.agent\\.yml)$"
    allow_empty: true
  templates/:
    pattern: "known template files only"
    regex: "^(kata|scroll|log_exam|log_randori|log_study|randori)\\.(?:md|html)|README\\.md$"
    allow_empty: false
