# dojo framework — validation checklist
# A repository is a valid dojo instance if ALL items below are true

structure:
  - .agent.yml exists in root
  - .scenarios.yml exists in root
  - .registry.yml exists in root
  - .gakusei.yml exists in root
  - README.md exists in root
  - kata/ exists with at least one subject subfolder
  - kiroku/ exists
  - templates/ exists with all required templates
  - densho/ does NOT exist
  - sensei.yml does NOT exist
  - sensei.md does NOT exist
  - scroll/ does NOT exist

agent_yml:
  block_order:
    - connector_check is the first block
    - global is the second block
    - repo_map is present
    - file_access is present
    - tool_approval is present
    - write_ahead is present
    - scenarios is present and declares scenarios_file
    - post_action_hook is present and declares after_every_state_change with read: .registry.yml
    - handlers is present (may be empty)
  global:
    - global.language reads from .gakusei.yml
    - global.pr_strategy is batch_per_session
    - global.merge_strategy is squash
    - global.dedup_scope is current_session
  scenarios:
    - session_start scenario is present in .scenarios.yml
    - study_open scenario is present in .scenarios.yml with all 4 input_sources
    - randori scenario is present in .scenarios.yml
    - quiz scenario is present in .scenarios.yml
    - shinsa scenario is present in .scenarios.yml
    - level_up scenario is present in .scenarios.yml
    - unknown_scenario is present and is the last scenario
    - final_exam does NOT exist (renamed to shinsa)
  handlers:
    - session_end handler is present
    - session_end has dedup declared
    - session_end has state_changes declared
    - level_up rule states: AI proposes, student confirms

gakusei_yml:
  - name field exists
  - language field exists
  - subjects field exists as map of subject -> level
  - levels are one of: [not_started, beginner, intermediate, advanced]
  - last_session field exists with subject, topic, next
  - active_books field exists as list
  - completed_books field exists as list
  - exams field exists per subject with passed (boolean) and score

behaviour:
  - the AI reads .gakusei.yml at every session start
  - gakusei.md does not need to pre-exist; the AI creates it on first session
  - the AI updates .gakusei.yml and gakusei.md after every session via PR
  - kiroku files are append-only — never overwritten
  - shinsa records are committed before the AI responds
  - shinsa gives no feedback during the exam — only final score
  - shinsa questions are open-ended (explain / describe / difference between) — never multiple choice
  - quiz uses multiple choice (A/B/C/D) from kata — no state saved
  - randori is called by study_open after each concept, or triggered by user directly
  - level_up requires student confirmation — never automatic
  - the AI adapts explanation depth to the student level in .gakusei.yml
  - templates are read before generating any document
