# source: frameworks/dojo/scenarios/shinsa.yml
# Scenarios: topic_shinsa, topic_shinsa_report

---
id: topic_shinsa
on:
  - events: [readiness-ready]
  - user wants to take the exam on a specific topic
  - user wants to test their knowledge on a topic
  - user says they are ready to be examined on a topic
creates_issue: false
read:
  - "kata/{topic}.md"
  - github:issues:open:label:Goal
steps:
  - if:
      condition: kata/{topic}.md current_gaps | count > 0
      then:
        - say: |
            warn the student there are open gaps before proceeding
            Gaps: {{current_gaps | join}}
        - propose: propose proceeding anyway
          on_reject:
            - stop
          on_confirm:
            - continue

  - say: announce the topic shinsa is starting — no feedback during exam, only final score

  - for_each: question in exam.questions   # 5–8 questions from kata/{topic}.md
    do:
      - ask: ask the exam question

  - compute: score
  - compute: weak_spots

  - write:
      path: "kiroku/nikki/"
      filename: "YYYY-MM-DD_{topic}_shinsa.yml"
      from: Malstrom/zeroth:frameworks/dojo/templates/kiroku_nikki.yml
      access: write-once
      via: PR
      approval: none

  - if:
      condition: score >= 80
      then:
        - for_each: goal_issue in (open_goal_issues | where: topic in goal.unchecked_topics)
          do:
            - update_issue:
                target: goal_issue
                action: check_topic
                topic: "{{topic}}"
                nikki: "{{nikki_url}}"
            - update_issue:
                target: goal_issue
                action: update_topic_kata_link
                topic: "{{topic}}"
                kata_url: "https://github.com/Malstrom/dojo/blob/main/kata/{{topic}}.md"
            - update_issue:
                target: goal_issue
                action: append_shinsa_log
                topic: "{{topic}}"
                score: "{{score}}"
                nikki: "{{nikki_url}}"
                result: passed
        - write:
            path: "kiroku/makimono/"
            filename: "YYYY-MM-DD_{topic}_shinsa_passed.yml"
            from: Malstrom/zeroth:frameworks/dojo/templates/kiroku_makimono.yml
            access: write-once
            via: PR
            approval: none
            note: |
              Record this topic shinsa pass.
              Fields: date, topic, score, weak_spots.
        - emit: topic-shinsa-passed
      else:
        - write:
            path: "kata/{topic}.md"
            fields: [current_gaps]
            access: read-write
            via: PR
            approval: none
            note: Replace ## Current gaps with weak_spots from this shinsa.
        - for_each: goal_issue in (open_goal_issues | where: topic in goal.unchecked_topics)
          do:
            - update_issue:
                target: goal_issue
                action: append_shinsa_log
                topic: "{{topic}}"
                score: "{{score}}"
                nikki: "{{nikki_url}}"
                result: failed
                weak_spots: "{{weak_spots | join}}"
        - emit: topic-shinsa-failed

  - merge:
      strategy: squash
      target: main
      via: PR
      approval: none
output:
  state_changes: []

---
id: topic_shinsa_report
type: reporter
on:
  events: [topic-shinsa-passed, topic-shinsa-failed]
creates_issue: false
read:
  - github:issues:open:label:Goal
steps:
  - if:
      condition: event == "topic-shinsa-passed"
      then:
        - say: |
            inform the student the topic shinsa was passed
            Score: {{score}}% — {{topic}} completato.
        - if:
            condition: open_goal_issues | any: topic in goal.required_topics
            then:
              - say: |
                  show progress toward the active goal
                  Progresso verso {{matching_goal.title}}: {{matching_goal.checked_count}}/{{matching_goal.total_count}} topic.
      else:
        - say: |
            inform the student the topic shinsa was not passed
            Score: {{score}}% — gap aggiornati nel kata.
        - propose: propose studying the weak spots now
          on_confirm:
            - call: study_open
              with:
                topic: "{{topic}}"
                source: gaps_from_kata
          on_reject:
            - say: acknowledge and remind the student the gaps are in the kata
output:
  state_changes: []
