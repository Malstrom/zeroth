# source: frameworks/dojo/scenarios/goal.yml
# Scenarios: declare_goal, goal_shinsa, goal_shinsa_report

---
id: declare_goal
preconditions:
  - any
on:
  - user wants to declare a learning objective
  - user says they want to become senior in something
  - user says they want to reach a level in a language or technology
  - user wants to set a goal
  - user provides a cross-repo source artifact (job offer, project spec, interview feedback)
creates_issue: true
issue:
  title: "[Goal] {goal_source_emoji} {goal_human_title} ({goal_slug})"
  labels: ["Goal"]
  from: Malstrom/zeroth:frameworks/dojo/templates/issue_declare_goal.md
  update: check
  approval: none
  on_complete: close
  on_fail: comment
read:
  - .gakusei.yml
  - "kata/"
steps:
  - ask: ask the student what their goal is
  - compute: goal_slug
  - compute: goal_human_title
  - ask: ask the student where this goal comes from (self-declared, job offer, project, interview feedback, or paste a link)
  - compute: goal_source_type
  - compute: goal_source_ref
  - compute: goal_source_emoji
  - if:
      condition: goal_source_type == "cross_repo"
      then:
        - read: "{{goal_source_ref}}"
  - compute: required_topics
  - compute: already_satisfied
  - compute: missing_topics
  - say: |
      Goal: {{goal_human_title}} ({{goal_slug}})
      Source: {{goal_source_emoji}} {{goal_source_type}}{{goal_source_ref | prefix: " — "}}
      Already satisfied ({{already_satisfied | count}}): {{already_satisfied | join}}
      Topics to study:
        🔴 Critical:  {{missing_topics | where: priority == critical | join}}
        🟡 Important: {{missing_topics | where: priority == important | join}}
        🟢 Later:     {{missing_topics | where: priority == later | join}}
      # Issue body rendering:
      # kata exists    → - [ ] `slug` — description — [kata](https://github.com/{owner}/{repo}/blob/main/kata/slug.md)
      # kata missing   → - [ ] `slug` — description  (or *(ai inferred)*)
      # ALL kata links: absolute GitHub URLs (blob/main/), never relative.
output:
  state_changes: [goal-declared]

---
id: goal_shinsa
preconditions:
  - active_goal_exists
on:
  - user wants to take the seniority exam for an active goal
  - user says they are ready to test their goal
  - user wants to validate completion of a goal
creates_issue: false
read:
  - github:issues:open:label:Goal
  - "kata/"
  - "kiroku/nikki/"
steps:
  - compute: active_goal
  - compute: checked_topics
  - compute: unchecked_topics
  - if:
      condition: unchecked_topics | count > 0
      then:
        - say: |
            inform the student the goal is not complete yet
            Mancano ancora: {{unchecked_topics | join}}
        - stop
  - compute: passed_topic_shinsa_count
  - compute: total_topics
  - compute: goal_score
  - ask: ask one synthesis question that forces cross-topic reasoning across the full goal
  - ask: ask one transfer question using a new context not seen in previous study sessions
  - compute: synthesis_result
  - compute: transfer_result
  - compute: final_result
  - write:
      path: "kiroku/nikki/"
      filename: "YYYY-MM-DD_goal_shinsa_{{active_goal.slug}}.yml"
      from: Malstrom/zeroth:frameworks/dojo/templates/kiroku_nikki.yml
      access: write-once
      via: PR
      approval: none
      note: |
        Record goal-level exam.
        Fields: date, goal_slug, checked_topics, goal_score, synthesis_result, transfer_result, final_result.
  - if:
      condition: final_result == "passed"
      then:
        - update_issue:
            target: active_goal
            action: close_goal
            nikki: "{{nikki_url}}"
            score: "{{goal_score}}"
            synthesis_result: "{{synthesis_result}}"
            transfer_result: "{{transfer_result}}"
        - write:
            path: "kiroku/makimono/"
            filename: "YYYY-MM-DD_goal_shinsa_{{active_goal.slug}}_passed.yml"
            from: Malstrom/zeroth:frameworks/dojo/templates/kiroku_makimono.yml
            access: write-once
            via: PR
            approval: none
            note: Record this goal shinsa pass.
        - emit: goal-shinsa-passed
      else:
        - emit: goal-shinsa-failed
  - merge:
      strategy: squash
      target: main
      via: PR
      approval: none
output:
  state_changes: []

---
id: goal_shinsa_report
type: reporter
on:
  events: [goal-shinsa-passed, goal-shinsa-failed]
creates_issue: false
read:
  - github:issues:open:label:Goal
steps:
  - if:
      condition: event == "goal-shinsa-passed"
      then:
        - say: |
            inform the student the goal was passed and the issue was closed
            Goal completato: {{active_goal.title}} — score complessivo {{goal_score}}%.
      else:
        - say: |
            inform the student the goal was not passed
            Il goal non è ancora consolidato.
        - compute: weak_topics
        - propose: propose studying the weak topics now
          on_confirm:
            - call:
                scenario: study_open
                file: frameworks/dojo/scenarios/study.yml
                load: on_demand
                with:
                  topic: "{{weak_topics.first}}"
          on_reject:
            - say: acknowledge and close the goal shinsa session
output:
  state_changes: []
