# source: frameworks/dojo/scenarios/unknown.yml

id: unknown_scenario
on:
  - any message that does not match any other scenario
creates_issue: false
read: []
steps:
  - compute: nearest_scenarios   # top 3 scenarios by semantic proximity to the user message
  - say: |
      Non ho capito cosa vuoi fare.
      Intendevi forse:
      {{nearest_scenarios | each: "- **{{name}}** — {{description}}"}}
  - propose: "Vuoi che esegua {{nearest_scenarios.first.name}}?"
    on_confirm:
      - call: "{{nearest_scenarios.first.id}}"
    on_reject:
      - say: "OK. Dimmi cosa vuoi fare."
output:
  state_changes: []
