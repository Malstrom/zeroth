# source: frameworks/dojo/scenarios/session.yml

id: session_start
on:
  - this is the first message of the conversation and no other scenario matches
  - user greets the system or initiates a new session
  - user opens or restarts the dojo
preconditions:
  - any
creates_issue: false
read:
  - .gakusei.yml
  - github:issues:open:label:Goal
steps:
  - if:
      condition: gakusei_missing OR student_name == ""
      then:
        - read: Malstrom/zeroth:frameworks/dojo/onboarding.yml
        - call: onboarding
        - stop
  - ensure_label:
      name: "Goal"
      color: "0075ca"
      description: "Active learning goal"
  - ensure_labels_on_issues:
      title_pattern: "^\\[Goal\\]"
      label: "Goal"
  - say: greet the student by name
  - if:
      condition: open_goal_issues | count > 0
      then:
        - say: |
            show the active goal title and topic progress
            # topics_with_kata_status renders each topic as:
            # - `slug` — in progress (kata exists, gaps: X) | not started | [x] passed
        - propose: propose continuing the active goal
          on_confirm:
            - call: study_open
          on_reject:
            - say: ask the student what they want to do next (study, randori, topic shinsa, or declare a new goal)
      else:
        - say: inform the student they have no active goal
        - propose: propose declaring a new goal
          on_confirm:
            - call: declare_goal
          on_reject:
            - say: ask the student what they want to do next (study, randori, or topic shinsa)
output:
  state_changes: []
