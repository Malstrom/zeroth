# source: frameworks/dojo/scenarios/readiness.yml
# Scenarios: evaluate_readiness, readiness_report

# ---------------------------------------------------------------------------
# THRESHOLDS
# Single source of truth for readiness evaluation.
# ---------------------------------------------------------------------------
readiness_thresholds:
  min_randori_score: 80        # % correct answers in last randori session for this topic
  min_sessions_without_gaps: 2 # consecutive sessions where kata ## Current gaps is empty

---
id: evaluate_readiness
on:
  events: [study-completed]
  - user wants to know if they are ready for the exam on a topic
  - user asks to check their readiness on a topic
  - user wants to know if they can take the shinsa
dedup: once per session
creates_issue: false
read:
  - "kata/{topic}.md"
  - "kiroku/nikki/"             # scan filenames to count sessions without gaps
steps:
  - compute: randori_score          # % correct in last nikki for this topic
  - compute: sessions_without_gaps  # consecutive nikki files for topic with empty ## Current gaps
  - compute: has_gaps               # kata/{topic}.md ## Current gaps is non-empty
  - if:
      condition: randori_score >= readiness_thresholds.min_randori_score
                 AND sessions_without_gaps >= readiness_thresholds.min_sessions_without_gaps
      then:
        - emit: readiness-ready
      else:
        - if:
            condition: has_gaps
            then:
              - emit: readiness-gap
            else:
              - emit: readiness-loop
output:
  state_changes: []

---
id: readiness_report
type: reporter
on:
  events: [readiness-ready, readiness-gap, readiness-loop]
creates_issue: false
read:
  - "kata/{topic}.md"
steps:
  - if:
      condition: event == "readiness-ready"
      then:
        - say: "Score: {{randori_score}}% — {{sessions_without_gaps}} sessioni pulite. Pronto per la topic shinsa."
        - propose: "Fai la topic shinsa per {{topic}} adesso?"
          on_confirm:
            - call: topic_shinsa
          on_reject:
            - say: "OK. Torna quando sei pronto."
      else:
        - if:
            condition: event == "readiness-gap"
            then:
              - say: "Gap aperti: {{current_gaps | join}}. Devi chiuderli prima della shinsa."
              - propose: "Studiamo i gap adesso?"
                on_confirm:
                  - call: study_open
                    with:
                      topic: "{{topic}}"
                      source: gaps_from_kata
                on_reject:
                  - say: "OK. I gap sono nel kata. Riesamina quando sei pronto."
            else:
              - say: "Nessun gap, ma solo {{sessions_without_gaps}}/{{readiness_thresholds.min_sessions_without_gaps}} sessioni pulite. Continua a studiare."
              - propose: "Studia un nuovo concetto in {{topic}}?"
                on_confirm:
                  - call: study_open
                    with:
                      topic: "{{topic}}"
                on_reject:
                  - say: "OK. Alla prossima sessione."
output:
  state_changes: []
