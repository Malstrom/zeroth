# source: frameworks/dojo/scenarios/readiness.yml
# Scenarios: evaluate_readiness, readiness_report

# ---------------------------------------------------------------------------
# THRESHOLDS
# ---------------------------------------------------------------------------
readiness_thresholds:
  min_randori_score: 80
  min_sessions_without_gaps: 2

---
id: evaluate_readiness
on:
  events: [study-completed]
  - user wants to know if they are ready for the exam on a topic
  - user asks to check their readiness on a topic
  - user wants to know if they can take the shinsa
dedup: once per session
creates_issue: false
read:
  - "kata/{topic}.md"
  - "kiroku/nikki/"
steps:
  - compute: randori_score
  - compute: sessions_without_gaps
  - compute: has_gaps
  - if:
      condition: randori_score >= readiness_thresholds.min_randori_score
                 AND sessions_without_gaps >= readiness_thresholds.min_sessions_without_gaps
      then:
        - emit: readiness-ready
      else:
        - if:
            condition: has_gaps
            then:
              - emit: readiness-gap
            else:
              - emit: readiness-loop
output:
  state_changes: []

---
id: readiness_report
type: reporter
on:
  events: [readiness-ready, readiness-gap, readiness-loop]
creates_issue: false
read:
  - "kata/{topic}.md"
steps:
  - if:
      condition: event == "readiness-ready"
      then:
        - say: |
            report readiness score and clean session count, inform student they are ready for topic shinsa
            Score: {{randori_score}}% — {{sessions_without_gaps}} sessioni pulite.
        - propose: propose taking the topic shinsa now
          on_confirm:
            - call:
                scenario: topic_shinsa
                file: frameworks/dojo/scenarios/shinsa.yml
                load: on_demand
          on_reject:
            - say: acknowledge and tell the student to come back when ready
      else:
        - if:
            condition: event == "readiness-gap"
            then:
              - say: |
                  list the open gaps and explain they must be closed before shinsa
                  Gap aperti: {{current_gaps | join}}
              - propose: propose studying the gaps now
                on_confirm:
                  - call:
                      scenario: study_open
                      file: frameworks/dojo/scenarios/study.yml
                      load: on_demand
                      with:
                        topic: "{{topic}}"
                        source: gaps_from_kata
                on_reject:
                  - say: acknowledge and remind the student the gaps are in the kata
            else:
              - say: |
                  inform student there are no gaps but not enough clean sessions
                  Sessioni pulite: {{sessions_without_gaps}}/{{readiness_thresholds.min_sessions_without_gaps}}
              - propose: propose studying a new concept in the topic
                on_confirm:
                  - call:
                      scenario: study_open
                      file: frameworks/dojo/scenarios/study.yml
                      load: on_demand
                      with:
                        topic: "{{topic}}"
                on_reject:
                  - say: acknowledge and close the session
output:
  state_changes: []
