id: randori
on:
  - user wants to drill on the current topic
  - user wants to practice a concept
  - user wants to be quizzed on what was just explained
  - user wants to review what they know
  - user wants to practice without studying first
preconditions:
  - any
creates_issue: false
read:
  - "kata/{topic}.yml"
  - "kiroku/nikki/"

sensei_rules:
  no_live_coding: true
  allowed_question_types:
    - reasoning
    - edge_cases
    - tradeoffs
    - mental_model
    - error_diagnosis
  forbidden_question_types:
    - write_this_function
    - implement_this
    - live_coding
  progression:
    first_time: basic comprehension question
    seen_no_gap: intermediate — edge case or tradeoff
    seen_with_gap: start from the gap, then advance
    never_repeat: question already in kiroku/nikki/ for this topic

steps:

  - if:
      condition: NOT called_from_study_open AND topic is missing
      then:
        - ask: which topic do you want to practice?

  - if:
      condition: called_from_study_open
      then:
        - say: explain the concept

  - ask: any questions before we continue?
  - wait: answer student questions until student signals ready to proceed

  - compute: question

  - ask: randori question for this concept

  - if:
      condition: answer_correct OR answer_substantially_correct
      then:
        - say: confirm correct with brief reinforcement
      else:
        - say: explain why wrong and what the gap is
        - ask: simpler follow-up question on the same concept
        - if:
            condition: followup_correct OR followup_substantially_correct
            then:
              - say: acknowledge improvement, briefly explain the gap
            else:
              - say: fully re-explain the concept
        - write:
            path: "kata/{topic}.yml"
            fields: [current_gaps]
            action: upsert
            via: direct_commit
            branch: main

output:
  state_changes: [randori-completed]
