# source: frameworks/dojo/scenarios/study.yml
# Scenario: study_open

id: study_open
on:
  - user wants to study a specific topic
  - user asks to be taught something
  - user wants to open a study session on a topic
preconditions:
  - any
creates_issue: false
issue_updates:
  target: matching_goal_issue
  condition: matching_goal_issue exists
read:
  - .gakusei.yml
  - github:issues:open:label:Goal
  - "kata/{topic}.md"           # existing concepts and ## Current gaps
  - "kiroku/nikki/"             # filenames only — to detect previously asked questions
steps:
  - compute: matching_goal_issue
  - compute: agenda
    # Priority order — AI builds agenda before starting:
    # 1. concepts in ## Current gaps of kata/{topic}.md (close gaps first)
    # 2. concepts of this topic not yet present in kata/{topic}.md (add new knowledge)
    # 3. concepts already in kata with no recent randori (reinforce)
    # Session target: ~20 minutes. AI stops adding concepts when estimated time is reached.
    # Never repeat a concept+question combination already present in a nikki for this topic.

  - for_each: concept in agenda
    do:
      - call: randori
        with:
          concept: "{{concept}}"
          topic: "{{topic}}"

  - write:
      path: "kiroku/nikki/"
      filename: "YYYY-MM-DD_{topic}_study.yml"
      from: Malstrom/zeroth:frameworks/dojo/templates/kiroku_nikki.yml
      access: write-once
      via: PR
      approval: none

  - write:
      path: "kata/{topic}.md"
      access: read-write
      via: PR
      approval: none
      note: |
        Append new concepts covered this session.
        Update ## Current gaps: remove closed gaps, keep open ones.
        If no gaps remain: write '- None.' under ## Current gaps.

  - update_issue:
      target: matching_goal_issue
      action: add_kata_link
      topic: "{{topic}}"
      kata_url: "https://github.com/Malstrom/dojo/blob/main/kata/{{topic}}.md"

  - merge:
      strategy: squash
      target: main
      via: PR
      approval: none
output:
  state_changes: [study-completed]
