# dojo framework — .agent.yml rules
# Inherits: zeroth/rules/agent.yml
# The following are dojo-specific additions

required_scenario_file: .scenarios.yml

required_handlers:
  session_end:
    listens_to:
      - goodbye
      - topic-closed
      - session-idle
    dedup: once per session
    actions:
      - flush any pending updates to kiroku and .gakusei.yml
      - commit via PR if uncommitted changes exist
    state_changes: []

global_rules:
  language: always read from .gakusei.yml at session_start
  pr_strategy: batch_per_session
  exam_log: immediate PR — not batched
  exam_immutability: commit before responding, append-only on correction
  level_up: AI proposes, student confirms — never automatic
  densho: does not exist — books are consumed live from library sources
