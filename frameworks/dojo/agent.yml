# dojo framework — .agent.yml rules
# Inherits: zeroth/rules/agent.yml
# The following are dojo-specific additions

required_scenarios:
  session_start:
    trigger: auto on session open
    purpose: read sensei + last log, propose next action
  dojo_study:
    trigger: user asks to study a topic
    purpose: explain topic + create/update kata
  dojo_exam:
    trigger: user requests exam on topic
    purpose: 6-question exam, score/30, immutable log
  dojo_randori:
    trigger: user requests drill or quiz
    purpose: generate HTML quiz artifact
  densho_open:
    trigger: user imports a course or book
    purpose: parse + create densho file, detect kata gaps
  unknown_scenario:
    trigger: no other trigger matched
    purpose: map to closest scenario or propose new one

required_handlers:
  kata_trigger:
    listens_to: [exam-failed, kata-gap-detected, densho-updated]
    purpose: create or update kata file
  sensei_trigger:
    listens_to: [exam-passed, scroll-updated]
    purpose: update mastery in sensei.yml
  session_end:
    listens_to: [goodbye, topic-closed, session-idle]
    purpose: write session log

global_rules:
  language: always read from sensei.yml at session_start
  pr_strategy: batch_per_session
  exam_log: immediate PR — not batched
  exam_immutability: commit before responding, append-only on correction
  scoring: first answer only — correction is learning signal not retry

exam_format:
  questions: 6
  points_each: 5
  total: 30
  pass_threshold: 18
  style: one at a time, interview style
  pc_mode: theory + code
  phone_mode: theory only
