# .agent.yml
# AI-only operational manifest for the dojo framework.
# Inherits global rules from: zeroth/rules/agent.yml
# Syntax for scenarios and handlers: zeroth/rules/scenarios.yml

# ---------------------------------------------------------------------------
# CONNECTOR CHECK
# ---------------------------------------------------------------------------
connector_check:
  on_fail: |
    Say: "GitHub connector not active. Click + → GitHub → new chat."
    Stop immediately. Do not fall back to web or browser.

# ---------------------------------------------------------------------------
# GLOBAL
# ---------------------------------------------------------------------------
global:
  language: read from .gakusei.yml at session_start
  pr_strategy: batch_per_session
  merge_strategy: squash
  dedup_scope: current_session
  trigger_matching: pattern_first
  exam_log: immediate PR — not batched
  exam_immutability: commit before responding, append-only
  level_up: AI proposes, student confirms — never automatic
  densho: does not exist — books consumed live from library sources

# ---------------------------------------------------------------------------
# REPO MAP
# ---------------------------------------------------------------------------
repo_map:
  .agent.yml: dojo framework AI manifest
  .scenarios.yml: dojo framework scenario catalog
  .gakusei.yml: student identity, profile, progress
  gakusei.md: human-readable student profile
  overview.yml: dojo framework overview and vocabulary
  structure.yml: dojo framework directory structure spec
  checklist.yml: dojo framework giskard validation checklist
  zeroth/rules/scenarios.yml: syntax reference for scenarios and handlers

# ---------------------------------------------------------------------------
# FILE ACCESS
# ---------------------------------------------------------------------------
file_access:
  .agent.yml: read-only
  .scenarios.yml: read-only
  .registry.yml: read-only
  .gakusei.yml: read-write
  gakusei.md: read-write
  "kata/**": read-write
  "kiroku/**": append-only
  templates/*: read-only

# ---------------------------------------------------------------------------
# TOOL APPROVAL
# ---------------------------------------------------------------------------
tool_approval:
  feature_branch: false
  file_edit: false
  push_files: false
  create_pr: false
  merge_to_main: false
  delete_file: true
  destructive_ops: true

# ---------------------------------------------------------------------------
# WRITE-AHEAD
# ---------------------------------------------------------------------------
write_ahead:
  rule: commit before responding
  branch_strategy: |
    NEVER push directly to main.
    Always: feature branch → PR → squash merge.
    Branch naming: {type}/{short-description}
    Types: feat, fix, docs, test, chore

# ---------------------------------------------------------------------------
# SCENARIOS
# ---------------------------------------------------------------------------
scenarios:
  scenarios_file: .scenarios.yml

# ---------------------------------------------------------------------------
# HANDLERS
# ---------------------------------------------------------------------------
handlers:

  session_end:
    listen:
      - goodbye
      - topic-closed
      - session-idle
    dedup: once per session
    actions:
      - update:
          file: .gakusei.yml
          fields: [last_session]
          via: PR
      - update:
          file: gakusei.md
          via: PR
      - if:
          condition: uncommitted_changes
          then:
            - update:
                file: "kiroku/{subject}/{date}.md"
                mode: append
                via: PR
    state_changes: []
