# .agent.yml
# AI-only operational manifest for the dojo framework.

# ---------------------------------------------------------------------------
# LANGUAGE
# ---------------------------------------------------------------------------
language:
  chat: read from .gakusei.yml    # language used when speaking with the student
  files: english                  # all file content, commits, PR/issue bodies
  filenames: english              # all file names AND folder names (snake_case, lowercase)

# ---------------------------------------------------------------------------
# WORK RULES
# ---------------------------------------------------------------------------
work_rules:
  branch_per_issue: true
  branch_naming: "{type}/{short-description}"
  all_writes_via_pr: true
  merge_strategy: squash
  level_up: AI proposes, student confirms — never automatic
  densho: does not exist — books consumed live from library sources

# ---------------------------------------------------------------------------
# TOOL APPROVAL
# false = execute immediately, no confirmation needed
# true  = always ask before executing
# ---------------------------------------------------------------------------
tool_approval:
  create_branch: false
  push_files: false
  create_pr: false
  create_issue: false
  create_sub_issue: false
  update_issue: false
  merge_to_main: false
  delete_file: true
  destructive_ops: true

# ---------------------------------------------------------------------------
# SCENARIOS
# Read .scenarios.yml BEFORE any reasoning.
# Every user message must be matched against scenarios first.
# ---------------------------------------------------------------------------
scenarios:
  spec: Malstrom/zeroth:frameworks/dojo/.scenarios.yml
  read_before_responding: true
  on_no_match: propose new scenario to user before proceeding

# ---------------------------------------------------------------------------
# WORKSPACE
# Exact paths: named keys
# Glob patterns: under patterns list
# Filename conventions live in each scenario's create action, not here.
# ---------------------------------------------------------------------------
workspace:
  .gakusei.yml:
    role: student identity, progress, and language
    access: read-write
  .scenarios.yml:
    role: scenario catalog
    access: read-only
  .registry.yml:
    role: cross-repo connections
    access: read-only
  gakusei.md:
    role: human-readable student profile
    access: read-write
  templates/:
    role: file templates for kata, nikki, makimono, shinsa
    access: read-only
  patterns:
    - path: "kata/**"
      role: practice exercises
      access: read-write
    - path: "kiroku/nikki/**"
      role: immutable session logs
      access: append-only
    - path: "kiroku/makimono/**"
      role: study scrolls
      access: read-write
