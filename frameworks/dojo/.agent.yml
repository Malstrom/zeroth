# .agent.yml
# AI-only operational manifest for the dojo framework.
# Inherits: zeroth/rules/agent.yml
# Syntax for handlers: rules/scenarios.yml

scenarios:
  scenarios_file: .scenarios.yml

required_handlers:

  session_end:
    listen:
      - goodbye
      - topic-closed
      - session-idle
    dedup: once per session
    actions:
      - update:
          file: .gakusei.yml
          fields: [last_session]
          via: PR
      - update:
          file: gakusei.md
          via: PR
      - if:
          condition: uncommitted_changes
          then:
            - update:
                file: "kiroku/{subject}/{date}.md"
                mode: append
                via: PR
    state_changes: []

global_rules:
  language: always read from .gakusei.yml at session_start
  pr_strategy: batch_per_session
  exam_log: immediate PR — not batched
  exam_immutability: commit before responding, append-only on correction
  level_up: AI proposes, student confirms — never automatic
  densho: does not exist — books are consumed live from library sources
