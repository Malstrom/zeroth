# .agent.yml
# AI-only operational manifest for a dojo instance.
# Read this at the start of every session — no exceptions.
# Spec: github.com/Malstrom/zeroth

# ---------------------------------------------------------------------------
# LANGUAGE
# ---------------------------------------------------------------------------
language:
  chat: read from .gakusei.yml   # language used in conversation with the learner
  files: english                 # all file content, commits, PR/issue bodies
  filenames: english             # all file names AND folder names (snake_case, lowercase)

# ---------------------------------------------------------------------------
# WORK RULES
# ---------------------------------------------------------------------------
work_rules:
  branch_per_issue: true
  branch_naming: "{type}/{short-description}"
  all_writes_via_pr: true
  merge_strategy: squash
  log_files_are_immutable: true  # never overwrite files under log/

# ---------------------------------------------------------------------------
# TOOL APPROVAL
# false = execute immediately, no confirmation needed
# true  = always ask before executing
# ---------------------------------------------------------------------------
tool_approval:
  create_branch: false
  push_files: false
  create_pr: false
  create_issue: false
  create_sub_issue: false
  update_issue: false
  merge_to_main: false
  delete_file: true
  destructive_ops: true

# ---------------------------------------------------------------------------
# SCENARIOS
# ---------------------------------------------------------------------------
scenarios:
  file: .scenarios.yml
  spec: zeroth/rules/scenarios.yml
  read_before_responding: true
  on_no_match: propose new scenario to user before proceeding

# ---------------------------------------------------------------------------
# WORKSPACE
# ---------------------------------------------------------------------------
workspace:
  .agent.yml:
    role: AI manifest
    access: read-only
  .scenarios.yml:
    role: scenario catalog
    access: read-only
  .registry.yml:
    role: cross-repo connections
    access: read-only
  .gakusei.yml:
    role: learner identity and current state
    access: read-write
  patterns:
    - path: "kata/*.yml"
      role: individual kata definitions
      access: read-write
    - path: "log/*.yml"
      role: session logs — append-only, never overwrite
      access: append-only
