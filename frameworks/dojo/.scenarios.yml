# dojo framework — scenario catalog
# Syntax: rules/scenarios.yml

required_scenarios:

  session_start:
    trigger_patterns:
      - session opens automatically
    read:
      - .gakusei.yml
      - kiroku/_index.md
    actions:
      - say: "{{student_name}}!"
      - say: "Last session: {{last_session.subject}} — {{last_session.topic}}. Next: {{last_session.next}}"
      - propose: "Continue from where you left off?"
        on_confirm:
          - call: study_open
    state_changes: []

  study_open:
    trigger_patterns:
      - user wants to study a specific topic or chapter
      - user asks to be taught something
      - user wants to open a study session on a subject
    read:
      - .gakusei.yml
      - kiroku/_index.md
      - "kata/{subject}/{topic}.md"
    input_sources:
      - google_drive
      - attached_file
      - pasted_text
      - ai_knowledge
    actions:
      - say: "Reading source and extracting key concepts..."
      - call: randori
        after: each_concept
      - update:
          file: "kata/{subject}/{topic}.md"
          via: PR
      - update:
          file: "kiroku/{subject}/{date}.md"
          mode: append
          via: PR
      - update:
          file: kiroku/_index.md
          via: PR
      - update:
          file: .gakusei.yml
          fields: [last_session, book_progress]
          via: PR
      - update:
          file: gakusei.md
          via: PR
    state_changes:
      - study-completed

  randori:
    trigger_patterns:
      - user wants to be quizzed on a topic
      - user wants to verify their understanding of something
    read:
      - .gakusei.yml
      - "kata/{subject}/{topic}.md"
    actions:
      - ask: "question on the concept just explained, adapted to student level"
      - if:
          condition: answer_correct
          then:
            - say: "Correct. Moving on."
          else:
            - say: "Not quite — here is the gap."
            - ask: "simpler follow-up question on the same concept"
      - update:
          file: "kiroku/{subject}/{date}.md"
          fields: [weak_spots]
          mode: append
          via: PR
    state_changes:
      - randori-completed

  final_exam:
    trigger_patterns:
      - user wants to take the final exam for a subject
      - user says they finished a book
    read:
      - .gakusei.yml
      - kiroku/_index.md
    actions:
      - ask: "Are you ready to start the final exam for {subject}?"
      - say: "Asking 10 to 15 questions one at a time. Only your first answer counts."
      - if:
          condition: score >= 80
          then:
            - update:
                file: "kiroku/{subject}/{date}.md"
                fields: [exam_result, score]
                mode: append
                via: PR
            - propose: "You passed! Move to the next level for {subject}?"
              on_confirm:
                - call: level_up
          else:
            - update:
                file: "kiroku/{subject}/{date}.md"
                fields: [exam_result, score, weak_chapters]
                mode: append
                via: PR
            - say: "Not passed. Weak chapters: {{weak_chapters}}. Review and retry."
    state_changes:
      - exam-passed
      - exam-failed

  level_up:
    trigger_patterns:
      - user confirms level up after passing the final exam
    read:
      - .gakusei.yml
      - gakusei.md
    actions:
      - update:
          file: .gakusei.yml
          fields: [subjects, active_books, completed_books]
          via: PR
      - update:
          file: gakusei.md
          via: PR
    state_changes:
      - level-up-completed

  unknown_scenario:
    trigger_patterns:
      - any message that does not match any other scenario
    read: []
    actions:
      - propose: "Did you mean: {{closest_scenario}}?"
        on_confirm:
          - call: "{{closest_scenario}}"
      - if:
          condition: no_match
          then:
            - say: "Scenario not defined. Want me to add it?"
    state_changes: []
