# frameworks/dojo/.scenarios.yml
# Scenario index for dojo framework.
# Format: index — see Malstrom/zeroth:rules/scenarios.yml#file_format.index
# AI reads this first, then fetches ONLY the relevant scenario file.
#
# TRIGGER MATCHING: semantic and language-independent.
# Match user intent regardless of the language they write in (Italian, Russian, English, etc.).
# Never match literal strings — always match meaning.

scenarios:
  - id: session_start
    priority: 0
    preconditions:
      - any
    triggers:
      - this is the first message of the conversation and no other scenario matches
      - user greets the system or initiates a new session
      - user opens or restarts the dojo
    file: frameworks/dojo/scenarios/session.yml

  - id: declare_goal
    priority: 10
    preconditions:
      - any
    triggers:
      - user wants to declare a learning objective
      - user says they want to become senior in something
      - user says they want to reach a level in a language or technology
      - user wants to set a goal
      - user provides a cross-repo source artifact (job offer, project spec, interview feedback)
    file: frameworks/dojo/scenarios/goal.yml

  - id: goal_shinsa
    priority: 20
    preconditions:
      - active_goal_exists
    triggers:
      - user wants to take the seniority exam for an active goal
      - user says they are ready to test their goal
      - user wants to check if they have reached their goal
    file: frameworks/dojo/scenarios/goal.yml

  - id: goal_shinsa_report
    priority: 0
    preconditions:
      - any
    triggers:
      - events: [goal-shinsa-passed, goal-shinsa-failed]
    file: frameworks/dojo/scenarios/goal.yml

  - id: study_open
    priority: 10
    preconditions:
      - any
    triggers:
      - user wants to study a specific topic
      - user asks to be taught something
      - user wants to open a study session on a topic
    file: frameworks/dojo/scenarios/study.yml

  - id: randori
    priority: 10
    preconditions:
      - any
    triggers:
      - user wants to drill on the current topic
      - user asks to be quizzed on what was just explained
      - user wants to practice a concept
      - user wants to review what they know
      - user wants to practice without studying first
    file: frameworks/dojo/scenarios/study.yml

  - id: evaluate_readiness
    priority: 0
    preconditions:
      - any
    triggers:
      - events: [study-completed]
    file: frameworks/dojo/scenarios/shinsa.yml

  - id: readiness_report
    priority: 0
    preconditions:
      - any
    triggers:
      - events: [readiness-ready, readiness-gap, readiness-loop]
    file: frameworks/dojo/scenarios/shinsa.yml

  - id: topic_shinsa
    priority: 15
    preconditions:
      - active_goal_exists
    triggers:
      - events: [readiness-ready]
      - user wants to take the exam on a specific topic
      - user wants to test their knowledge on a topic
      - user says they are ready to be examined on a topic
    file: frameworks/dojo/scenarios/shinsa.yml

  - id: topic_shinsa_report
    priority: 0
    preconditions:
      - any
    triggers:
      - events: [topic-shinsa-passed, topic-shinsa-failed]
    file: frameworks/dojo/scenarios/shinsa.yml

  - id: unknown_scenario
    priority: 0
    preconditions:
      - any
    triggers:
      - any message that does not match any other scenario
    file: frameworks/dojo/scenarios/unknown.yml
