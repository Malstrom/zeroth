# dojo framework — scenario catalog
# Model: GitHub Actions workflows — on: for routing, steps: for logic
# Each scenario = one workflow: trigger → read → steps → output
# Syntax: rules/scenarios.yml
# Spec: github.com/Malstrom/zeroth/issues/162
#
# CORE MODEL:
# - Topics are flat. kata/{topic}.md — no subject prefix, no subject field.
# - Goals are declared by the student. A goal issue stays open until the exam passes.
# - session_start reads open goal issues and orients the session.
# - Makimono is an immutable certification produced by goal_shinsa on pass.

required_scenarios:

  session_start:
    on:
      - session opens automatically
    creates_issue: false
    read:
      - .gakusei.yml
    steps:
      - if:
          condition: gakusei_missing OR student_name == ""
          then:
            - read: Malstrom/zeroth:frameworks/dojo/onboarding.yml
            - call: onboarding
            - stop
      - say: "{{student_name}}!"
      # Read open goal issues — each represents an active learning objective.
      # For each open goal, show progress (completed topics vs needed topics).
      - if:
          condition: open_goal_issues | count > 0
          then:
            - say: |
                Active goals:
                {{open_goal_issues | each: "- {{goal.title}}: {{goal.completed_count}}/{{goal.total_count}} topics"}}
            - propose: "Continue working toward {{open_goal_issues.first.title}}?"
              on_confirm:
                - call: study_open
              on_reject:
                - say: "What would you like to do? study, randori, topic shinsa, or declare a new goal."
          else:
            - say: "No active goals. Last session: {{last_session.topic}} — {{last_session.date}}."
            - propose: "Declare a learning goal?"
              on_confirm:
                - call: declare_goal
              on_reject:
                - say: "What would you like to do? study, randori, or topic shinsa."
    output:
      state_changes: []

  declare_goal:
    on:
      - user wants to declare a learning objective
      - user says they want to become senior in something
      - user says they want to reach a level in a language or technology
      - user wants to set a goal
    creates_issue: true
    issue:
      title: "Goal: {goal_slug}"
      from: Malstrom/zeroth:frameworks/dojo/templates/issue_declare_goal.md
      update: check
      approval: none
      on_complete: close
      on_fail: comment
    read:
      - .gakusei.yml
      - "kata/"                     # all kata files — AI reasons over completed topics
    steps:
      - ask: "What is your goal? (e.g. senior Rails, Italian B1, understand distributed systems)"
      # AI derives the goal slug from the answer: senior_rails, italian_b1, etc.
      - compute: goal_slug
      # AI reasons over the goal and identifies which topics are necessary.
      # Completed topics (from .gakusei.yml) are marked ✅ in the issue checklist.
      # Missing topics are marked ⬜ — the student needs to study them.
      - compute: required_topics       # AI judgment — no hardcoded list
      - compute: completed_topics      # intersection of required_topics and .gakusei.yml completed
      - compute: missing_topics        # required_topics minus completed_topics
      - say: |
          Goal: {{goal_slug}}
          Topics already completed: {{completed_topics | join}}
          Topics to study: {{missing_topics | join}}
      # Issue body is rendered from template with computed checklists.
      # Stays open until goal_shinsa passes.
      - write:
          path: .gakusei.yml
          fields: [goals]
          access: read-write
          via: PR
          approval: none
    output:
      state_changes: [goal-declared]

  study_open:
    on:
      - user wants to study a specific topic
      - user asks to be taught something
      - user wants to open a study session on a topic
    creates_issue: true
    issue:
      title: "Study: {topic}"
      from: Malstrom/zeroth:frameworks/dojo/templates/issue_study_open.md
      update: check
      approval: none
      on_complete: close
      on_fail: comment
    read:
      - .gakusei.yml
      - "kata/{topic}.md"
    input_sources:
      - attached_file
      - url
      - pasted_text
      - ai_knowledge
    steps:
      - say: "{{source_summary}}: {{concept_count}} concepts identified."
      - issue:
          check: "source loaded"

      # ——— CONCEPT LOOP ———
      # Repeat for each concept in the source, in order.
      # concept = one discrete unit: a heading block, a thematic paragraph,
      #           or a logical chunk if the source is unstructured.
      # Do NOT invent concepts outside the source.
      - for_each: concept in source.concepts
        do:
          - say: |
              **{{concept.title}}**
              {{concept.explanation}}
              > Source: {{concept.citation}}
          - call: randori
            with:
              concept: "{{concept}}"
              topic: "{{topic}}"
      # ——— END CONCEPT LOOP ———

      - issue:
          check: "concepts taught and randori completed"

      - write:
          path: "kata/"
          filename: "{topic}.md"
          access: read-write
          via: PR
          approval: none
      - issue:
          check: "kata updated"

      - write:
          path: "kiroku/nikki/"
          filename: "YYYY-MM-DD_{topic}_study.yml"
          from: Malstrom/zeroth:frameworks/dojo/templates/kiroku_nikki.yml
          access: write-once
          via: PR
          approval: none
      - issue:
          check: "nikki written"

      - write:
          path: .gakusei.yml
          fields: [topics.{topic}.status, topics.{topic}.sessions, last_session]
          access: read-write
          via: PR
          approval: none
      - issue:
          check: ".gakusei.yml updated"

      - commit_before_reply
    output:
      state_changes: [study-completed]

  randori:
    # Called by study_open once per concept — context (topic, concept) inherited.
    # Also callable standalone — context resolved via ask.
    on:
      - user wants to drill on the current topic
      - user asks to be quizzed on what was just explained
      - user wants to practice a concept
      - user wants to review what they know
      - user wants to practice without studying first
    creates_issue: false
    read:
      - .gakusei.yml
      - "kata/{topic}.md"            # resolved after context step below
    steps:
      # ——— CONTEXT RESOLUTION ———
      # When called from study_open, topic/concept are inherited — skip.
      # When called standalone, they are unknown — ask before doing anything.
      - if:
          condition: topic is missing
          then:
            - ask: "Which topic?"
      # ——— END CONTEXT RESOLUTION ———

      - ask: "{{reasoning_question_on_concept_requiring_concept_to_answer}}"

      - if:
          condition: answer_correct OR answer_substantially_correct
          then:
            - say: "Correct. {{brief_positive_reinforcement}}"
          else:
            - say: "Not quite — {{gap_explanation}}"
            - ask: "{{simpler_followup_on_same_concept_using_only_source_or_prior_kata}}"
            - if:
                condition: followup_correct
                then:
                  - say: "Good. {{brief_explanation_of_gap}}"
                  - write:
                      path: "kiroku/nikki/"
                      filename: "YYYY-MM-DD_{topic}_study.yml"
                      fields: [weak_spots]
                      access: append-only
                      via: PR
                      approval: none
                else:
                  - say: "{{full_re_explanation_of_concept}}"
                  - write:
                      path: "kiroku/nikki/"
                      filename: "YYYY-MM-DD_{topic}_study.yml"
                      fields: [weak_spots]
                      access: append-only
                      via: PR
                      approval: none
    output:
      state_changes: [randori-completed]

  evaluate_readiness:
    # EVENT-TRIGGERED — silent.
    # Triggered by: study-completed.
    # Computes readiness for the studied topic, writes result to .gakusei.yml, emits outcome.
    # User interaction delegated entirely to readiness_report.
    on:
      events: [study-completed]
    dedup: once per session
    creates_issue: false
    read:
      - .gakusei.yml
      - "kiroku/nikki/"
    steps:
      - compute: randori_score
      - compute: sessions_without_gaps
      - compute: session_weak_spots
      - if:
          condition: randori_score >= readiness_thresholds.min_randori_score
                     AND sessions_without_gaps >= readiness_thresholds.min_sessions_without_gaps
          then:
            - write:
                path: .gakusei.yml
                fields: [topics.{topic}.readiness_status, topics.{topic}.readiness_score]
                access: read-write
                via: PR
                approval: none
            - emit: readiness-ready
          else:
            - if:
                condition: session_weak_spots | count > 0
                then:
                  - write:
                      path: .gakusei.yml
                      fields: [topics.{topic}.readiness_status, topics.{topic}.readiness_score, topics.{topic}.readiness_gaps]
                      access: read-write
                      via: PR
                      approval: none
                  - emit: readiness-gap
                else:
                  - write:
                      path: .gakusei.yml
                      fields: [topics.{topic}.readiness_status, topics.{topic}.readiness_score]
                      access: read-write
                      via: PR
                      approval: none
                  - emit: readiness-loop
    output:
      state_changes: []

  readiness_report:
    # REPORTER — user-facing.
    # Triggered by: readiness-ready, readiness-gap, readiness-loop.
    # Reads result written by evaluate_readiness, proposes next action.
    # Does NOT compute or write.
    type: reporter
    on:
      events: [readiness-ready, readiness-gap, readiness-loop]
    creates_issue: false
    read:
      - .gakusei.yml
    steps:
      - if:
          condition: readiness_status == "ready"
          then:
            - say: "Score: {{readiness_score.randori_pct}}% correct, {{readiness_score.clean_sessions}} clean sessions. You look ready for topic shinsa."
            - propose: "Take the topic shinsa for {{topic}} now?"
              on_confirm:
                - call: topic_shinsa
              on_reject:
                - say: "OK. Come back when you're ready."
          else:
            - if:
                condition: readiness_status == "gap"
                then:
                  - say: "Gaps found: {{readiness_gaps | join}}. Let's work on them."
                  - propose: "Study the weak spots now?"
                    on_confirm:
                      - call: study_open
                        with:
                          topic: "{{readiness_gaps_as_topic}}"
                          source: gaps_from_nikki
                    on_reject:
                      - say: "OK. Weak spots saved. We'll revisit them next session."
                else:
                  - say: "No gaps today, but not enough clean sessions yet ({{readiness_score.clean_sessions}}/{{readiness_thresholds.min_sessions_without_gaps}}). Keep going."
                  - propose: "Study a new concept in {{topic}}?"
                    on_confirm:
                      - call: study_open
                        with:
                          topic: "{{next_concept_not_yet_in_kata}}"
                    on_reject:
                      - say: "OK. See you next session."
    output:
      state_changes: []

  topic_shinsa:
    on:
      events: [readiness-ready]          # AI-triggered when topic is ready
      # Also student-triggered:
      - user says they want to take the exam on a topic
      - user says "shinsa on {topic}"
      - user says they are ready to test a topic
    creates_issue: true
    issue:
      title: "Topic shinsa: {topic}"
      from: Malstrom/zeroth:frameworks/dojo/templates/issue_topic_shinsa.md
      update: check
      approval: none
      on_complete: close
      on_fail: comment
    read:
      - .gakusei.yml
      - "kata/{topic}.md"
    steps:
      # Guard: signal if not ready, but never block.
      - if:
          condition: topics.{topic}.readiness_status != "ready"
          then:
            - say: "Randori score: {{readiness_score.randori_pct}}%, {{readiness_score.clean_sessions}} clean sessions. You may not be ready yet."
            - propose: "Proceed anyway?"
              on_reject:
                - stop
              on_confirm:
                - continue

      - say: "Topic shinsa: {{topic}}. No feedback during exam — only final score."

      # ——— EXAM LOOP ———
      # 5–8 open questions drawn exclusively from kata/{topic}.md.
      # No feedback between questions.
      - for_each: question in exam.questions   # count: 5–8, source: kata/{topic}.md
        do:
          - ask: "{{question.text}}"
      # ——— END EXAM LOOP ———

      - compute: score
      - compute: weak_spots
      - issue:
          check: "exam conducted"

      - write:
          path: "kiroku/nikki/"
          filename: "YYYY-MM-DD_{topic}_shinsa.yml"
          from: Malstrom/zeroth:frameworks/dojo/templates/kiroku_nikki.yml
          access: write-once
          via: PR
          approval: none
      - issue:
          check: "nikki written"

      - if:
          condition: score >= 80
          then:
            - write:
                path: .gakusei.yml
                fields: [topics.{topic}.status, topics.{topic}.sessions]
                access: read-write
                via: PR
                approval: none
            - emit: topic-shinsa-passed
          else:
            - write:
                path: .gakusei.yml
                fields: [topics.{topic}.sessions]
                access: read-write
                via: PR
                approval: none
            - emit: topic-shinsa-failed
      - issue:
          check: ".gakusei.yml updated"

      - commit_before_reply
    output:
      state_changes: []   # emits are conditional

  topic_shinsa_report:
    type: reporter
    on:
      events: [topic-shinsa-passed, topic-shinsa-failed]
    creates_issue: false
    read:
      - .gakusei.yml
    steps:
      - if:
          condition: event == "topic-shinsa-passed"
          then:
            - say: "Topic shinsa passed. Score: {{score}}%. {{topic}} is now completed."
            # If topic is part of an active goal, check it in the goal issue.
            - if:
                condition: open_goal_issues | any: topic in goal.required_topics
                then:
                  - say: "Progress toward {{matching_goal.title}}: {{matching_goal.completed_count}}/{{matching_goal.total_count}} topics."
          else:
            - say: "Topic shinsa not passed. Score: {{score}}%. Weak spots: {{weak_spots | join}}."
            - propose: "Study the weak spots now?"
              on_confirm:
                - call: study_open
                  with:
                    topic: "{{topic}}"
                    source: gaps_from_nikki
              on_reject:
                - say: "OK. Review when you're ready and try again."
    output:
      state_changes: []

  goal_shinsa:
    on:
      - user wants to take the seniority exam for an active goal
      - user says they are ready to test their goal
      - user wants to check if they have reached their goal
    creates_issue: true
    issue:
      title: "Goal shinsa: {goal_slug}"
      from: Malstrom/zeroth:frameworks/dojo/templates/issue_goal_shinsa.md
      update: check
      approval: none
      on_complete: close
      on_fail: comment
    read:
      - .gakusei.yml
      - "kata/"                          # AI selects relevant kata based on goal reasoning
    steps:
      # AI evaluates completed topics vs what it judges necessary for the goal.
      # Signals readiness — never blocks.
      - compute: goal_readiness
      - if:
          condition: goal_readiness == "not_ready"
          then:
            - say: |
                Based on your completed topics, you may not be ready for {{goal_slug}} yet.
                Completed: {{completed_relevant_topics | join}}.
                Missing: {{missing_relevant_topics | join}}.
            - propose: "Proceed anyway?"
              on_reject:
                - say: "OK. Keep studying and come back when ready."
                - stop
              on_confirm:
                - continue

      - say: "Goal shinsa: {{goal_slug}}. No feedback during exam — only final score."

      # ——— EXAM LOOP ———
      # 15–20 open questions drawn from kata/ files relevant to the goal.
      # AI selects questions covering breadth across all relevant completed topics.
      # No feedback between questions.
      - for_each: question in exam.questions   # count: 15–20, source: kata/ filtered by goal reasoning
        do:
          - ask: "{{question.text}}"
      # ——— END EXAM LOOP ———

      - compute: score
      - compute: weak_topics
      - issue:
          check: "exam conducted"

      - write:
          path: "kiroku/nikki/"
          filename: "YYYY-MM-DD_{goal_slug}_goal_shinsa.yml"
          from: Malstrom/zeroth:frameworks/dojo/templates/kiroku_nikki.yml
          access: write-once
          via: PR
          approval: none
      - issue:
          check: "nikki written"

      - if:
          condition: score >= 80
          then:
            - write:
                path: "kiroku/makimono/"
                filename: "YYYY-MM-DD_{goal_slug}_passed.yml"
                from: Malstrom/zeroth:frameworks/dojo/templates/kiroku_makimono.yml
                access: write-once
                via: PR
                approval: none
            - issue:
                check: "makimono written"
            - write:
                path: .gakusei.yml
                fields: [goals.{goal_slug}.status, goals.{goal_slug}.achieved_on]
                access: read-write
                via: PR
                approval: none
            - emit: goal-shinsa-passed
          else:
            - write:
                path: .gakusei.yml
                fields: [goals.{goal_slug}.shinsa_attempts]
                access: read-write
                via: PR
                approval: none
            - emit: goal-shinsa-failed
      - issue:
          check: ".gakusei.yml updated"

      - commit_before_reply
    output:
      state_changes: []   # emits are conditional

  goal_shinsa_report:
    type: reporter
    on:
      events: [goal-shinsa-passed, goal-shinsa-failed]
    creates_issue: false
    read:
      - .gakusei.yml
    steps:
      - if:
          condition: event == "goal-shinsa-passed"
          then:
            - say: |
                Goal shinsa passed. Score: {{score}}%.
                {{goal_slug}} achieved — makimono written.
          else:
            - say: |
                Goal shinsa not passed. Score: {{score}}%.
                Weak topics: {{weak_topics | join}}.
            - propose: "Study the weak topics now?"
              on_confirm:
                - call: study_open
                  with:
                    topic: "{{weak_topics.first}}"
                    source: gaps_from_nikki
              on_reject:
                - say: "OK. Review when you're ready and try again."
    output:
      state_changes: []

  unknown_scenario:
    on:
      - any message that does not match any other scenario
    creates_issue: false
    read: []
    steps:
      - if:
          condition: closest_scenario exists
          then:
            - propose: "Did you mean: {{closest_scenario}}?"
              on_confirm:
                - call: "{{closest_scenario}}"
              on_reject:
                - say: "OK. What would you like to do?"
          else:
            - say: "I don't recognize that as a defined scenario. Want me to open an issue to add it?"
              # Note: the AI must NOT open the issue autonomously.
              # It must wait for user confirmation before any action.
    output:
      state_changes: []
