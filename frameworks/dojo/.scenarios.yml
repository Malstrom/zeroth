# dojo framework — scenario catalog
# Model: GitHub Actions workflows — on: for routing, steps: for logic
# Each scenario = one workflow: trigger → read → steps → output
# Syntax: rules/scenarios.yml
# Spec: github.com/Malstrom/zeroth

required_scenarios:

  session_start:
    on:
      - session opens automatically
    creates_issue: false
    read:
      - .gakusei.yml
    steps:
      - if:
          condition: gakusei_missing OR student_name == ""
          then:
            - read: frameworks/dojo/onboarding.yml
            - call: onboarding
            - stop
      - say: "{{student_name}}!"
      - say: "Last session: {{last_session.subject}} — {{last_session.topic}}. Next: {{last_session.next}}"
      - propose: "Continue from where you left off?"
        on_confirm:
          - call: study_open
        on_reject:
          - say: "What would you like to do? study_open, quiz, shinsa, randori."
    output:
      state_changes: []

  study_open:
    on:
      - user wants to study a specific topic or chapter
      - user asks to be taught something
      - user wants to open a study session on a subject
    creates_issue: true
    issue:
      title: "Study: {subject} — {topic}"
      body: |
        - [ ] source loaded
        - [ ] concepts taught and randori completed
        - [ ] kata updated
        - [ ] nikki written
        - [ ] .gakusei.yml updated
        - [ ] readiness evaluated
      on_complete: close
      on_fail: comment
    read:
      - .gakusei.yml                      # student profile, readiness_thresholds, history
      - "kata/{subject}/{topic}.md"       # read if exists — skip silently if missing (first study)
    input_sources:
      # Priority order: attached_file > url > pasted_text > ai_knowledge
      - attached_file                     # user uploads a PDF, doc, or text file
      - url                               # user shares a link — AI reads the page
      - pasted_text                       # user pastes raw text
      - ai_knowledge                      # fallback: AI generates content on the subject
    steps:
      - say: "{{source_summary}}: {{concept_count}} concepts identified."
      - issue:
          check: "source loaded"

      # ——— CONCEPT LOOP ———
      # Repeat for each concept in the source, in order.
      # concept = one discrete unit: a heading block, a thematic paragraph,
      #           or a logical chunk if the source is unstructured.
      # Do NOT invent concepts outside the source.
      # Prerequisites not in source: only if already in kata/ for this subject.
      - for_each: concept in source.concepts
        do:
          - say: |
              **{{concept.title}}**
              {{concept.explanation}}
              > Source: {{concept.citation}}
          - issue:
              comment: |
                ### Concept: {{concept.title}}
                {{concept.explanation}}
                > {{concept.citation}}
          - call: randori
            with:
              concept: "{{concept}}"
              subject: "{{subject}}"
              topic: "{{topic}}"
      # ——— END CONCEPT LOOP ———

      - issue:
          check: "concepts taught and randori completed"

      - write:
          path: "kata/{subject}/"
          filename: "{topic}.md"
          access: read-write
          via: PR
      - issue:
          check: "kata updated"

      - write:
          path: "kiroku/nikki/"
          filename: "YYYY-MM-DD_{subject}_study.yml"
          from: templates/nikki.yml
          access: append-only
          via: PR
      - issue:
          check: "nikki written"

      - write:
          path: .gakusei.yml
          fields: [last_session, book_progress]
          access: read-write
          via: PR
      - issue:
          check: ".gakusei.yml updated"

      - issue:
          check: "readiness evaluated"   # checked by readiness_report after event chain
    output:
      state_changes: [study-completed]   # → triggers evaluate_readiness → readiness_report

  randori:
    # Called by study_open once per concept.
    # Also callable standalone by the user.
    on:
      - user wants to drill on the current topic
      - user asks to be quizzed on what was just explained
      - user wants to practice a concept
    creates_issue: false
    # When called from study_open: concept, subject, topic passed as context.
    # When called standalone: read from .gakusei.yml last_session.
    read:
      - .gakusei.yml
      - "kata/{subject}/{topic}.md"
    steps:
      # Question must require the concept to answer.
      # It must make the student reason — not recall a fact.
      # It must be answerable with what was just explained (no out-of-scope knowledge).
      - ask: "{{reasoning_question_on_concept_requiring_concept_to_answer}}"

      - if:
          condition: answer_correct OR answer_substantially_correct
          then:
            - say: "Correct. {{brief_positive_reinforcement}}"
            - issue:
                comment: |
                  ✅ Randori — {{concept.title}}
                  Q: {{question}}
                  A: {{student_answer}}
                  Outcome: correct
          else:
            - say: "Not quite — {{gap_explanation}}"
            - ask: "{{simpler_followup_on_same_concept_using_only_source_or_prior_kata}}"
            - if:
                condition: followup_correct
                then:
                  - say: "Good. {{brief_explanation_of_gap}}"
                  - issue:
                      comment: |
                        ⚠️ Randori — {{concept.title}}
                        Q: {{question}}
                        A: {{student_answer}}
                        Followup: {{followup_question}}
                        FA: {{followup_answer}}
                        Outcome: partial — gap: {{gap_description}}
                  - write:
                      path: "kiroku/nikki/"
                      filename: "YYYY-MM-DD_{subject}_study.yml"
                      fields: [weak_spots]
                      access: append-only
                      via: PR
                else:
                  - say: "{{full_re_explanation_of_concept}}"
                  - issue:
                      comment: |
                        ❌ Randori — {{concept.title}}
                        Q: {{question}}
                        A: {{student_answer}}
                        Followup: {{followup_question}}
                        FA: {{followup_answer}}
                        Outcome: incorrect — gap: {{gap_description}}
                  - write:
                      path: "kiroku/nikki/"
                      filename: "YYYY-MM-DD_{subject}_study.yml"
                      fields: [weak_spots]
                      access: append-only
                      via: PR
    output:
      state_changes: [randori-completed]

  evaluate_readiness:
    # EVENT-TRIGGERED — silent.
    # Triggered by: study-completed.
    # Computes readiness score, writes result to .gakusei.yml, emits outcome event.
    # User interaction delegated entirely to readiness_report (user-triggered).
    on:
      events: [study-completed]
    dedup: once per session
    creates_issue: false
    read:
      - .gakusei.yml                      # readiness_thresholds + session history
      - "kiroku/nikki/"                   # recent sessions for score + gap analysis
    # readiness_thresholds (defined in .gakusei.yml):
    #   min_randori_score: 0.75           # % correct across recent sessions
    #   min_sessions_without_gaps: 2      # consecutive sessions with no weak_spots
    steps:
      - compute: randori_score            # % correct answers across last N sessions
      - compute: sessions_without_gaps    # consecutive sessions with zero weak_spots
      - compute: session_weak_spots       # weak_spots from current session nikki
      - if:
          condition: randori_score >= readiness_thresholds.min_randori_score
                     AND sessions_without_gaps >= readiness_thresholds.min_sessions_without_gaps
          then:
            - write:
                path: .gakusei.yml
                fields: [readiness_status, readiness_score]
                access: read-write
                via: PR
            - emit: readiness-ready
          else:
            - if:
                condition: session_weak_spots | count > 0
                then:
                  - write:
                      path: .gakusei.yml
                      fields: [readiness_status, readiness_score, readiness_gaps]
                      access: read-write
                      via: PR
                  - emit: readiness-gap
                else:
                  - write:
                      path: .gakusei.yml
                      fields: [readiness_status, readiness_score]
                      access: read-write
                      via: PR
                  - emit: readiness-loop
    output:
      state_changes: []                   # all emits are conditional — declared above

  readiness_report:
    # USER-TRIGGERED (also auto-invoked after evaluate_readiness event chain).
    # Reads readiness_status from .gakusei.yml and proposes next action.
    on:
      events: [readiness-ready, readiness-gap, readiness-loop]
    creates_issue: false
    read:
      - .gakusei.yml                      # readiness_status, readiness_score, readiness_gaps
    steps:
      - if:
          condition: readiness_status == "ready"
          then:
            - say: "Score: {{readiness_score.randori_pct}}% correct, {{readiness_score.clean_sessions}} clean sessions. You look ready for shinsa."
            - propose: "Take the shinsa for {{subject}} now?"
              on_confirm:
                - call: shinsa
              on_reject:
                - say: "OK. Come back when you're ready."
          else:
            - if:
                condition: readiness_status == "gap"
                then:
                  - say: "Gaps found: {{readiness_gaps | join}}. Let's work on them."
                  - propose: "Study the weak spots now?"
                    on_confirm:
                      - call: study_open
                        with:
                          subject: "{{subject}}"
                          topic: "{{readiness_gaps_as_topic}}"
                          source: gaps_from_nikki
                    on_reject:
                      - say: "OK. Weak spots saved. We'll revisit them next session."
                else:
                  - say: "No gaps today, but not enough clean sessions yet ({{readiness_score.clean_sessions}}/{{readiness_thresholds.min_sessions_without_gaps}}). Keep going."
                  - propose: "Study a new concept in {{subject}}?"
                    on_confirm:
                      - call: study_open
                        with:
                          subject: "{{subject}}"
                          topic: "{{next_concept_not_yet_in_kata}}"
                    on_reject:
                      - say: "OK. See you next session."
    output:
      state_changes: []

  quiz:
    on:
      - user wants to do a quick quiz on their current subject
      - user wants to practice on their own without studying
      - user wants to review what they know
    creates_issue: false
    read:
      - .gakusei.yml
      - "kata/{subject}/"
    steps:
      - say: "Quiz on {{last_session.subject}}. Answer by typing A, B, C or D."
      - ask: "{{mc_question_1_with_4_options_from_kata}}"
      - ask: "{{mc_question_2_with_4_options_from_kata}}"
      - ask: "{{mc_question_3_with_4_options_from_kata}}"
      - ask: "{{mc_question_4_with_4_options_from_kata}}"
      - ask: "{{mc_question_5_with_4_options_from_kata}}"
      - say: "Score: {{score}}/5. {{weak_spots_summary}}"
    output:
      state_changes: []

  shinsa:
    on:
      - user says they finished a book or subject
      - user wants to take the formal exam for a subject
      - user wants to test their overall knowledge of a subject
    creates_issue: true
    issue:
      title: "Shinsa: {subject}"
      body: |
        - [ ] exam conducted
        - [ ] nikki written
        - [ ] .gakusei.yml updated
      on_complete: close
      on_fail: comment
    read:
      - .gakusei.yml
      - "kata/{subject}/"
    steps:
      - ask: "Ready for shinsa on {subject}? No feedback during exam — only final score."
      - say: "Shinsa begins. Answer each question in your own words. 10 to 15 questions."
      - ask: "{{open_exam_question_1}}"
      - ask: "{{open_exam_question_2}}"
      - ask: "{{open_exam_question_3}}"
      - ask: "{{open_exam_question_4}}"
      - ask: "{{open_exam_question_5}}"
      - ask: "{{open_exam_question_6}}"
      - ask: "{{open_exam_question_7}}"
      - ask: "{{open_exam_question_8}}"
      - ask: "{{open_exam_question_9}}"
      - ask: "{{open_exam_question_10}}"
      - if:
          condition: score >= 80
          then:
            - write:
                path: "kiroku/nikki/"
                filename: "YYYY-MM-DD_{subject}_shinsa.yml"
                from: templates/nikki.yml
                access: write-once
                via: PR
            - issue:
                check: "nikki written"
            - write:
                path: .gakusei.yml
                fields: [exams]
                access: read-write
                via: PR
            - issue:
                check: ".gakusei.yml updated"
            - say: "Shinsa passed. Score: {{score}}%."
            - emit: shinsa-passed
            - propose: "Move to next level for {subject}?"
              on_confirm:
                - call: level_up
          else:
            - write:
                path: "kiroku/nikki/"
                filename: "YYYY-MM-DD_{subject}_shinsa.yml"
                from: templates/nikki.yml
                access: write-once
                via: PR
            - issue:
                check: "nikki written"
            - write:
                path: .gakusei.yml
                fields: [exams]
                access: read-write
                via: PR
            - issue:
                check: ".gakusei.yml updated"
            - say: "Shinsa not passed. Score: {{score}}%. Weak chapters: {{weak_chapters}}. Review and retry."
            - emit: shinsa-failed
    output:
      state_changes: []

  level_up:
    on:
      - user confirms level up after passing the shinsa
      - user wants to manually advance their level on a subject
    creates_issue: false
    read:
      - .gakusei.yml
      - gakusei.md
    steps:
      - write:
          path: .gakusei.yml
          fields: [subjects, active_books, completed_books]
          access: read-write
          via: PR
      - write:
          path: gakusei.md
          access: read-write
          via: PR
    output:
      state_changes: [level-up-completed]

  unknown_scenario:
    on:
      - any message that does not match any other scenario
    creates_issue: false
    read: []
    steps:
      - propose: "Did you mean: {{closest_scenario}}?"
        on_confirm:
          - call: "{{closest_scenario}}"
      - if:
          condition: no_match
          then:
            - say: "Scenario not defined. Want me to add it?"
    output:
      state_changes: []
