# .scenarios.yml
# AI-only scenario catalog for a dojo instance.
# Spec: github.com/Malstrom/zeroth

required_scenarios:

  session_start:
    on:
      - session opens automatically
    creates_issue: false
    read:
      - .agent.yml
      - .gakusei.yml
    steps:
      - say: "{{greeting_with_current_belt_and_last_kata}}"
      - propose: "{{next_kata_or_resume_failed_kata}}"
        on_confirm:
          - call: study
    output:
      state_changes: []

  study:
    on:
      - user wants to study a kata
      - user asks to learn a topic
      - session_start confirms study
    creates_issue: false
    read:
      - .gakusei.yml
      - "kata/{{kata_slug}}.yml"
    steps:
      - say: "{{kata_explanation}}"
      - propose: "Ready to test?"
        on_confirm:
          - call: test
    output:
      state_changes: []

  test:
    on:
      - user is ready to be tested
      - user asks for a quiz
      - study confirms test
    creates_issue: false
    read:
      - "kata/{{kata_slug}}.yml"
      - .gakusei.yml
    steps:
      - ask: "{{quiz_question_based_on_kata}}"
      - evaluate: user answer
      - call: review
    output:
      state_changes: []

  review:
    on:
      - test completes
      - user asks for feedback
    creates_issue: false
    read:
      - .gakusei.yml
      - "kata/{{kata_slug}}.yml"
    steps:
      - say: "{{feedback_with_correct_answer_if_wrong}}"
      - write:
          path: "log/"
          filename: "YYYY-MM-DD_{{kata_slug}}.yml"
          access: append-only
          via: PR
      - write:
          path: .gakusei.yml
          fields: [belt, last_kata, weak_points]
          access: read-write
          via: PR
      - propose: "{{next_recommended_kata}}"
        on_confirm:
          - call: study
    output:
      state_changes: [session-completed]

  add_kata:
    on:
      - user wants to add a new kata
      - user wants to define a new topic
    creates_issue: true
    issue:
      title: "Add kata: {slug}"
      body: |
        - [ ] kata/{slug}.yml created
        - [ ] .gakusei.yml updated
      on_complete: close
      on_fail: comment
    read:
      - .gakusei.yml
    steps:
      - ask: "What topic should this kata cover?"
      - write:
          path: "kata/"
          filename: "{{slug}}.yml"
          access: write-once
          via: PR
      - issue:
          check: "kata/{slug}.yml created"
      - write:
          path: .gakusei.yml
          fields: [available_kata]
          access: read-write
          via: PR
      - issue:
          check: ".gakusei.yml updated"
    output:
      state_changes: [kata-added]

  unknown_scenario:
    on:
      - any message that does not match any other scenario
    creates_issue: false
    read: []
    steps:
      - propose: "Did you mean: {{closest_scenario}}?"
        on_confirm:
          - call: "{{closest_scenario}}"
      - if:
          condition: no_match
          then:
            - say: "Scenario not defined. Want me to add it?"
    output:
      state_changes: []
