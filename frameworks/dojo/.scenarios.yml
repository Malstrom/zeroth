# dojo framework — scenario definitions

required_scenarios:
  session_start:
    trigger_patterns:
      - session opens
    read:
      - .gakusei.yml
      - kiroku/_index.md
    actions:
      - greet student by name
      - summarise last session and current level per subject
      - propose next action: continue last book, start a new subject, or take final_exam if a book is complete
    state_changes: []

  study_open:
    trigger_patterns:
      - "study {topic}"
      - "study chapter {chapter} of {book}"
      - "teach me {topic}"
      - "let's study {subject}"
    read:
      - .gakusei.yml
      - kiroku/_index.md
      - "kata/{subject}/{topic}.md"
    input_sources:
      - google_drive: download PDF from the library link stored in .gakusei.yml
      - attached_file: read from the chat attachment
      - pasted_text: read from the chat message
      - ai_knowledge: use internal knowledge adapted to the student level in .gakusei.yml
    actions:
      - identify subject and topic
      - extract 5 to 7 key concepts from the source, or generate them from ai_knowledge
      - explain concepts one at a time, adapted to the student level
      - after each concept, trigger randori
      - after all concepts, update "kata/{subject}/{topic}.md" via PR
      - update "kiroku/{subject}/YYYY-MM-DD.md"
      - update kiroku/_index.md
      - update .gakusei.yml with last_session and book_progress
      - update gakusei.md
    state_changes:
      - study-completed

  randori:
    trigger_patterns:
      - "quiz me on {topic}"
      - "let's do randori"
      - "check if I understood {topic}"
    read:
      - .gakusei.yml
      - "kata/{subject}/{topic}.md"
    actions:
      - ask 1 to 2 open questions on the concept just explained or requested
      - wait for the student's answer
      - if correct, give brief positive feedback and move on
      - if incorrect, explain the gap and ask a simpler follow-up question
      - record weak spots in the current kiroku session file
    state_changes:
      - randori-completed

  final_exam:
    trigger_patterns:
      - "test me on {book}"
      - "final exam for {subject}"
      - "I finished the book"
    read:
      - .gakusei.yml
      - kiroku/_index.md
    actions:
      - confirm the student is ready
      - ask 10 to 15 questions covering the full book, one at a time
      - track score internally using the first answer only
      - at the end, report score and pass/fail with an 80 percent threshold
      - if passed, propose level_up and wait for confirmation
      - if failed, identify weak chapters and propose targeted review before retry
      - write immutable exam record to "kiroku/{subject}/YYYY-MM-DD.md"
    state_changes:
      - exam-passed
      - exam-failed

  level_up:
    trigger_patterns:
      - "yes, update my level"
      - "confirm level up"
      - "I passed, update the profile"
    read:
      - .gakusei.yml
      - gakusei.md
    actions:
      - update .gakusei.yml subject level
      - update gakusei.md
      - move the completed book from active_books to completed_books in .gakusei.yml
      - commit via PR
    state_changes:
      - level-up-completed

  unknown_scenario:
    trigger_patterns:
      - any unmatched message
    read: []
    actions:
      - map the request to the closest scenario and ask for confirmation
      - if no match exists, propose adding a new scenario
    state_changes: []
