# dojo framework — scenario catalog
# Model: GitHub Actions workflows — on: for routing, steps: for logic
# Each scenario = one workflow: trigger → read → steps → output
# Syntax: rules/scenarios.yml
# Spec: github.com/Malstrom/zeroth/issues/162
#
# STATE MODEL (see .agent.yml for full reference):
# - .gakusei.yml         → student identity only
# - open goal issues     → active goals + topic checklist ([ ] / [x])
# - kata/{topic}.md      → topic knowledge + ## Current gaps
# - kiroku/nikki/        → immutable session history
# - kiroku/makimono/     → immutable certifications
#
# INVARIANT: .gakusei.yml is NEVER written with topics.* or goals.*

required_scenarios:

  session_start:
    on:
      - session opens automatically
    creates_issue: false
    read:
      - .gakusei.yml                          # identity only
      - github:issues:open:[Goal]              # all open goal issues
    steps:
      - if:
          condition: gakusei_missing OR student_name == ""
          then:
            - read: Malstrom/zeroth:frameworks/dojo/onboarding.yml
            - call: onboarding
            - stop
      - say: "{{student_name}}!"
      - if:
          condition: open_goal_issues | count > 0
          then:
            - say: |
                Goal attivo: {{open_goal_issues.first.title}}
                Progressi:
                {{open_goal_issues.first | topics_with_kata_status}}
                # topics_with_kata_status renders each topic as:
                # - `slug` — in progress (kata exists, gaps: X) | not started | [x] passed
                # kata existence check: kata/{slug}.md exists?
                # gap count: ## Current gaps section in kata/{slug}.md, non-empty lines
            - propose: "Continuiamo su {{open_goal_issues.first.title}}?"
              on_confirm:
                - call: study_open
              on_reject:
                - say: "Cosa vuoi fare? study, randori, topic shinsa, o dichiara un nuovo goal."
          else:
            - say: "Nessun goal attivo."
            - propose: "Dichiari un goal?"
              on_confirm:
                - call: declare_goal
              on_reject:
                - say: "Cosa vuoi fare? study, randori, o topic shinsa."
    output:
      state_changes: []

  declare_goal:
    on:
      - user wants to declare a learning objective
      - user says they want to become senior in something
      - user says they want to reach a level in a language or technology
      - user wants to set a goal
      - user provides a cross-repo source artifact (job offer, project spec, interview feedback)
    creates_issue: true
    issue:
      title: "[Goal] {goal_source_emoji} {goal_human_title} ({goal_slug})"
      from: Malstrom/zeroth:frameworks/dojo/templates/issue_declare_goal.md
      update: check
      approval: none
      on_complete: close
      on_fail: comment
    read:
      - .gakusei.yml
      - "kata/"                     # list filenames only — AI checks which kata already exist
    steps:
      - ask: "Qual è il tuo goal?"
      - compute: goal_slug
      - compute: goal_human_title
      - ask: "Da dove viene questo goal? (self-declared, job offer, project, interview feedback — o incolla un link)"
      - compute: goal_source_type
      - compute: goal_source_ref
      - compute: goal_source_emoji
      - if:
          condition: goal_source_type == "cross_repo"
          then:
            - read: "{{goal_source_ref}}"
      - compute: required_topics
      - compute: already_satisfied     # required_topics where kata/{slug}.md exists AND ## Current gaps is empty
      - compute: missing_topics        # required_topics − already_satisfied
      - say: |
          Goal: {{goal_human_title}} ({{goal_slug}})
          Source: {{goal_source_emoji}} {{goal_source_type}}{{goal_source_ref | prefix: " — "}}
          Already satisfied ({{already_satisfied | count}}): {{already_satisfied | join}}
          Topics to study:
            🔴 Critical:  {{missing_topics | where: priority == critical | join}}
            🟡 Important: {{missing_topics | where: priority == important | join}}
            🟢 Later:     {{missing_topics | where: priority == later | join}}
      # Issue body rendering:
      # kata exists    → - [ ] `slug` — description — [kata](https://github.com/{owner}/{repo}/blob/main/kata/slug.md)
      # kata missing   → - [ ] `slug` — description  (or *(ai inferred)*)
      # ALL kata links: absolute GitHub URLs (blob/main/), never relative.
    output:
      state_changes: [goal-declared]

  study_open:
    on:
      - user wants to study a specific topic
      - user asks to be taught something
      - user wants to open a study session on a topic
    creates_issue: true
    issue:
      title: "Study: {topic}"
      from: Malstrom/zeroth:frameworks/dojo/templates/issue_study_open.md
      update: check
      approval: none
      on_complete: close
      on_fail: comment
    read:
      - .gakusei.yml
      - "kata/{topic}.md"            # read if exists — contains current gaps
    input_sources:
      - attached_file
      - url
      - pasted_text
      - ai_knowledge
    steps:
      - say: "{{source_summary}}: {{concept_count}} concepts identified."
      - issue:
          check: "source loaded"

      - for_each: concept in source.concepts
        do:
          - say: |
              **{{concept.title}}**
              {{concept.explanation}}
              > Source: {{concept.citation}}
          - call: randori
            with:
              concept: "{{concept}}"
              topic: "{{topic}}"

      - issue:
          check: "concepts taught and randori completed"

      # Write nikki FIRST — immutable record of the session
      - write:
          path: "kiroku/nikki/"
          filename: "YYYY-MM-DD_{topic}_study.yml"
          from: Malstrom/zeroth:frameworks/dojo/templates/kiroku_nikki.yml
          access: write-once
          via: PR
          approval: none
      - issue:
          check: "nikki written"

      # Update kata: add new concepts + refresh ## Current gaps
      - write:
          path: "kata/{topic}.md"
          access: read-write
          via: PR
          approval: none
          note: |
            Append new concepts to kata.
            Replace ## Current gaps section with gaps identified during this session's randori.
            If no gaps: write '- None recorded yet.' under ## Current gaps.
      - issue:
          check: "kata updated"

      # Update goal issue if topic is in checklist — add kata link, do NOT check yet
      - if:
          condition: open_goal_issues | any: topic in goal.unchecked_topics
          then:
            - update_issue:
                target: matching_goal_issue
                action: add_kata_link
                topic: "{{topic}}"
                # Finds '- [ ] `{topic}`' line and appends kata link if not already present:
                # '- [ ] `{topic}` — {description} — [kata](https://github.com/{owner}/{repo}/blob/main/kata/{topic}.md)'
      - issue:
          check: "goal issue updated"

      - merge:
          strategy: squash
          target: main
          via: PR
          approval: none
    output:
      state_changes: [study-completed]

  randori:
    on:
      - user wants to drill on the current topic
      - user asks to be quizzed on what was just explained
      - user wants to practice a concept
      - user wants to review what they know
      - user wants to practice without studying first
    creates_issue: false
    read:
      - "kata/{topic}.md"            # gaps come from ## Current gaps section
    steps:
      - if:
          condition: topic is missing
          then:
            - ask: "Which topic?"

      - ask: "{{reasoning_question_on_concept_requiring_concept_to_answer}}"

      - if:
          condition: answer_correct OR answer_substantially_correct
          then:
            - say: "Correct. {{brief_positive_reinforcement}}"
          else:
            - say: "Not quite — {{gap_explanation}}"
            - ask: "{{simpler_followup_on_same_concept_using_only_source_or_prior_kata}}"
            - if:
                condition: followup_correct OR followup_substantially_correct
                then:
                  - say: "Good. {{brief_explanation_of_gap}}"
                else:
                  - say: "{{full_re_explanation_of_concept}}"
            # In both gap cases: update ## Current gaps in kata
            - write:
                path: "kata/{topic}.md"
                fields: [current_gaps]
                access: read-write
                via: PR
                approval: none
                note: |
                  Replace ## Current gaps section only.
                  Add new gap if not already listed.
                  Format: - `concept` — description of specific gap
    output:
      state_changes: [randori-completed]

  evaluate_readiness:
    on:
      events: [study-completed]
    dedup: once per session
    creates_issue: false
    read:
      - "kata/{topic}.md"            # ## Current gaps is the gap source
    steps:
      - compute: randori_score
      - compute: sessions_without_gaps   # count nikki files for topic with empty ## Current gaps at time of writing
      - compute: has_gaps                # ## Current gaps in kata non-empty
      - if:
          condition: randori_score >= readiness_thresholds.min_randori_score
                     AND sessions_without_gaps >= readiness_thresholds.min_sessions_without_gaps
          then:
            - emit: readiness-ready
          else:
            - if:
                condition: has_gaps
                then:
                  - emit: readiness-gap
                else:
                  - emit: readiness-loop
    output:
      state_changes: []

  readiness_report:
    type: reporter
    on:
      events: [readiness-ready, readiness-gap, readiness-loop]
    creates_issue: false
    read:
      - "kata/{topic}.md"
    steps:
      - if:
          condition: event == "readiness-ready"
          then:
            - say: "Score: {{randori_score}}% correct, {{sessions_without_gaps}} clean sessions. Ready for topic shinsa."
            - propose: "Fai la topic shinsa per {{topic}} adesso?"
              on_confirm:
                - call: topic_shinsa
              on_reject:
                - say: "OK. Torna quando sei pronto."
          else:
            - if:
                condition: event == "readiness-gap"
                then:
                  - say: "Gaps: {{current_gaps | join}}. Studiamoli."
                  - propose: "Studio i weak spots adesso?"
                    on_confirm:
                      - call: study_open
                        with:
                          topic: "{{topic}}"
                          source: gaps_from_kata
                    on_reject:
                      - say: "OK. I gap sono nel kata. Li rivediamo la prossima sessione."
                else:
                  - say: "Nessun gap oggi, ma non abbastanza sessioni pulite ({{sessions_without_gaps}}/{{readiness_thresholds.min_sessions_without_gaps}}). Continua."
                  - propose: "Studia un nuovo concetto in {{topic}}?"
                    on_confirm:
                      - call: study_open
                        with:
                          topic: "{{next_concept_not_yet_in_kata}}"
                    on_reject:
                      - say: "OK. Alla prossima sessione."
    output:
      state_changes: []

  topic_shinsa:
    on:
      - events: [readiness-ready]
      - user says they want to take the exam on a topic
      - user says "shinsa on {topic}"
      - user says they are ready to test a topic
    creates_issue: true
    issue:
      title: "Topic shinsa: {topic}"
      from: Malstrom/zeroth:frameworks/dojo/templates/issue_topic_shinsa.md
      update: check
      approval: none
      on_complete: close
      on_fail: comment
    read:
      - "kata/{topic}.md"
    steps:
      - if:
          condition: kata/{topic}.md current_gaps | count > 0
          then:
            - say: "Ci sono ancora gap aperti: {{current_gaps | join}}. Potresti non essere pronto."
            - propose: "Procedi comunque?"
              on_reject:
                - stop
              on_confirm:
                - continue

      - say: "Topic shinsa: {{topic}}. Nessun feedback durante l'esame — solo score finale."

      - for_each: question in exam.questions   # 5–8 questions from kata/{topic}.md
        do:
          - ask: "{{question.text}}"

      - compute: score
      - compute: weak_spots
      - issue:
          check: "exam conducted"

      # Write nikki FIRST
      - write:
          path: "kiroku/nikki/"
          filename: "YYYY-MM-DD_{topic}_shinsa.yml"
          from: Malstrom/zeroth:frameworks/dojo/templates/kiroku_nikki.yml
          access: write-once
          via: PR
          approval: none
      - issue:
          check: "nikki written"

      - if:
          condition: score >= 80
          then:
            # Update goal issue: check the topic + add kata and nikki links
            - if:
                condition: open_goal_issues | any: topic in goal.unchecked_topics
                then:
                  - update_issue:
                      target: matching_goal_issue
                      action: check_topic
                      topic: "{{topic}}"
                      nikki: "{{nikki_url}}"
                      # Finds '- [ ] `{topic}`' and replaces with:
                      # '- [x] `{topic}` — {description} — [kata](...) — [nikki](...)'
                      # Both links are absolute GitHub URLs (blob/main/).
            - emit: topic-shinsa-passed
          else:
            # Update ## Current gaps in kata from weak_spots
            - write:
                path: "kata/{topic}.md"
                fields: [current_gaps]
                access: read-write
                via: PR
                approval: none
                note: Replace ## Current gaps with weak_spots from this shinsa.
            - emit: topic-shinsa-failed
      - issue:
          check: "artifacts updated"

      - merge:
          strategy: squash
          target: main
          via: PR
          approval: none
    output:
      state_changes: []

  topic_shinsa_report:
    type: reporter
    on:
      events: [topic-shinsa-passed, topic-shinsa-failed]
    creates_issue: false
    read:
      - github:issues:open:[Goal]    # to show updated progress
    steps:
      - if:
          condition: event == "topic-shinsa-passed"
          then:
            - say: "Topic shinsa passata. Score: {{score}}%. {{topic}} completato."
            - if:
                condition: open_goal_issues | any: topic in goal.required_topics
                then:
                  - say: "Progresso verso {{matching_goal.title}}: {{matching_goal.checked_count}}/{{matching_goal.total_count}} topic."
          else:
            - say: "Topic shinsa non passata. Score: {{score}}%. Gap aggiornati nel kata."
            - propose: "Studia i weak spots adesso?"
              on_confirm:
                - call: study_open
                  with:
                    topic: "{{topic}}"
                    source: gaps_from_kata
              on_reject:
                - say: "OK. I gap sono nel kata. Riprova quando sei pronto."
    output:
      state_changes: []

  goal_shinsa:
    on:
      - user wants to take the seniority exam for an active goal
      - user says they are ready to test their goal
      - user wants to check if they have reached their goal
    creates_issue: true
    issue:
      title: "Goal shinsa: {goal_slug}"
      from: Malstrom/zeroth:frameworks/dojo/templates/issue_goal_shinsa.md
      update: check
      approval: none
      on_complete: close
      on_fail: comment
    read:
      - github:issues:open:[Goal]    # goal issue — checked topics = completed topics
      - "kata/"                      # list all kata filenames
    steps:
      - compute: goal_readiness      # from goal issue checked count vs total
      - if:
          condition: goal_readiness == "not_ready"
          then:
            - say: |
                Non sei ancora pronto per {{goal_slug}}.
                Completati: {{checked_topics | join}}.
                Mancanti: {{unchecked_topics | join}}.
            - propose: "Procedi comunque?"
              on_reject:
                - say: "OK. Continua a studiare."
                - stop
              on_confirm:
                - continue

      - say: "Goal shinsa: {{goal_slug}}. Nessun feedback durante l'esame — solo score finale."

      - for_each: question in exam.questions   # 15–20 questions from kata/ filtered by goal
        do:
          - ask: "{{question.text}}"

      - compute: score
      - compute: weak_topics
      - issue:
          check: "exam conducted"

      # Write nikki FIRST
      - write:
          path: "kiroku/nikki/"
          filename: "YYYY-MM-DD_{goal_slug}_goal_shinsa.yml"
          from: Malstrom/zeroth:frameworks/dojo/templates/kiroku_nikki.yml
          access: write-once
          via: PR
          approval: none
      - issue:
          check: "nikki written"

      - if:
          condition: score >= 80
          then:
            - write:
                path: "kiroku/makimono/"
                filename: "YYYY-MM-DD_{goal_slug}_passed.yml"
                from: Malstrom/zeroth:frameworks/dojo/templates/kiroku_makimono.yml
                access: write-once
                via: PR
                approval: none
            - issue:
                check: "makimono written"
            - update_issue:
                target: matching_goal_issue
                action: close
                makimono: "{{makimono_url}}"
                # Closes the goal issue with a comment: makimono link
            - emit: goal-shinsa-passed
          else:
            - emit: goal-shinsa-failed
      - issue:
          check: "artifacts updated"

      - merge:
          strategy: squash
          target: main
          via: PR
          approval: none
    output:
      state_changes: []

  goal_shinsa_report:
    type: reporter
    on:
      events: [goal-shinsa-passed, goal-shinsa-failed]
    creates_issue: false
    read: []
    steps:
      - if:
          condition: event == "goal-shinsa-passed"
          then:
            - say: |
                Goal shinsa passata. Score: {{score}}%.
                {{goal_slug}} raggiunto — makimono scritto.
          else:
            - say: |
                Goal shinsa non passata. Score: {{score}}%.
                Weak topics: {{weak_topics | join}}.
            - propose: "Studia i weak topics adesso?"
              on_confirm:
                - call: study_open
                  with:
                    topic: "{{weak_topics.first}}"
                    source: gaps_from_kata
              on_reject:
                - say: "OK. Riprova quando sei pronto."
    output:
      state_changes: []

  unknown_scenario:
    on:
      - any message that does not match any other scenario
    creates_issue: false
    read: []
    steps:
      - if:
          condition: closest_scenario exists
          then:
            - propose: "Did you mean: {{closest_scenario}}?"
              on_confirm:
                - call: "{{closest_scenario}}"
              on_reject:
                - say: "OK. What would you like to do?"
          else:
            - say: "I don't recognize that as a defined scenario. Want me to add it?"
    output:
      state_changes: []
