# dojo framework — scenario catalog
# Syntax: rules/scenarios.yml

required_scenarios:

  session_start:
    trigger_patterns:
      - session opens automatically
    read:
      - .gakusei.yml
    actions:
      - say: "{{student_name}}!"
      - say: "Last session: {{last_session.subject}} — {{last_session.topic}}. Next: {{last_session.next}}"
      - propose: "Continue from where you left off?"
        on_confirm:
          - call: study_open
    state_changes: []

  study_open:
    trigger_patterns:
      - user wants to study a specific topic or chapter
      - user asks to be taught something
      - user wants to open a study session on a subject
    read:
      - .gakusei.yml
      - "kata/{subject}/{topic}.md"
    input_sources:
      - google_drive
      - attached_file
      - pasted_text
      - ai_knowledge
    actions:
      - say: "{{source_loading_message}}"
      - call: randori
        after: each_concept
      - update:
          file: "kata/{subject}/{topic}.md"
          via: PR
      - update:
          file: "kiroku/{subject}/{date}.md"
          mode: append
          via: PR
      - update:
          file: .gakusei.yml
          fields: [last_session, book_progress]
          via: PR
      - update:
          file: gakusei.md
          via: PR
    state_changes:
      - study-completed

  randori:
    trigger_patterns:
      - user wants to drill on the current topic
      - user asks to be quizzed on what was just explained
      - user wants to practice a concept
    read:
      - .gakusei.yml
      - "kata/{subject}/{topic}.md"
    actions:
      - ask: "{{open_question_on_current_concept_adapted_to_student_level}}"
      - if:
          condition: answer_correct
          then:
            - say: "Correct."
          else:
            - say: "Not quite — {{gap_explanation}}"
            - ask: "{{simpler_followup_on_same_concept}}"
      - update:
          file: "kiroku/{subject}/{date}.md"
          fields: [weak_spots]
          mode: append
          via: PR
    state_changes:
      - randori-completed

  quiz:
    trigger_patterns:
      - user wants to do a quick quiz on their current subject
      - user wants to practice on their own without studying
      - user wants to review what they know
    read:
      - .gakusei.yml
      - "kata/{subject}/"
    actions:
      - say: "Quiz on {{last_session.subject}}. Answer by typing A, B, C or D."
      - ask: "{{mc_question_1_with_4_options_from_kata}}"
      - ask: "{{mc_question_2_with_4_options_from_kata}}"
      - ask: "{{mc_question_3_with_4_options_from_kata}}"
      - ask: "{{mc_question_4_with_4_options_from_kata}}"
      - ask: "{{mc_question_5_with_4_options_from_kata}}"
      - say: "Score: {{score}}/5. {{weak_spots_summary}}"
    state_changes: []

  shinsa:
    trigger_patterns:
      - user says they finished a book or subject
      - user wants to take the formal exam for a subject
      - user wants to test their overall knowledge of a subject
    read:
      - .gakusei.yml
      - "kata/{subject}/"
    actions:
      - ask: "Are you ready to begin the shinsa for {subject}? There is no feedback during the exam — only your final score."
      - say: "Shinsa begins. Answer each question in your own words. 10 to 15 questions."
      - ask: "{{open_exam_question_1_explain_or_describe_or_difference}}"
      - ask: "{{open_exam_question_2_explain_or_describe_or_difference}}"
      - ask: "{{open_exam_question_3_explain_or_describe_or_difference}}"
      - ask: "{{open_exam_question_4_explain_or_describe_or_difference}}"
      - ask: "{{open_exam_question_5_explain_or_describe_or_difference}}"
      - ask: "{{open_exam_question_6_explain_or_describe_or_difference}}"
      - ask: "{{open_exam_question_7_explain_or_describe_or_difference}}"
      - ask: "{{open_exam_question_8_explain_or_describe_or_difference}}"
      - ask: "{{open_exam_question_9_explain_or_describe_or_difference}}"
      - ask: "{{open_exam_question_10_explain_or_describe_or_difference}}"
      - if:
          condition: score >= 80
          then:
            - update:
                file: "kiroku/{subject}/{date}.md"
                fields: [exam_result, score]
                mode: append
                via: PR
            - update:
                file: .gakusei.yml
                fields: [exams]
                via: PR
            - say: "Shinsa passed. Score: {{score}}%."
            - emit: shinsa-passed
            - propose: "Move to the next level for {subject}?"
              on_confirm:
                - call: level_up
          else:
            - update:
                file: "kiroku/{subject}/{date}.md"
                fields: [exam_result, score, weak_chapters]
                mode: append
                via: PR
            - update:
                file: .gakusei.yml
                fields: [exams]
                via: PR
            - say: "Shinsa not passed. Score: {{score}}%. Weak chapters: {{weak_chapters}}. Review and retry."
            - emit: shinsa-failed
    state_changes: []

  level_up:
    trigger_patterns:
      - user confirms level up after passing the shinsa
      - user wants to manually advance their level on a subject
    read:
      - .gakusei.yml
      - gakusei.md
    actions:
      - update:
          file: .gakusei.yml
          fields: [subjects, active_books, completed_books]
          via: PR
      - update:
          file: gakusei.md
          via: PR
    state_changes:
      - level-up-completed

  unknown_scenario:
    trigger_patterns:
      - any message that does not match any other scenario
    read: []
    actions:
      - propose: "Did you mean: {{closest_scenario}}?"
        on_confirm:
          - call: "{{closest_scenario}}"
      - if:
          condition: no_match
          then:
            - say: "Scenario not defined. Want me to add it?"
    state_changes: []
