# dojo framework — repo structure
# Defines expected folders, files, and naming conventions.

structure:

  .gakusei.yml:
    description: Student state — topics, goals, readiness scores, last session.
    template: frameworks/dojo/templates/.gakusei.yml
    access: read-write
    managed_by: [study_open, topic_shinsa, goal_shinsa, declare_goal, evaluate_readiness]

  kata/:
    description: |
      Flat kata library. One file per topic — no subject subfolders.
      Each file accumulates questions, answers, and concepts for that topic.
    filename_pattern: "{topic}.md"
    template: frameworks/dojo/templates/kata.yml
    access: read-write
    managed_by: [study_open]
    note: topic slug is the filename stem — e.g. deadlock.md, sql_indexes.md

  kiroku/nikki/:
    description: |
      Session records. One file per session.
      Covers study sessions, topic shinsa, and goal shinsa.
    filename_pattern: "YYYY-MM-DD_{topic}_{type}.yml"
    type_values: [study, shinsa, goal_shinsa]
    template: frameworks/dojo/templates/kiroku_nikki.yml
    access: write-once
    managed_by: [study_open, topic_shinsa, goal_shinsa]

  kiroku/makimono/:
    description: |
      Immutable certification snapshots.
      Produced by goal_shinsa on pass only — one per achieved goal.
      References the nikki of the exam session.
    filename_pattern: "YYYY-MM-DD_{goal_slug}_passed.yml"
    template: frameworks/dojo/templates/kiroku_makimono.yml
    access: write-once
    managed_by: [goal_shinsa]

  gakusei.md:
    description: Human-readable student profile. Updated on significant milestones.
    template: frameworks/dojo/templates/gakusei.md
    access: read-write
    managed_by: [onboarding, goal_shinsa]
