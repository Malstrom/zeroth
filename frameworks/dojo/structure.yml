# dojo framework — directory structure

required_layout:
  root:
    - .agent.yml           # AI manifest — entry point, read-only
    - .gakusei.yml         # machine-readable student profile — AI reads and writes
    - README.md            # human navigation hub
    # gakusei.md is NOT required at init — created by AI on first session
  kata/:
    - "{subject}/"            # one subfolder per subject (e.g. github/, rails/, devops/)
    - "{subject}/{topic}.md"  # one file per topic within the subject
  kiroku/:
    makimono/:              # living documents — evolve with the student, updated via PR
      - "{subject}.md"      # one file per subject (e.g. github.md, python.md)
    nikki/:                 # immutable session diary — append-only, never overwrite
      - "YYYY-MM-DD_{subject}_{type}.md"  # one file per session (e.g. 2026-06-09_python_study.md)

rules:
  - .gakusei.yml is the single source of truth for student progress — the AI reads and updates it
  - gakusei.md is created by the AI on first session and updated after every session and level_up
  - kiroku/nikki/ files are append-only — never overwrite
  - kiroku/makimono/ files are living documents — updated via PR, never directly on main
  - kata/ files are updated via PR, never directly on main
  - .scenarios.yml, .registry.yml, onboarding.yml, templates/ are NOT stored in the repo — the AI reads them from zeroth
  - densho/ does not exist — books are read from library sources, not stored in the repository
  - file permissions are declared in .agent.yml — structure.yml is reference only
  - onboarding.yml is read from zeroth only once at first session

strict_root:
  allowed:
    - .agent.yml
    - .gakusei.yml
    - .github
    - .git
    - gakusei.md
    - README.md
    - LICENSE
    - kata
    - kiroku

dynamic_dirs:
  kata/{subject}/:
    pattern: "{topic}.md"
    regex: "^.+\.md$"
    allow_empty: false
  kiroku/makimono/:
    pattern: "{subject}.md"
    regex: "^.+\.md$"
    allow_empty: true
  kiroku/nikki/:
    pattern: "YYYY-MM-DD_{subject}_{type}.md"
    regex: "^\\d{4}-\\d{2}-\\d{2}_.+\.md$"
    allow_empty: true

# ---------------------------------------------------------------------------
# SCAFFOLD STRATEGY
# Used by the spawn scenario to know what to create in the new repo.
# All other framework files (.scenarios.yml, .registry.yml, onboarding.yml,
# templates/) are read by the AI directly from zeroth — never copied.
# ---------------------------------------------------------------------------
scaffold_strategy:

  copy:  # copy from frameworks/{name}/ into the new repo root
    - source: frameworks/{name}/.agent.yml
      dest: .agent.yml

  generate:  # generate from scratch using onboarding data + overview.yml
    - dest: .gakusei.yml
      guided_by: frameworks/{name}/onboarding.yml
      note: populated with onboarding data collected during spawn
    - dest: kiroku/makimono/.gitkeep
      note: empty dir placeholder
    - dest: kiroku/nikki/.gitkeep
      note: empty dir placeholder
    - dest: kata/.gitkeep
      note: empty dir placeholder
    - dest: README.md
      guided_by: frameworks/{name}/overview.yml
      note: human-facing intro generated from overview
