# structure.yml
# Required directory layout for a dojo instance.

framework: dojo

required_files:
  - path: .agent.yml
    role: AI manifest — read at session start
    template: zeroth/templates/.agent.yml
  - path: .scenarios.yml
    role: scenario catalog
    template: zeroth/frameworks/dojo/.scenarios.yml
  - path: .registry.yml
    role: cross-repo connection map
    template: zeroth/templates/.registry.yml
  - path: .gakusei.yml
    role: learner identity, current belt, last kata, weak points
    template: null  # created at dojo init with real learner data

required_directories:
  - path: kata/
    role: kata definitions — one file per topic
    min_files: 1
  - path: log/
    role: append-only session logs
    min_files: 0  # empty at init, populated after first review

file_naming:
  kata: "{{slug}}.yml"            # e.g. promises.yml, closures.yml
  log: "YYYY-MM-DD_{{slug}}.yml"  # e.g. 2026-06-13_promises.yml

notes:
  - log/ files are immutable — never overwrite, only append new files
  - .gakusei.yml is the single source of truth for learner state
  - one dojo = one subject — do not mix unrelated topics in one repo
