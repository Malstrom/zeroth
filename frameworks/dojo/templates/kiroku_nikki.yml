# kiroku_nikki.yml
# Schema for kiroku/nikki/YYYY-MM-DD_{topic}_{type}.yml files.
# Giskard validates that every nikki file contains these keys.

_format: yaml
_required:
  date: string           # YYYY-MM-DD
  topic: string          # must match a key in .gakusei.yml topics
  type: string           # enum: study | shinsa | goal_shinsa
  concepts_taught: list  # list of concept identifiers covered in session
  weak_spots: list       # list of strings — may be empty
  randori_results:
    total: integer
    correct: integer
    partial: integer
    incorrect: integer
  notes: string
_optional:
  goal_slug: string      # present when type == goal_shinsa
