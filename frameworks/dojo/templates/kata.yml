# kata.yml
# Schema for kata/{topic}.md files.
# Giskard validates that every kata file contains these keys.
#
# Format: markdown file — validated by heading presence, not YAML keys.
# Giskard checks:
#   - file is not empty
#   - at least one H2 section (## Concept)
#   - filename matches a topic declared in .gakusei.yml topics

_format: markdown
_required:
  - topic_header: "# {topic}"        # H1 matching filename without .md
  - min_concepts: 1                   # at least one H2 block
_optional:
  - code_blocks: true                 # encouraged but not required
