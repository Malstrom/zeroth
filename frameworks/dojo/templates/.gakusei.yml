# .gakusei.yml — machine-readable student profile
# Generated by AI at spawn via onboarding.yml — do not edit manually.
# The AI reads and updates this file at every session.

student_name: ""
language: ""

subjects:
  github:                          # default subject — added at spawn, more added via study_open
    level: not_started             # not_started | beginner | intermediate | advanced
    kata_completed: []             # list of topic paths completed (e.g. github/fork.md)
    readiness_status: null         # null | loop | gap | ready
    readiness_score: null          # { randori_pct: 0, clean_sessions: 0 }
    readiness_gaps: []             # list of topics with weak_spots
    readiness_thresholds:
      min_randori_score: 0.75
      min_sessions_without_gaps: 3
    exams: []                      # list of { date, score, result: passed|failed }
    last_session:
      topic: ""
      next: ""

last_session:
  subject: ""                      # last active subject
