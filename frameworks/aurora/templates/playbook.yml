# templates/playbook.yml
# Template for playbook files.
# Path: playbooks/{slug}.yml
# One playbook per work type — not per tool.

name: "{{playbook_slug}}"
description: "{{what this work type involves}}"
work_type: "{{work_type enum value}}"

required_input:
  - "{{input 1}}"
  - "{{input 2}}"

steps:
  - step: 1
    action: "{{atomic verifiable action — no vague language}}"
  - step: 2
    action: "{{atomic verifiable action}}"

output:
  - "{{file or artifact produced}}"

notes: null
