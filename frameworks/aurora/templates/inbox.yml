# templates/inbox.yml
# Template for incoming task files.
# Path: clients/{slug}/inbox/YYYY-MM-DD_{slug}.yml
# IMMUTABLE once created — append status updates only.

date: "{{YYYY-MM-DD}}"
client: "{{client_slug}}"
contact: "{{client}}_{{firstname}}_{{lastname}}"
source: "{{email|chat|meeting|other}}"
subject: "{{task title or subject line}}"

task:
  description: "{{raw task description}}"
  deadline: "{{YYYY-MM-DD}}"   # null if not specified
  documents_required: []        # list of required documents if applicable
  documents_received: []        # list of received documents

status: open                    # open | in_progress | done
status_log:
  - date: "{{YYYY-MM-DD}}"
    status: open
    note: "created"

issue_ref: null                 # GitHub issue number once opened
playbook: null                  # playbook slug used for this task
