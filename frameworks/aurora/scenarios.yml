# frameworks/aurora/scenarios.yml
# Aurora scenario catalog.
# Each scenario: trigger, required_input, steps (atomic), output.
# No vague steps (L2-15). Template must be read before file generation (L2-14).
# Status: DRAFT (issue #55)

scenarios:

  - id: ingest_task
    trigger: "user shares a new task, email, or request"
    required_input:
      - raw task content (email body, message, description)
      - client name or slug
    steps:
      - step: 1
        action: identify client slug from input
      - step: 2
        action: read clients/{slug}/context.yml
      - step: 3
        action: read log/{slug}/_index or latest monthly index if exists
      - step: 4
        action: search index for entries with matching topics or work_types
      - step: 5
        action: read relevant log files found in step 4 (max 5)
      - step: 6
        action: read templates/inbox.yml
      - step: 7
        action: create clients/{slug}/inbox/YYYY-MM-DD_{slug}.yml with extracted data
      - step: 8
        action: open GitHub issue with task summary and history context
      - step: 9
        action: respond to user in chat with summary, history found, and proposed next step
    output:
      - clients/{slug}/inbox/YYYY-MM-DD_{slug}.yml
      - GitHub issue

  - id: work_session
    trigger: "user starts working on a task"
    required_input:
      - client slug
      - task reference (inbox file or issue number)
    steps:
      - step: 1
        action: read inbox file for this task
      - step: 2
        action: identify work_type from task description
      - step: 3
        action: read playbooks/{work_type}.yml
      - step: 4
        action: read clients/{slug}/context.yml
      - step: 5
        action: present playbook steps to user and ask for confirmation to start
      - step: 6
        action: execute playbook steps one by one, reporting progress in chat
    output: depends on playbook

  - id: log_work
    trigger: "user asks to log work done or session ends"
    required_input:
      - client slug
      - what was done (summary)
    steps:
      - step: 1
        action: read templates/log.yml
      - step: 2
        action: check if log/{slug}/YYYY-MM-DD.yml exists for today
      - step: 3
        action: "if exists: append new entry. If not: create file from template."
      - step: 4
        action: write log file BEFORE responding to user (write-ahead, L2-6)
      - step: 5
        action: check if reindex trigger condition is met for this client
      - step: 6
        action: respond to user in chat confirming log written
    output:
      - log/{slug}/YYYY-MM-DD.yml (append)

  - id: recall
    trigger: "user asks about past work for a client or topic"
    required_input:
      - client slug or topic keyword
    steps:
      - step: 1
        action: read log/_index/YYYY.yml for current and previous year
      - step: 2
        action: identify relevant monthly indexes from annual index
      - step: 3
        action: read identified monthly indexes
      - step: 4
        action: identify relevant daily log files from monthly indexes (max 10)
      - step: 5
        action: read identified daily log files
      - step: 6
        action: synthesize findings and respond in chat
    output: chat response with history summary

  - id: reindex
    trigger: "user asks to reindex, or automatic trigger fires"
    required_input:
      - client slug (or 'all' for full reindex)
      - period (month YYYY-MM or year YYYY)
    steps:
      - step: 1
        action: read templates/log_index.yml
      - step: 2
        action: list all daily log files for client in the given period
      - step: 3
        action: read each daily log file
      - step: 4
        action: extract fields per log entry: date, topics, jira_refs, issue_refs, work_types
      - step: 5
        action: write log/{slug}/YYYY-MM.index.yml from template with extracted refs
      - step: 6
        action: update log/_index/YYYY.yml with reference to new monthly index
      - step: 7
        action: respond in chat confirming index updated
    output:
      - log/{slug}/YYYY-MM.index.yml
      - log/_index/YYYY.yml (updated)

  - id: summarize_client
    trigger: "user asks for a client summary"
    required_input:
      - client slug
    steps:
      - step: 1
        action: read clients/{slug}/context.yml
      - step: 2
        action: run recall scenario for this client (last 12 months)
      - step: 3
        action: read existing clients/{slug}/summary.md if present
      - step: 4
        action: generate updated summary covering context + recent history
      - step: 5
        action: write clients/{slug}/summary.md
      - step: 6
        action: share link to summary.md in chat
    output:
      - clients/{slug}/summary.md

  - id: draft_reply
    trigger: "user asks to draft a reply or message to a contact"
    required_input:
      - contact name or slug
      - message intent or original message to reply to
    steps:
      - step: 1
        action: identify contact file from name or slug
      - step: 2
        action: read contacts/{client}_{firstname}_{lastname}.yml
      - step: 3
        action: read communication fields (language, formality, salutation, format, avoid)
      - step: 4
        action: read relevant context from clients/{slug}/context.yml
      - step: 5
        action: draft reply applying communication preferences exactly
      - step: 6
        action: present draft in chat, ask for approval before saving
      - step: 7
        action: "if approved: write to clients/{slug}/output/YYYY-MM-DD_{slug}.md"
    output:
      - chat draft
      - clients/{slug}/output/YYYY-MM-DD_{slug}.md (if approved)
