# frameworks/aurora/scenarios.yml
# Aurora scenario catalog.
# Each scenario: trigger, required_input, steps (atomic), output.
# No vague steps (L2-15). Template must be read before file generation (L2-14).
# Write-ahead declared explicitly on every step that writes an immutable file (L2-6).
# Status: DRAFT (issue #55)

scenarios:

  - id: ingest_task
    trigger: "user shares a new task, email, or request"
    required_input:
      - raw task content (email body, message, description)
      - client name or slug
    steps:
      - step: 1
        action: identify client slug from input
      - step: 2
        action: read clients/{slug}/context.yml
      - step: 3
        action: read log/_index/YYYY.yml for current year if exists
      - step: 4
        action: identify relevant monthly indexes from annual index
      - step: 5
        action: read identified monthly indexes
      - step: 6
        action: search indexes for entries with matching topics or work_types
      - step: 7
        action: read relevant log files found in step 6 (max 5)
      - step: 8
        action: read templates/inbox.yml
      - step: 9
        action: "write-ahead (L2-6): create clients/{slug}/inbox/YYYY-MM-DD_{slug}.yml with extracted data BEFORE responding"
      - step: 10
        action: open GitHub issue with task summary and history context
      - step: 11
        action: respond in chat with summary, history found, and proposed next step
    output:
      - clients/{slug}/inbox/YYYY-MM-DD_{slug}.yml
      - GitHub issue

  - id: delegate_task
    trigger: "user wants to assign a task to a team member"
    required_input:
      - inbox file path or task slug
    steps:
      - step: 1
        action: read inbox file to extract work_type and task description
      - step: 2
        action: list all files in contacts/ matching pattern internal_*.yml
      - step: 3
        action: read each internal contact file
      - step: 4
        action: filter contacts where skills contains work_type matching the task
      - step: 5
        action: for each matching contact compute average score from performance_log (null if empty)
      - step: 6
        action: rank candidates by level (expert first) then by average score descending
      - step: 7
        action: present ranked candidates in chat with skills match and score rationale
      - step: 8
        action: wait for user to choose a candidate in chat
      - step: 9
        action: read communication fields from chosen contact file
      - step: 10
        action: run draft_reply scenario to generate assignment message using contact communication preferences
      - step: 11
        action: "write-ahead (L2-6): append status_log entry to inbox file with status in_progress and assigned_to set BEFORE responding"
      - step: 12
        action: write log entry for this client with type delegation, assigned_to, task_ref
    output:
      - inbox file updated (assigned_to + status_log append)
      - log entry written
      - assignment message draft in chat

  - id: rate_work
    trigger: "user wants to evaluate completed work by a team member"
    required_input:
      - contact slug (internal team member)
      - inbox file path or task slug
    steps:
      - step: 1
        action: read inbox file to confirm task context and assigned_to
      - step: 2
        action: read contacts/{client}_{firstname}_{lastname}.yml for the assigned contact
      - step: 3
        action: ask user in chat for score (1-5), strengths (list), weaknesses (list), notes
      - step: 4
        action: "write-ahead (L2-6): append performance_log entry to contact file with date, task_ref, score, strengths, weaknesses, notes BEFORE responding"
      - step: 5
        action: append status_log entry to inbox file with status done
      - step: 6
        action: write log entry with type task_completed, assigned_to, score, task_ref
      - step: 7
        action: respond in chat confirming rating saved and show updated performance summary for this contact
    output:
      - contact file updated (performance_log append)
      - inbox file updated (status done)
      - log entry written

  - id: work_session
    trigger: "user starts working on a task themselves"
    required_input:
      - client slug
      - task reference (inbox file or issue number)
    steps:
      - step: 1
        action: read inbox file for this task
      - step: 2
        action: identify work_type from task.work_type field in inbox file
      - step: 3
        action: read playbooks/{work_type}.yml
      - step: 4
        action: read clients/{slug}/context.yml
      - step: 5
        action: present playbook name, description and full steps list to user in chat
      - step: 6
        action: for each step in playbook.steps in order, read the step action and execute it, then report result in chat before moving to next step
    output: depends on playbook

  - id: log_work
    trigger: "user asks to log work done or session ends"
    required_input:
      - client slug
      - what was done (summary)
    steps:
      - step: 1
        action: read templates/log.yml
      - step: 2
        action: check if log/{slug}/YYYY-MM-DD.yml exists for today
      - step: 3
        action: "if exists: append new entry to file. If not: create file from template."
      - step: 4
        action: write log file BEFORE responding to user (write-ahead L2-6)
      - step: 5
        action: count files in log/{slug}/ without a monthly index
      - step: 6
        action: "if count > 30: run reindex scenario for this client"
      - step: 7
        action: respond in chat confirming log written
    output:
      - log/{slug}/YYYY-MM-DD.yml (appended or created)

  - id: recall
    trigger: "user asks about past work for a client or topic"
    required_input:
      - client slug or topic keyword
    steps:
      - step: 1
        action: read log/_index/YYYY.yml for current and previous year
      - step: 2
        action: identify relevant monthly indexes from annual index
      - step: 3
        action: read identified monthly indexes
      - step: 4
        action: identify relevant daily log files from monthly indexes (max 10)
      - step: 5
        action: read identified daily log files
      - step: 6
        action: synthesize findings and respond in chat
    output: chat response with history summary

  - id: reindex
    trigger: "user asks to reindex, or automatic trigger fires from log_work step 6"
    required_input:
      - client slug (or _all for full reindex)
      - period (month YYYY-MM or year YYYY)
    steps:
      - step: 1
        action: read templates/log_index.yml
      - step: 2
        action: list all daily log files for client in the given period
      - step: 3
        action: read each daily log file
      - step: 4
        action: extract per entry: date, topics, jira_refs, issue_refs, work_types
      - step: 5
        action: write log/{slug}/YYYY-MM.index.yml from template with extracted refs
      - step: 6
        action: read log/_index/YYYY.yml
      - step: 7
        action: append or update reference to new monthly index in annual index
      - step: 8
        action: respond in chat confirming index updated with file count
    output:
      - log/{slug}/YYYY-MM.index.yml
      - log/_index/YYYY.yml (updated)

  - id: summarize_client
    trigger: "user asks for a client summary"
    required_input:
      - client slug
    steps:
      - step: 1
        action: read clients/{slug}/context.yml
      - step: 2
        action: run recall scenario for this client covering last 12 months
      - step: 3
        action: read existing clients/{slug}/summary.md if present
      - step: 4
        action: generate updated summary covering context and recent history
      - step: 5
        action: write clients/{slug}/summary.md
      - step: 6
        action: respond in chat with link to summary.md
    output:
      - clients/{slug}/summary.md

  - id: draft_reply
    trigger: "user asks to draft a reply or message to a contact"
    required_input:
      - contact name or slug
      - message intent or original message to reply to
    steps:
      - step: 1
        action: identify contact file from name or slug
      - step: 2
        action: read contacts/{client}_{firstname}_{lastname}.yml
      - step: 3
        action: extract communication fields (language, formality, salutation, format, avoid)
      - step: 4
        action: read clients/{slug}/context.yml for relevant background
      - step: 5
        action: draft message applying all communication preferences
      - step: 6
        action: present draft in chat
      - step: 7
        action: "if user confirms in chat: write to clients/{slug}/output/YYYY-MM-DD_{slug}.md"
    output:
      - draft in chat
      - clients/{slug}/output/YYYY-MM-DD_{slug}.md (only if user confirmed in step 6)
