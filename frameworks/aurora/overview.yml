# frameworks/aurora/overview.yml
# Aurora framework — professional memory + operational assistant
# Status: DRAFT (issue #55)

name: aurora
version: 1
status: draft

tag_line: "The AI remembers everything you have done. You just work."

purpose: >
  Aurora is an AI-native framework that acts as persistent professional memory
  and operational assistant for any type of knowledge work.
  The AI does not track tasks — it accompanies you in doing them,
  remembers everything, and uses that memory when needed.

key_problems_solved:
  - "I worked 3 years for a client and cannot remember what I did."
  - "I need to reply to a client but do not remember the context."
  - "I receive a task and do not know if I have done something similar before."
  - "I want to log what I did without switching to another tool."

target_users:
  - consultants
  - developers
  - freelancers
  - anyone doing recurring work for multiple clients

core_concepts:
  client: an external entity you do work for
  contact: a person at a client you communicate with
  inbox: raw incoming task data before processing
  log: immutable daily record of work done
  index: AI-generated map of log files for fast recall
  playbook: step-by-step instructions for a recurring work type
  recall: AI operation to retrieve past work history for a client/topic
  reindex: AI operation to generate or update monthly/annual index

scenarios:
  - ingest_task
  - work_session
  - log_work
  - recall
  - reindex
  - summarize_client
  - draft_reply

derives_from: zeroth
L2_compliance: see rules/laws.yml in zeroth
