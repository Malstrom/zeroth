# .agent.yml
# AI-only operational manifest for the aurora framework.
# Rules: https://github.com/Malstrom/zeroth/tree/main/rules
# Framework: https://github.com/Malstrom/zeroth/tree/main/frameworks/aurora
# On doubt, read the relevant rules file in zeroth/rules/ — see zeroth repo_map for navigation.
# Status: DRAFT (see overview.yml)

connector_check:
  on_fail: |
    Say: "GitHub connector not active. Click + → GitHub → new chat."
    Stop immediately. Do not fall back to web or browser.

repo_map:
  # Each aurora instance defines its own repo_map.
  # This canonical version is a reference — not meant to be copied verbatim.
  root: .
  profile: .aurora.yml
  clients: clients/
  contacts: contacts/
  playbooks: playbooks/
  templates: templates/
  scenarios: .scenarios.yml
  registry: .registry.yml

file_access:
  _note: "Describes what the AI is allowed to modify — NOT how to deploy. PR rule always applies regardless of permission level."
  read:
    - .aurora.yml
    - .scenarios.yml
    - .registry.yml
    - "clients/**"
    - "contacts/**"
    - "playbooks/**"
    - "templates/**"
  append:
    - "clients/*/log/*.yml"         # daily log files are immutable/append-only
    - "clients/*/inbox/*.yml"       # inbox files are immutable once written
  write:
    - "clients/*/context.yml"
    - "clients/*/summary.md"
    - "clients/*/output/**"
    - "clients/*/playbooks/**"
    - "clients/*/log/*.index.yml"
    - "contacts/**"
    - "playbooks/**"

deployment:
  all_writes_via_pr: true
  exceptions: []

tool_approval:
  # false = proceed immediately without asking the user
  # true  = always ask before executing
  feature_branch: false
  file_edit: false
  push_files: false
  create_pr: false
  merge_to_main: false
  delete_file: true
  destructive_ops: true

write_ahead:
  rule: commit before responding
  branch_strategy: |
    NEVER push directly to main.
    Always: feature branch → PR → squash merge.
    Branch naming: {type}/{short-description}
    Types: feat, fix, docs, test, chore

scenarios:
  scenarios_file: .scenarios.yml
  spec: zeroth/rules/scenarios.yml  # canonical structure — read before writing any scenario
  on_no_match: propose new scenario to user before proceeding

post_action_hook:
  after_every_state_change:
    - read: .registry.yml
    - if:
        condition: matching_sync_triggers_exist
        then:
          - call_handlers: matching
  conflict_check:
    if_open_pr_on_same_file: stop and notify user

handlers:
  reindex_trigger:
    listen:
      - log-written
    condition: clients/{client}/log/ has more than 30 files without a monthly index
    actions:
      - run: reindex scenario for that client
    dedup: once per client per session

global:
  chat_language: read from .aurora.yml    # language used when speaking with the user
  file_language: english                  # ALL files, commits, PR titles/bodies, issue bodies must be in English
  pr_strategy: batch_per_session
  merge_strategy: squash
  dedup_scope: current_session
  trigger_matching: pattern_first
  log_immutability: append-only, commit before responding
  inbox_immutability: write-once, never edit after creation
  rules: https://github.com/Malstrom/zeroth/tree/main/rules
  framework: https://github.com/Malstrom/zeroth/tree/main/frameworks/aurora
