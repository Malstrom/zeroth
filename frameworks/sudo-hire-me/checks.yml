# frameworks/sudo-hire-me/checks.yml
# Declarative check list for giskard --mode zeroth.
# giskard reads this file from zeroth at runtime and executes
# every check using the proxy named in 'proxy'.
# No logic lives in giskard for this framework.

sections:

  - name: "sudo-hire-me@zeroth — structure"
    checks:

      - label: "frameworks/sudo-hire-me/structure.yml present"
        proxy: file_exists
        target: frameworks/sudo-hire-me/structure.yml
        file: frameworks/sudo-hire-me/structure.yml
        rule: sudo-hire-me/structure.yml

      - label: "frameworks/sudo-hire-me/.agent.yml present"
        proxy: file_exists
        target: frameworks/sudo-hire-me/.agent.yml
        file: frameworks/sudo-hire-me/.agent.yml
        rule: sudo-hire-me/structure.yml

      - label: "frameworks/sudo-hire-me/.scenarios.yml present"
        proxy: file_exists
        target: frameworks/sudo-hire-me/.scenarios.yml
        file: frameworks/sudo-hire-me/.scenarios.yml
        rule: sudo-hire-me/structure.yml

      - label: "frameworks/sudo-hire-me/.registry.yml present"
        proxy: file_exists
        target: frameworks/sudo-hire-me/.registry.yml
        file: frameworks/sudo-hire-me/.registry.yml
        rule: sudo-hire-me/structure.yml

      - label: "frameworks/sudo-hire-me/README.md present"
        proxy: file_exists
        target: frameworks/sudo-hire-me/README.md
        file: frameworks/sudo-hire-me/README.md
        rule: sudo-hire-me/structure.yml

      - label: "frameworks/sudo-hire-me/scenarios/ present"
        proxy: file_exists
        target: frameworks/sudo-hire-me/scenarios
        file: frameworks/sudo-hire-me/scenarios/
        rule: sudo-hire-me/structure.yml

  - name: "sudo-hire-me@zeroth — scenarios"
    checks:

      - label: "frameworks/sudo-hire-me/.scenarios.yml index format valid"
        proxy: scenarios_index_valid
        file: frameworks/sudo-hire-me/.scenarios.yml
        rule: rules/scenarios.yml

      - label: "frameworks/sudo-hire-me/.scenarios.yml scenario files exist"
        proxy: scenarios_index_files_exist
        file: frameworks/sudo-hire-me/.scenarios.yml
        rule: rules/scenarios.yml
