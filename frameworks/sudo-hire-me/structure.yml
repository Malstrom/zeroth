framework: sudo-hire-me

root_files:
  - .agent.yml
  - .scenarios.yml
  - .registry.yml
  - README.md
  - igor.yml

directories:
  hunt/:
    role: active job search
    subdirs:
      pipeline/:
        role: one YAML file per company - current state
        files: "{company_slug}.yml"
        subdirs:
          log/{company_slug}/:
            role: immutable event logs - one YAML per event
            files: "YYYY-MM-DD_{event_slug}.yml"
            access: write-once

  assets/:
    role: profile photos and attachments
    access: read-only

note: templates live in Malstrom/zeroth:frameworks/sudo-hire-me/templates/ - read cross-repo, never copied to instance
