framework: sudo-hire-me
version: 0.1.0

description: |
  Job hunt operating system. Tracks offers, interviews, and outcomes
  for a single candidate across multiple companies and markets.

target_user: |
  Individual engineer managing an active job search.
  One instance per person.

key_concepts:
  - pipeline: one YAML file per company, tracks state and links to logs
  - log: immutable event record per interaction with a company (YAML)
  - issue: one GitHub issue per company, tracks process with checkboxes (MD - GitHub requirement)

outputs:
  - hunt/pipeline/{company}.yml
  - hunt/pipeline/log/{company}/YYYY-MM-DD_{event}.yml

artifact_format:
  status: not_yet_defined
  note: cross-repo artifact for dojo declare_goal - TBD when zeroth #193 is reopened
