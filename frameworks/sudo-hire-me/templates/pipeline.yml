# frameworks/sudo-hire-me/templates/pipeline.yml

company: Example Corp
company_slug: example-corp

role:
  title: Senior Backend Engineer
  location: Remote
  source: unknown   # linkedin / referral / agency / direct / other

status:
  stage: prospect          # prospect | applied | screening_scheduled | screening_done | tech_round_scheduled | tech_round_done | offer_received | rejected
  last_event: null         # last significant event (round id or offer/reject)
  last_updated: null       # ISO date, maintained by AI

main_issue: null           # GitHub issue number for main tracking issue in sudo-hire-me

rounds:
  # key = round_id used by scenarios (e.g. screening_hr, tech_interview, system_design)
  screening_hr:
    label: "HR screening"
    status: planned        # planned | scheduled | completed | skipped
    date: null             # YYYY-MM-DD
    interviewer: []        # list of names/roles
    sub_issue: null        # GitHub issue number for this round

open_gaps: []              # list of gaps; AI maintains this via round_completed_debrief
# - topic: golang_concurrency
#   description: "Missing context cancellation & fan-in/fan-out patterns"
#   prep_priority: high    # high | medium | low
