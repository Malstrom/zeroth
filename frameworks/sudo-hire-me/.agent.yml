# frameworks/sudo-hire-me/.agent.yml
# AI manifest for sudo-hire-me framework instances.
# Spec: zeroth/rules/scenarios.yml
# Status: STUB — fill following zeroth standard (see frameworks/dojo/.agent.yml)

# ---------------------------------------------------------------------------
# LANGUAGE
# ---------------------------------------------------------------------------
language:
  chat: italian                   # TODO: confirm default language for instances
  files: english
  filenames: english

# ---------------------------------------------------------------------------
# WORK RULES
# ---------------------------------------------------------------------------
work_rules:
  branch_per_issue: true
  branch_naming: "{type}/{short-description}"
  all_writes_via_pr: true
  merge_strategy: squash

# ---------------------------------------------------------------------------
# TOOL APPROVAL
# ---------------------------------------------------------------------------
tool_approval:
  create_branch: false
  push_files: false
  create_pr: false
  create_issue: false
  update_issue: false
  merge_to_main: true           # always ask
  delete_file: true             # always ask
  destructive_ops: true         # always ask

# ---------------------------------------------------------------------------
# SCENARIOS
# ---------------------------------------------------------------------------
scenarios:
  file: .scenarios.yml
  spec: zeroth/rules/scenarios.yml
  read_before_responding: true
  on_no_match: propose new scenario to user before proceeding

