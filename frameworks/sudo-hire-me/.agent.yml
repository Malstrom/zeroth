# frameworks/sudo-hire-me/.agent.yml
# AI-only operational manifest for the sudo-hire-me framework.

# ---------------------------------------------------------------------------
# LANGUAGE
# ---------------------------------------------------------------------------
language:
  chat: italian
  files: english
  filenames: english

# ---------------------------------------------------------------------------
# WORK RULES
# ---------------------------------------------------------------------------
work_rules:
  branch_per_issue: true
  branch_naming: "{type}/{short-description}"
  all_writes_via_pr: true
  merge_strategy: squash

# ---------------------------------------------------------------------------
# TOOL APPROVAL
# false = execute immediately
# true  = always ask before executing
# ---------------------------------------------------------------------------
tool_approval:
  create_branch: false
  push_files: false
  create_pr: false
  create_issue: false
  update_issue: false
  merge_to_main: false
  delete_file: true
  destructive_ops: true

# ---------------------------------------------------------------------------
# STATE MODEL
# Single source of truth for each piece of information:
#   candidate profile  -> igor.yml (skills, stack, targets, gaps)
#   company state      -> hunt/pipeline/{company_slug}.yml (status, steps, analysis)
#   event history      -> hunt/pipeline/log/{company_slug}/ (immutable, one .yml per event)
#   tracking issue     -> GitHub issue in sudo-hire-me (one per company, checkboxes)
#
# hunt/pipeline/{company}.yml MUST NOT contain: prep notes, gap analysis, dojo topics
# ---------------------------------------------------------------------------

# ---------------------------------------------------------------------------
# SCENARIOS
# Read .scenarios.yml BEFORE any reasoning.
# Every user message must be matched against scenarios first.
# ---------------------------------------------------------------------------
scenarios:
  spec: Malstrom/zeroth:frameworks/sudo-hire-me/.scenarios.yml
  read_before_responding: true
  on_no_match: propose new scenario to user before proceeding

# ---------------------------------------------------------------------------
# WORKSPACE
# ---------------------------------------------------------------------------
workspace:
  igor.yml:
    role: candidate profile - skills, stack, targets, gaps
    access: read-only

  .scenarios.yml:
    role: scenario catalog
    access: read-only

  .registry.yml:
    role: cross-repo connections
    access: read-only

  patterns:
    - path: "hunt/pipeline/*.yml"
      role: company pipeline state - one file per company
      access: read-write
    - path: "hunt/pipeline/log/**"
      role: immutable event logs - one .yml per event per company
      access: write-once
