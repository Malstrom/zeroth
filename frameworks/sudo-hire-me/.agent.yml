# frameworks/sudo-hire-me/.agent.yml
# AI-only operational manifest for the sudo-hire-me framework.
# Tool approval policy: defined in Space instructions — not here.

# ---------------------------------------------------------------------------
# LANGUAGE
# ---------------------------------------------------------------------------
language:
  chat: italian
  files: english
  filenames: english

# ---------------------------------------------------------------------------
# HARD RULES
# Inherited from zeroth rules/agent.yml — never override.
# ---------------------------------------------------------------------------
hard_rules:
  ref: Malstrom/zeroth:rules/agent.yml#hard_rules
  stories_delta:
    enforced: true   # show diff table, wait approval, never skip — see ref for full spec
  scenario_file_header:
    enforced: true   # every scenarios/*.md must start with <!-- source: {raw_url} -->

# ---------------------------------------------------------------------------
# STATE MODEL
# ---------------------------------------------------------------------------
# Single source of truth for each piece of information:
#   candidate profile  -> igor.yml (skills, stack, targets)
#   company state      -> hunt/pipeline/{company_slug}.yml
#                         fields: status, rounds, open_gaps, analysis, offer
#   interview history  -> GitHub issues in sudo-hire-me:
#                           main issue (one per company) — body regenerated from pipeline.yml
#                           sub-issues (one per round) — comments = prep sessions + debrief
#
# hunt/pipeline/{company}.yml MUST NOT contain: prep notes, story text, verbatim Q&A
# GitHub issues MUST NOT be the source of truth for structured data — pipeline.yml is

# ---------------------------------------------------------------------------
# SCENARIOS
# Read .scenarios.yml index BEFORE any reasoning.
# Fetch only the relevant scenario file — never load all at once.
# ---------------------------------------------------------------------------
scenarios:
  spec: Malstrom/zeroth:frameworks/sudo-hire-me/.scenarios.yml
  format: index   # .scenarios.yml is a lightweight index — each scenario has its own .md file
  read_before_responding: true
  on_no_match: propose new scenario to user before proceeding

# ---------------------------------------------------------------------------
# WORKSPACE
# Files are split by repo. "zeroth" = Malstrom/zeroth. "instance" = the
# instance repo declared in Space instructions (e.g. Malstrom/sudo-hire-me).
# ---------------------------------------------------------------------------
workspace:
  zeroth:
    # files that live in Malstrom/zeroth
    - path: frameworks/sudo-hire-me/.scenarios.yml
      role: scenario index — list of scenarios with trigger + file path
      access: read-only
    - path: "frameworks/sudo-hire-me/scenarios/*.md"
      role: scenario files — one per scenario, fetched on demand
      access: read-only
    - path: frameworks/sudo-hire-me/templates/
      role: issue and comment templates
      access: read-only

  instance:
    # files that live in the instance repo declared in Space instructions
    - path: igor.yml
      role: candidate profile — skills, stack, targets
      access: read-only
    - path: .registry.yml
      role: cross-repo connections
      access: read-only
    - path: stories.yml
      role: candidate stories — source of truth for personal narratives
      access: read-write   # only after explicit user approval (hard_rules.stories_delta)
    - path: "hunt/pipeline/*.yml"
      role: company pipeline state — one file per company
      access: read-write
