# frameworks/sudo-hire-me/.scenarios.yml
# Scenario catalog for sudo-hire-me framework instances.
# Syntax: zeroth/rules/scenarios.yml

required_scenarios:

  session_start:
    on:
      - session opens automatically
    creates_issue: false
    read:
      - "hunt/pipeline/*.yml"
    steps:
      - if:
          condition: active_applications | count > 0
          then:
            - say: |
                Pipeline attiva ({{active_applications | count}}):
                {{active_applications | each: "- {{company}} — {{role}} — {{status}}"}}
            - propose: "Aggiorno qualche candidatura?"
              on_confirm:
                - ask: "Quale azienda?"
                - call: round_completed
              on_reject:
                - say: "Ok. Nuova offerta o altro?"
          else:
            - say: "Nessuna candidatura attiva."
            - propose: "Hai ricevuto una nuova offerta?"
              on_confirm:
                - call: job_offer_received
              on_reject:
                - say: "Ok. Dimmi come posso aiutarti."
    output:
      state_changes: []

  job_offer_received:
    on:
      - user pastes or describes a job offer
      - user says they received a job offer
      - user shares recruiter communication
    creates_issue: true
    issue:
      title: "{company_name} — {role_name}"
      from: Malstrom/zeroth:frameworks/sudo-hire-me/templates/issue_pipeline.md
      update: check
      approval: none
      on_complete: close
      on_fail: comment
    read:
      - igor.yml
      - Malstrom/zeroth:frameworks/sudo-hire-me/templates/pipeline.yml
      - Malstrom/zeroth:frameworks/sudo-hire-me/templates/log_entry.yml
    steps:
      - compute: company_slug
      - compute: company_name
      - compute: role_slug
      - compute: role_name
      - compute: fit_pct
      - compute: recommendation
      - compute: red_flags
      - compute: strengths
      - compute: stack_required
      - compute: stack_nice_to_have
      - compute: contact
      - compute: company_info
      - compute: offer_conditions
      - compute: communication_language
      - compute: questions_stack    # IT+RU questions derived from stack_required gaps vs igor.yml
      - compute: questions_red_flags  # IT+RU questions derived from red_flags
      - say: |
          **Analisi offerta — {{company_name}}**

          Fit: {{fit_pct}}% — Raccomandazione: {{recommendation}}

          Punti di forza:
          {{strengths | each: "- {{item}}"}}

          Red flags:
          {{red_flags | each: "- {{item}}"}}

          Stack richiesto: {{stack_required | join: ", "}}
          Stack nice-to-have: {{stack_nice_to_have | join: ", "}}
      - write:
          path: "hunt/pipeline/"
          filename: "{{company_slug}}.yml"
          from: Malstrom/zeroth:frameworks/sudo-hire-me/templates/pipeline.yml
          vars:
            company_slug: "{{company_slug}}"
            role_slug: "{{role_slug}}"
            fit_pct: "{{fit_pct}}"
            recommendation: "{{recommendation}}"
            red_flags: "{{red_flags}}"
            strengths: "{{strengths}}"
            stack_required: "{{stack_required}}"
            stack_nice_to_have: "{{stack_nice_to_have}}"
            contact: "{{contact}}"
            company_info: "{{company_info}}"
            offer_conditions: "{{offer_conditions}}"
            communication_language: "{{communication_language}}"
          access: write-once
          via: PR
          approval: none
      - issue:
          check: "pipeline file created"
      - write:
          path: "hunt/pipeline/log/{{company_slug}}/"
          filename: "{{date}}_offer_received.yml"
          from: Malstrom/zeroth:frameworks/sudo-hire-me/templates/log_entry.yml
          vars:
            company_slug: "{{company_slug}}"
            event: offer_received
            participants: "Igor + {{contact.name}}"
            channel: "{{contact.channel}}"
            outcome: completed
            raw_communication: "{{raw_offer_text}}"
          access: write-once
          via: PR
          approval: none
      - issue:
          check: "log entry written"
      - commit_before_reply
      - say: "Candidatura {{company_name}} aperta. Issue: {{issue.url}}"
    output:
      state_changes: [pipeline-created]

  round_completed:
    on:
      - user reports outcome of an interview round or screening
      - user shares new information about an active application
      - user says a round passed or failed
    creates_issue: false
    read:
      - "hunt/pipeline/*.yml"
      - Malstrom/zeroth:frameworks/sudo-hire-me/templates/log_entry.yml
    steps:
      - if:
          condition: company_slug is missing
          then:
            - ask: "Per quale azienda?"
      - compute: company_slug
      - compute: event_slug
      - compute: outcome
      - compute: participants
      - compute: channel
      - write:
          path: "hunt/pipeline/log/{{company_slug}}/"
          filename: "{{date}}_{{event_slug}}.yml"
          from: Malstrom/zeroth:frameworks/sudo-hire-me/templates/log_entry.yml
          vars:
            company_slug: "{{company_slug}}"
            event: "{{event_slug}}"
            participants: "{{participants}}"
            channel: "{{channel}}"
            outcome: "{{outcome}}"
            raw_communication: "{{raw_communication}}"
          access: write-once
          via: PR
          approval: none
      - write:
          path: "hunt/pipeline/{{company_slug}}.yml"
          fields: [status, last_updated, steps]
          access: read-write
          via: PR
          approval: none
      - issue:
          check: "round logged"
      - commit_before_reply
      - if:
          condition: outcome == passed
          then:
            - say: "{{company_slug}} — {{event_slug}} passato. Pipeline aggiornata."
          else:
            - if:
                condition: outcome == failed
                then:
                  - say: "{{company_slug}} — {{event_slug}} non passato. Pipeline aggiornata."
                else:
                  - say: "{{company_slug}} — {{event_slug}} registrato. Outcome: {{outcome}}."
    output:
      state_changes: [pipeline-updated]

  screening_prep:
    on:
      - user wants to prepare for an HR screening
      - user has a screening scheduled and wants to simulate it
      - user asks to simulate a recruiter call
    creates_issue: false
    read:
      - "hunt/pipeline/*.yml"
      - igor.yml
    steps:
      - if:
          condition: company_slug is missing
          then:
            - ask: "Per quale azienda prepariamo lo screening?"
      - compute: company_slug
      - compute: recruiter_persona   # name + style from hunt/pipeline/{company}.yml
      - compute: round_name         # next pending step from pipeline steps[]
      - compute: screening_questions # 4-5 light technical questions calibrated on stack_required + igor.yml
      - compute: fit_questions       # 1-2 fit questions calibrated on role and company
      - say: |
          Simulazione screening — {{company_slug}} | recruiter: {{recruiter_persona.name}}
          Obiettivo: passare lo screening. Ti do feedback dopo ogni risposta.
          🔴 = critico da correggere  🟡 = migliorabile
      - ask: "Sei pronto?"
      - say: "Raccontami di te — background, esperienza, perché stai cercando ora."
      - ask: "[risposta]"
      - compute: feedback  # evaluate: clarity, story arc, strategic alignment with igor.yml; assign story_score/10
      - say: "{{feedback}}"
      - loop: screening_questions + fit_questions
        each:
          - say: "{{question}}"
          - ask: "[risposta]"
          - compute: feedback  # evaluate: correctness, clarity, strategic framing; flag if too honest; suggest reframe
          - say: "{{feedback}}"
      - compute: session_summary  # aggregate: story_score/10, technical_table, fit_feedback, improvements with 🔴/🟡
      - issue:
          comment: |
            ## 🎭 Screening prep — {{date}}

            **Round:** {{round_name}} (simulato) | **Recruiter:** {{recruiter_persona.name}} ({{recruiter_persona.role}})

            ---

            ### 📖 Storia personale — {{session_summary.story_score}}/10

            {{session_summary.story_feedback}}

            ---

            ### 🛠️ Domande tecniche

            | # | Domanda | Esito | Note |
            |---|---|---|---|
            {{session_summary.technical_table}}

            ---

            ### 🎯 Fit questions

            {{session_summary.fit_feedback}}

            ---

            ### 📋 Da migliorare prima dello screening reale

            {{session_summary.improvements}}

            ---

            _Prep session {{date}}_
      - say: "Fatto. Commento postato su {{company_slug}}. Priorità critiche: {{session_summary.blockers}}"
    output:
      state_changes: []

  unknown_scenario:
    on:
      - any message that does not match any other scenario
    creates_issue: false
    read: []
    steps:
      - if:
          condition: closest_scenario exists
          then:
            - propose: "Intendevi: {{closest_scenario}}?"
              on_confirm:
                - call: "{{closest_scenario}}"
              on_reject:
                - say: "Ok. Cosa vuoi fare?"
          else:
            - say: "Scenario non definito. Vuoi che lo aggiunga?"
    output:
      state_changes: []
