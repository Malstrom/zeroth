# source: https://raw.githubusercontent.com/Malstrom/zeroth/main/frameworks/sudo-hire-me/scenarios/update_stories.yml

id: update_stories
on:
  - user wants to update their personal stories or examples
  - user says they have a new story or example to add
  - user wants to review and update their narrative bank
  - called from another scenario after stories delta gate
creates_issue: false
hard_rule: stories_delta   # gate defined in .agent.yml hard_rules
read:
  - stories.yml
steps:
  - compute:
      id: stories_delta
      rule: |
        Derive from context inherited from calling scenario.
        Per topic touched in session, compare Igor's answers vs stories.yml.
        Include only if Igor added concepts or was more precise.
        Ignore if Igor said less than what is already in stories.yml.
        Always include topics not present in stories.yml.
        Language for new/updated stories: Italian only — never Russian or English.
  - if:
      condition: stories_delta is empty
      then:
        - say: inform the user there are no stories to update from this session
      else:
        - say: show stories delta table — columns: story ID, current summary (or empty), proposed summary
        - ask: ask the user which topics to approve (they can say specific IDs or "all")
        - loop: approved_topics
          each:
            - write:
                path: stories.yml
                from: Malstrom/zeroth:frameworks/sudo-hire-me/templates/story_entry.yml
                vars:
                  topic: "{{delta.topic}}"
                  content: "{{delta.proposed_story}}"
                access: read-write
                via: PR
                approval: none
output:
  state_changes: []
