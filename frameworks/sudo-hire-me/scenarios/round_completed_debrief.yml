# source: https://raw.githubusercontent.com/Malstrom/zeroth/main/frameworks/sudo-hire-me/scenarios/round_completed_debrief.yml

id: round_completed_debrief
on:
  - user says they just finished an interview or screening round with a company
  - user wants to debrief after a call or interview
  - user completed a round and wants to log the outcome and gaps
creates_issue: false
read:
  - hunt/pipeline/{{company_slug}}.yml
  - issues: sudo-hire-me issue {{main_issue}}
  - comments: sudo-hire-me issue {{sub_issue}}

# ---------------------------------------------------------------------------
# PREPROCESS
# Run before steps. Try to infer company_slug and round_name from user message
# so the steps block does not need to ask unless inference fails.
# ---------------------------------------------------------------------------
preprocess:
  - compute:
      id: company_slug
      rule: |
        Extract company name from user message:
        - look for noun after "con" / "da" / "per" / "with" / "at" / "by"
        - normalize against existing hunt/pipeline/*.yml slugs in Malstrom/sudo-hire-me
          (lowercase, strip spaces/dots, e.g. "Umbrellio" -> "umbrellio")
        - if no slug match found: leave missing (steps block will ask)
  - compute:
      id: round_name
      rule: |
        Map keywords from user message to internal label:
        - contains "screening"              -> "screening"
        - contains "tech" or "technical"    -> "technical"
        - contains "lead" or "tech lead"    -> "lead_round"
        - contains "cto"                    -> "cto_round"
        - contains "pair" or "pair prog"    -> "pair_round"
        - contains "hr"                     -> "hr_screening"
        - no match                          -> leave missing (steps block will ask)

steps:
  # --- always-on debug header ---
  - say:
      mode: debug
      always: true
      text: show active scenario name, inferred company_slug and round_name (or "unknown" if missing)

  # --- guard: ask only if preprocess failed ---
  - if:
      condition: company_slug is missing
      then:
        - ask: ask the user which company the round was with
  - if:
      condition: round_name is missing
      then:
        - ask: ask the user what type of round it was (HR screening, technical, tech lead, CTO, etc.)

  - compute:
      id: target_pipeline
      rule: fetch hunt/pipeline/{{company_slug}}.yml from Malstrom/sudo-hire-me
  - compute:
      id: main_issue
      rule: target_pipeline.main_issue
  - compute:
      id: sub_issue
      rule: |
        target_pipeline.rounds[round_name].sub_issue
        if missing: create sub-issue from issue_round.md template,
        write number back to pipeline.yml in same PR
  - compute:
      id: topic_list
      sources:
        - target_pipeline.analysis.stack_required
        - prep comments on sub_issue matching round_prep format
        - target_pipeline.open_gaps
  - loop: topic_list
    each:
      - ask: ask whether the interviewer covered this specific topic during the round
      - if:
          condition: answer is yes
          then:
            - ask: ask how the user answered on this topic
            - compute:
                id: assessment
                values: [solid, partial, weak]
            - if:
                condition: assessment in [partial, weak]
                then:
                  - compute: gap_entry
  - ask: ask if there were any topics the interviewer raised that were not in the list above
  - loop: extra_topics
    each:
      - ask: ask how the user answered on this extra topic
      - compute:
          id: assessment
          values: [solid, partial, weak]
      - if:
          condition: assessment in [partial, weak]
          then:
            - compute: gap_entry
  - compute:
      id: open_gaps_merged
      rule: |
        merge gap_entries with target_pipeline.open_gaps:
        - topic already exists: update description + priority
        - topic now solid: remove
        - new topic: append
        priority rules:
          high: weak assessment OR topic is core to next round stack
          medium: partial assessment, secondary topic
          low: partial assessment, nice-to-have
  - call:
      scenario: update_stories
      file: frameworks/sudo-hire-me/scenarios/update_stories.yml
      load: on_demand
  - write:
      path: hunt/pipeline/{{company_slug}}.yml
      fields:
        - status
        - last_updated
        - open_gaps: "{{open_gaps_merged}}"
        - rounds[round_name].outcome
        - rounds[round_name].sub_issue
      access: read-write
      via: PR
      approval: none
  - issue:
      update:
        number: "{{main_issue}}"
        body_from: Malstrom/zeroth:frameworks/sudo-hire-me/templates/issue_pipeline.md
        vars_from: target_pipeline
  - issue:
      comment:
        number: "{{sub_issue}}"
        from: Malstrom/zeroth:frameworks/sudo-hire-me/templates/comment_round_debrief.md
        vars:
          date: "{{date}}"
          round_name: "{{round_name}}"
          topics_table: "{{topics_assessed}}"
          open_gaps: "{{open_gaps_merged}}"
  - commit_before_reply
  - say: show PR URL and summarize open gaps with priority icons
  - if:
      condition: round outcome == passed
      then:
        - propose: ask whether to create the sub-issue for the next round
          on_confirm:
            - compute:
                id: next_round_name
                rule: derive next round from target_pipeline.rounds order
            - compute:
                id: next_sub_issue
                rule: create sub-issue from issue_round.md template using next_round_name
            - write:
                path: hunt/pipeline/{{company_slug}}.yml
                fields:
                  - rounds[next_round_name].sub_issue: "{{next_sub_issue}}"
                access: read-write
                via: PR
                approval: none
            - say: confirm next round sub-issue created — include issue URL
output:
  state_changes: [pipeline-updated]
