# source: https://raw.githubusercontent.com/Malstrom/zeroth/main/frameworks/sudo-hire-me/scenarios/round_prep.yml

id: round_prep
on:
  - user wants to prepare for an upcoming interview or screening round
  - user has a call or interview scheduled and wants to practice
  - user wants to simulate an interview with a specific company
  - user wants to prepare for a technical, HR, or leadership round
creates_issue: false
issue_updates:
  target: target_issue   # sub-issue number for this round
  mode: comment
read:
  - igor.yml
  - stories.yml
  - hunt/pipeline/*.yml
  - issues: sudo-hire-me open ordered_by updated_at desc
  - comments: sudo-hire-me issue {{target_issue}}

# ---------------------------------------------------------------------------
# ROUND TYPE STRATEGY
# Defines question distribution and focus per round type.
# round_type is computed from context before applying strategy.
# ---------------------------------------------------------------------------
strategy:
  hr_screening:
    personal_story: 1
    recruiter: 7
    technical: 4
    total: 12
    focus: cultural fit, motivation, work style, compensation expectations
  technical:
    personal_story: 1
    soft: 3
    technical: 8
    total: 12
    focus: stack depth, problem solving, system design, code quality
  lead_round:
    personal_story: 1
    soft: 4
    technical: 4
    architecture: 3
    total: 12
    focus: technical decisions, team collaboration, architecture trade-offs
  cto_round:
    personal_story: 2
    leadership: 4
    architecture: 3
    strategy: 3
    total: 12
    focus: vision alignment, leadership philosophy, company-scale decisions

steps:
  - compute:
      id: company_slug
      rule: extract company name from user message, normalize against hunt/pipeline/*.yml slugs
  - compute:
      id: target_pipeline
      rule: pick pipeline file for company_slug
  - compute:
      id: round_type
      rule: |
        Infer from user message and target_pipeline context:
        - message contains "hr" or "recruiter" or "people"   -> hr_screening
        - message contains "tech" or "technical" or "coding" -> technical
        - message contains "lead" or "tech lead"             -> lead_round
        - message contains "cto" or "vp" or "director"       -> cto_round
        - target_pipeline has a scheduled round with a known type -> use that type
        - otherwise: ask the user
  - if:
      condition: round_type is missing
      then:
        - ask: ask the user what type of round they are preparing for (HR screening, technical, tech lead, CTO)
  - compute:
      id: target_round
      rule: pick the round in target_pipeline with outcome pending or nearest scheduled date matching round_type
  - compute:
      id: target_issue
      rule: |
        target_pipeline.rounds[target_round].sub_issue
        if missing: create sub-issue from issue_round.md template,
        write number back to pipeline.yml
  - if:
      condition: target_issue is missing after compute
      then:
        - say: inform the user no scheduled round was found and ask them to check pipeline.yml
  - compute:
      id: active_strategy
      rule: pick strategy entry matching round_type
  - compute:
    - role
    - language
    - interviewer_persona
    - stack_required
  - compute:
      id: last_prep_questions
      rule: extract all questions from previous round_prep comments on target_issue
  - compute:
      id: questions
      distribution: "{{active_strategy}}"
      total: 12
      order: personal_story first, then remaining categories in strategy order
      rule: must not repeat questions from last_prep_questions
      constraint: total MUST be exactly 12 — never fewer
  - say: show prep session header — include company slug, round type, interviewer persona name, response language, question count (must be 12)
  - if:
      condition: questions | count < 12
      then:
        - say: warn that fewer than 12 questions were generated and regenerate immediately
        - compute:
            id: questions
            distribution: "{{active_strategy}}"
            total: 12
            constraint: total MUST be exactly 12 — never fewer
  - propose: ask whether to start the simulation
    on_confirm:
      - ask: ask if the user is ready to begin
      - loop: questions
        each:
          - say: show question number out of 12 and the question text
          - if:
              condition: stories.yml has topic matching question
              then:
                - say: show a hint with the matching story summary
          - ask: wait for the user's answer
          - compute: feedback
          - compute: corrected_version
          - say: show feedback and the corrected version of the answer
      - compute:
          id: session_summary
          fields: [story_score, story_feedback, technical_table, fit_feedback, attenzione_table, checklist]
      - commit_before_reply
      - issue:
          comment:
            from: Malstrom/zeroth:frameworks/sudo-hire-me/templates/comment_round_prep.md
            vars:
              date: "{{date}}"
              round_name: "{{target_round.name}}"
              round_type: "{{round_type}}"
              interviewer_name: "{{interviewer_persona.name}}"
              interviewer_role: "{{interviewer_persona.role}}"
              story_score: "{{session_summary.story_score}}"
              story_feedback: "{{session_summary.story_feedback}}"
              technical_table: "{{session_summary.technical_table}}"
              fit_feedback: "{{session_summary.fit_feedback}}"
              language: "{{language}}"
              final_answers: "{{corrected_versions}}"
              checklist: "{{session_summary.checklist}}"
      - if:
          condition: stories_delta is not empty
          then:
            - call:
                scenario: update_stories
                file: frameworks/sudo-hire-me/scenarios/update_stories.yml
                load: on_demand
    on_reject:
      - say: acknowledge the user is not ready yet and invite them to start when they are
output:
  state_changes: []
