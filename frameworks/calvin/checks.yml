checks:
  - id: agent_yml_exists
    path: frameworks/calvin/.agent.yml
    type: file_exists
    level: error

  - id: scenarios_yml_exists
    path: frameworks/calvin/.scenarios.yml
    type: file_exists
    level: error

  - id: all_scenario_files_exist
    path: frameworks/calvin/.scenarios.yml
    type: scenario_files_exist
    level: error

  - id: templates_exist
    paths:
      - frameworks/calvin/templates/project_context.yml
      - frameworks/calvin/templates/issue_model_ready.md
    type: files_exist
    level: error

  - id: overview_keys
    path: frameworks/calvin/overview.yml
    type: yaml_keys_present
    keys: [framework, purpose, actors, flow, labels, context_file]
    level: error
