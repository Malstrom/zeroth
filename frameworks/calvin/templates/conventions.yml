# .calvin/conventions.yml
# Qwen reads this at every execution. Keep dense — no prose.
# Append-only via update_context scenario after each merged PR.

naming:
  methods: snake_case
  classes: PascalCase
  constants: SCREAMING_SNAKE
  files: snake_case
  db_columns: snake_case
  booleans: prefix_is_or_has        # is_active, has_permissions
  scopes: descriptive_verb           # published, visible_to_user

structure:
  models: app/models/
  controllers: app/controllers/
  services: app/services/            # plain Ruby objects, no ActiveRecord
  jobs: app/jobs/
  mailers: app/mailers/
  concerns: avoid                    # only if shared across 3+ classes
  specs: spec/                       # or test/ — set at bootstrap

patterns:
  fat_models: false                  # business logic in service objects only
  callbacks: avoid                   # prefer explicit calls in service objects
  transactions: explicit             # wrap multi-step writes in ActiveRecord::Base.transaction
  service_result: {success:, data:, error:}  # standard return shape
  pagination: pagy
  background_jobs: sidekiq           # or null if not used — set at bootstrap
  serializers: null                  # set at bootstrap: active_model | jbuilder | blueprinter
  auth: null                         # set at bootstrap: devise | jwt | custom

testing:
  framework: rspec                   # or minitest — set at bootstrap
  factories: factory_bot
  coverage_min: 80
  always_test: [models, services, controllers]
  db_strategy: transaction           # rollback after each test, no truncation
  never_mock: ActiveRecord           # test with real DB, no AR mocks
  fixture_files: false               # use factories only

api:
  response_format: json
  error_shape: {error: string, code: string}   # consistent across all endpoints
  status_codes:
    success: 200
    created: 201
    not_found: 404
    unprocessable: 422
    unauthorized: 401

forbidden:
  - rescue Exception                 # only StandardError
  - puts                             # use Rails.logger
  - binding.pry                      # no debugger in commits
  - TODO                             # no placeholders in committed code
  - hardcoded_ids                    # no User.find(1) in code
  - ENV[]                            # use ENV.fetch — fail fast if missing
  - sleep                            # no sleep in non-test code

logging:
  level_info: major state changes
  level_debug: inputs and outputs of service objects
  never_log: passwords, tokens, PII
