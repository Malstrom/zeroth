# .calvin/stack.yml
# Qwen reads this at every execution. Fill at bootstrap via onboarding scenario.
# Append-only — update when deps change.

language: ruby
ruby_version: null           # set at bootstrap e.g. 3.3.0
framework: rails
rails_version: null          # set at bootstrap e.g. 8.0.0

db:
  primary: null              # postgresql | mysql | sqlite
  version: null
  migrations: rails          # rails standard migrations

cache: null                  # redis | memcached | null
jobs: null                   # sidekiq | good_job | null
search: null                 # elasticsearch | pg_search | null
storage: null                # active_storage | carrierwave | null

test:
  framework: null            # rspec | minitest
  factories: factory_bot
  coverage: simplecov

api:
  type: null                 # rest | graphql | both
  auth: null                 # devise | jwt | custom
  serializer: null           # active_model_serializers | jbuilder | blueprinter

client:
  web: null                  # hotwire | react | vue | null
  mobile_ios: null           # swiftui | null
  mobile_android: null       # kotlin | null

key_gems: []                 # append gems that Qwen must know exist
# example:
# key_gems:
#   - pagy                   # pagination
#   - pundit                 # authorization
#   - dry-validation         # input validation
