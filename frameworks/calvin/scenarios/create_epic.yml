id: create_epic
on:
  - user wants to create an epic
  - user says "crea epic", "crea issue madre", "apri epic"
  - triggered after reasoning in chat about a feature
preconditions: any

note: |
  This scenario is triggered explicitly by Igor after discussing the feature in chat.
  Perplexity has context from the conversation — do not re-ask what was already discussed.

reads:
  - instance:.calvin/stack.yml
  - instance:docs/ (files referenced in conversation)

states:
  draft_epic:
    action: output
    template: frameworks/calvin/templates/issue_epic.md
    instructions:
      - fill Goal and Why from the conversation context
      - check stack boxes that apply (backend / ios)
      - Docs: link exact paragraphs from docs/ mentioned in conversation
        format: "[docs/path/file.md#anchor](docs/path/file.md#anchor)"
        note: read the actual docs/ files to find the correct anchor
      - Scope: summarize what is in and what is explicitly out
      - leave Sub-issues empty — populated by decompose
    next: confirm_epic

  confirm_epic:
    action: confirm
    message: is the epic body correct? edit if needed
    on_confirm:
      next: ask_title
    on_changes:
      next: draft_epic

  ask_title:
    action: ask
    message: |
      title for the epic? (or confirm this one)
      suggestion: {{suggested_title_from_goal}}
    next: create_issue

  create_issue:
    action: github_create_issue
    target: instance
    title: "{{title}}"
    body: draft_epic
    labels: [epic, "{{stack_label}}"]
    next: done

  done:
    action: output
    message: |
      ✅ Epic #{{issue_number}} created.
      When ready: tell me to decompose it into sub-issues.
