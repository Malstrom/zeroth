id: review_pr
on:
  - user wants to review a PR
  - user references a PR number
preconditions: any

read:
  - instance:.context.yml
  - instance:github:pr:{{pr_number}}:diff
  - instance:github:pr:{{pr_number}}:comments

steps:
  - if:
      condition: pr_number missing
      then:
        - fetch: instance:github:prs:open:label:agent:review
        - say: lista PR aperte con agent:review. quale vuoi revieware?
        - stop

  - say: |
      Review PR #{{pr_number}}:

      1. **Goal check** — il PR risolve esattamente l'issue? né di più né di meno?
      2. **Conventions** — rispetta .context.yml conventions? elenca violazioni con file:riga
      3. **Tests** — i test richiesti in .context.yml testing sono presenti?
      4. **Scope** — file modificati fuori scope? lista con motivazione
      5. **Code quality** — problemi rilevanti di design o duplicazione

      Per ogni sezione: ✅ pass | ⚠️ warning | ❌ block
      Raccomandazione finale: APPROVE | APPROVE+commento | REQUEST_CHANGES

  - say: |
      Estrai sezione `## Calvin notes` dal body del PR.
      Mostra le note. Proponi diff a .context.yml basato sulle note.

  - confirm:
      ask: aggiorno .context.yml con queste note?
      on_confirm:
        - call: update_context
            params: {source: pr_calvin_notes, pr_number: "{{pr_number}}"}
