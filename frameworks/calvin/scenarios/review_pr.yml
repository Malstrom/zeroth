id: review_pr
on:
  - user wants to review a PR
  - user references a PR number
preconditions: any

reads:
  - instance:.calvin/conventions.yml
  - instance:.calvin/testing.yml
  - instance:github:pr:{{pr_number}}:diff
  - instance:github:pr:{{pr_number}}:body

states:
  resolve_pr:
    condition: pr_number present
    on_missing:
      action: fetch_and_ask
      fetch: instance:github:prs:open:label:agent:review
      message: which PR do you want to review?
      next: stop
    on_present:
      next: run_checklist

  run_checklist:
    action: output
    format: |
      ## Review PR #{{pr_number}}

      1. **Goal** — does the PR solve exactly the issue? neither more nor less?
      2. **Conventions** — respects .calvin/conventions.yml? list violations with file:line
      3. **Tests** — are the tests required by .calvin/testing.yml present?
      4. **Scope** — files modified out of scope? list with reason
      5. **Quality** — relevant design or duplication issues

      Per item: ✅ pass | ⚠️ warning | ❌ block
      Recommendation: APPROVE | APPROVE+comment | REQUEST_CHANGES
    next: extract_calvin_notes

  extract_calvin_notes:
    action: extract
    source: github:pr:{{pr_number}}:body
    section: "## Calvin notes"
    on_found:
      action: output
      message: |
        **Calvin notes found:**
        {{calvin_notes}}

        Reading current .calvin/ state before proposing diff...
        {{proposed_diff}}
      reads_before_diff:
        - instance:.calvin/conventions.yml
        - instance:.calvin/decisions.yml
        - instance:.calvin/testing.yml
      note: proposed_diff must be incremental — never overwrite existing entries
      next: confirm_update
    on_missing:
      next: stop

  confirm_update:
    action: confirm
    message: update .calvin/ with these notes?
    on_confirm:
      next: call_update_context
    on_reject:
      next: stop

  call_update_context:
    action: call_scenario
    scenario: update_context
    params:
      source: pr_calvin_notes
      pr_number: "{{pr_number}}"
