# frameworks/calvin/scenarios/session_start.yml

id: session_start
on:
  - this is the first message of the conversation
  - user opens a Calvin session
  - user wants a project status summary
preconditions:
  - any

read:
  - instance:.context.yml
  - instance:github:issues:open
  - instance:github:prs:open:label:agent:review

steps:
  - if:
      condition: .context.yml missing
      then:
        - say: |
            .context.yml non trovato nel repo {{target_repo}}.
            Per iniziare, copia il template:
            `cp zeroth:frameworks/calvin/templates/project_context.yml .context.yml`
            poi compilalo con stack, convenzioni e strategia di test del progetto.
        - stop

  - say: |
      Mostra un summary del progetto in questo formato:

      ## Calvin — {{project.name}}
      **Stack:** {{stack | one_line_summary}}

      ### PR in attesa di review
      {{prs_agent_review | format_pr_list}}   ← se vuote: "nessuna"

      ### Issue aperte
      {{open_issues | group_by_label | format_issue_list}}
      # mostra numero, titolo, label principali
      # evidenzia quelle con label `agent` (in coda async)
      # non più di 10 — se ci sono più di 10 suggerisci filtro

      ### Contesto progetto
      Ultime decisioni: {{decisions | last_3 | format_decisions}}

  - propose: |
      Chiedi a Igor su cosa vuole lavorare:
      - lavorare su una issue specifica
      - revieware una PR
      - aggiornare il contesto

output:
  state_changes: []
