id: session_start
on:
  - first message of the conversation
  - user wants project status
preconditions: any

reads:
  - instance:.calvin/stack.yml
  - instance:.calvin/conventions.yml
  - instance:.calvin/decisions.yml
  - instance:github:issues:open
  - instance:github:prs:open:label:agent:review

states:
  check_context:
    condition: .calvin/ exists
    on_missing:
      action: suggest_calvanize
      message: |
        `.calvin/` non trovato in {{target_repo}}.
        Esegui scenario `calvanize` per inizializzare Calvin su questo repo.
      next: stop
    on_present:
      next: render_summary

  render_summary:
    action: output
    format: |
      ## Calvin — {{stack.project_name}}
      Stack: {{stack.language}} / {{stack.framework}} {{stack.version}}

      ### PR da revieware
      {{prs | label:agent:review | format:"#N title" | fallback:"nessuna"}}

      ### Issue in coda
      {{issues | label:agent | format:"#N title" | fallback:"nessuna"}}

      ### Issue aperte
      {{issues | open | exclude_label:agent | format:"#N title [labels]" | max:10}}

      ### Ultime decisioni
      {{decisions | last:3 | format:"date: decision"}}
    next: propose_action

  propose_action:
    action: ask
    message: su cosa vuoi lavorare?
