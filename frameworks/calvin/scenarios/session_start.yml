id: session_start
on:
  - first message of the conversation
  - user wants project status
preconditions: any

read:
  - instance:.context.yml
  - instance:github:issues:open
  - instance:github:prs:open:label:agent:review

steps:
  - if:
      condition: .context.yml missing
      then:
        - say: |
            .context.yml non trovato in {{target_repo}}.
            Crea il file: `cp zeroth:frameworks/calvin/templates/project_context.yml .context.yml`
            poi compilalo e committa.
        - stop

  - say: |
      ## Calvin — {{project.name}}
      Stack: {{stack | one_line}}

      ### PR da revieware
      {{prs | label:agent:review | format: "#N title" | or: "nessuna"}}

      ### Issue aperte
      {{issues | open | group_by_label | format: "#N title [labels]" | max:10}}

      ### Ultime decisioni
      {{decisions | last:3 | format: "date: decision"}}

  - propose: su cosa vuoi lavorare? (issue, PR, aggiorna contesto)
