id: decompose
on:
  - user wants to decompose an epic into sub-issues
  - user says "decomponila", "crea sub issue", "decompose"
  - user references an epic issue number
preconditions: epic issue exists

reads:
  - instance:github:issue:{{epic_number}}
  - instance:docs/ (files linked in epic Docs section)
  - instance:.calvin/stack.yml

states:
  resolve_epic:
    condition: epic_number present
    on_missing:
      action: ask
      message: which epic do you want to decompose?
      next: stop
    on_present:
      next: read_docs

  read_docs:
    action: read_files
    source: epic.docs_links
    note: read each linked paragraph to understand full scope before proposing tasks
    next: propose_tasks

  propose_tasks:
    action: output
    format: |
      Proposed sub-issues for epic #{{epic_number}}:

      {{#each tasks}}
      **Task {{index}}** {{#if depends_on}}(depends on Task {{depends_on}}){{/if}}
      Title: {{title}}
      Goal: {{goal}}
      Stack: {{stack}}
      Acceptance criteria:
      {{#each criteria}}- {{this}}{{/each}}
      {{/each}}

      Order: {{execution_order}}
    instructions:
      - each task must be atomic — executable in one PR by one model run
      - add depends_on only if a task genuinely cannot start before another is merged
      - do not over-decompose — prefer fewer larger tasks over many tiny ones
      - infer stack (backend/ios) per task, not just from the epic
    next: confirm_tasks

  confirm_tasks:
    action: confirm
    message: are these sub-issues correct? add, remove or edit before creating
    on_confirm:
      next: create_tasks
    on_changes:
      next: propose_tasks

  create_tasks:
    action: github_create_issues
    target: instance
    for_each: tasks
    template: frameworks/calvin/templates/issue_task.md
    fields:
      title: task.title
      body:
        Goal: task.goal
        Parent: "#{{epic_number}}"
        Stack: task.stack
        Acceptance criteria: task.criteria
        Dependencies: task.depends_on
      labels: [task, "{{task.stack_label}}"]
    sub_issue_of: "{{epic_number}}"
    next: update_epic

  update_epic:
    action: github_update_issue
    target: instance:github:issue:{{epic_number}}
    section: "## Sub-issues"
    content: |
      {{#each created_tasks}}
      - #{{number}} {{title}} {{#if depends_on}}(after #{{depends_on_number}}){{/if}}
      {{/each}}
    next: done

  done:
    action: output
    message: |
      ✅ {{tasks.count}} sub-issues created under epic #{{epic_number}}.
      Next: pick a task and tell me to prepare it for async execution.
