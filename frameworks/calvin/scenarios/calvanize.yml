id: calvanize
on:
  - user wants to bootstrap Calvin on a new repo
  - user says calvanize or inizializza calvin
  - .calvin/ does not exist on target repo
preconditions: any

reads:
  - instance:github:repo:default_branch
  - instance:codebase:sample_files

states:
  check_existing:
    condition: .calvin/ exists on target repo
    on_true:
      action: warn
      message: .calvin/ already present in {{target_repo}}. Continuing will overwrite existing files.
      next: confirm_overwrite
    on_false:
      next: read_codebase

  confirm_overwrite:
    action: confirm
    message: overwrite existing .calvin/?
    on_confirm:
      next: read_codebase
    on_reject:
      next: stop

  read_codebase:
    action: sample_codebase
    paths: [Gemfile, package.json, app/, src/, lib/, test/, spec/]
    note: read enough to infer stack, conventions, and test strategy
    next: draft_context

  draft_context:
    action: output
    format: |
      Proposed .calvin/ for {{target_repo}}:

      **agent.yml**
      {{proposed_agent}}

      **stack.yml**
      {{proposed_stack}}

      **conventions.yml**
      {{proposed_conventions}}

      **testing.yml**
      {{proposed_testing}}

      **schema.yml**
      {{proposed_schema}}

      **decisions.yml**
      (empty — first decisions added during development)
    note: infer from codebase — do not use generic placeholders
    next: confirm_context

  confirm_context:
    action: confirm
    message: are these files correct? edit before proceeding
    on_confirm:
      next: write_files
    on_changes:
      next: draft_context

  write_files:
    action: github_push_files
    branch: calvin/bootstrap
    files:
      - path: .calvin/agent.yml
        content: proposed_agent
      - path: .calvin/stack.yml
        content: proposed_stack
      - path: .calvin/conventions.yml
        content: proposed_conventions
      - path: .calvin/testing.yml
        content: proposed_testing
      - path: .calvin/schema.yml
        content: proposed_schema
      - path: .calvin/decisions.yml
        content: "decisions: []\n"
      - path: .calvin/calvin.rb
        source: frameworks/calvin/scripts/calvin.rb
      - path: .calvin/lib/issue_executor.rb
        source: frameworks/calvin/scripts/lib/issue_executor.rb
      - path: .calvin/lib/github_client.rb
        source: frameworks/calvin/scripts/lib/github_client.rb
      - path: .calvin/lib/context_builder.rb
        source: frameworks/calvin/scripts/lib/context_builder.rb
      - path: .calvin/lib/prompt_builder.rb
        source: frameworks/calvin/scripts/lib/prompt_builder.rb
      - path: .calvin/lib/aider_runner.rb
        source: frameworks/calvin/scripts/lib/aider_runner.rb
      - path: .calvin/lib/git_committer.rb
        source: frameworks/calvin/scripts/lib/git_committer.rb
      - path: .calvin/lib/pull_request_opener.rb
        source: frameworks/calvin/scripts/lib/pull_request_opener.rb
      - path: .calvin/lib/finalizer.rb
        source: frameworks/calvin/scripts/lib/finalizer.rb
    commit_message: "calvin: bootstrap .calvin/ via calvanize"
    next: open_pr

  open_pr:
    action: github_create_pr
    title: "calvin: bootstrap .calvin/"
    body: |
      Bootstrap Calvin on {{target_repo}}.

      Files created:
      - `.calvin/agent.yml`
      - `.calvin/stack.yml`
      - `.calvin/conventions.yml`
      - `.calvin/testing.yml`
      - `.calvin/schema.yml`
      - `.calvin/decisions.yml`
      - `.calvin/calvin.rb`
      - `.calvin/lib/` (8 classes)

      Generated by scenario `calvanize`.
    next: done

  done:
    action: output
    message: |
      ✅ PR opened: calvin/bootstrap on {{target_repo}}.
      Merge to activate Calvin.
