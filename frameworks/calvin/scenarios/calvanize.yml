id: calvanize
on:
  - user wants to bootstrap Calvin on a new repo
  - user says calvanize or inizializza calvin
  - .calvin/ does not exist on target repo
preconditions: any

reads:
  - frameworks/calvin/templates/calvin_context/stack.yml
  - frameworks/calvin/templates/calvin_context/conventions.yml
  - frameworks/calvin/templates/calvin_context/testing.yml
  - frameworks/calvin/templates/calvin_context/decisions.yml
  - instance:github:repo:default_branch
  - instance:codebase:sample_files

states:
  check_existing:
    condition: .calvin/ exists on target repo
    on_true:
      action: warn
      message: .calvin/ già presente in {{target_repo}}. Continuare sovrascrive i file esistenti.
      next: confirm_overwrite
    on_false:
      next: read_codebase

  confirm_overwrite:
    action: confirm
    message: sovrascrivere .calvin/ esistente?
    on_confirm:
      next: read_codebase
    on_reject:
      next: stop

  read_codebase:
    action: sample_codebase
    paths: [Gemfile, package.json, app/, src/, lib/, test/, spec/]
    note: read enough to infer stack, conventions, and test strategy
    next: draft_context

  draft_context:
    action: output
    format: |
      Proposta .calvin/ per {{target_repo}}:

      **stack.yml**
      {{proposed_stack}}

      **conventions.yml**
      {{proposed_conventions}}

      **testing.yml**
      {{proposed_testing}}

      **decisions.yml**
      (vuoto — prime decisioni saranno aggiunte durante lo sviluppo)
    note: infer from codebase — do not use generic placeholders
    next: confirm_context

  confirm_context:
    action: confirm
    message: questi file sono corretti? modifica prima di procedere
    on_confirm:
      next: write_files
    on_changes:
      next: draft_context

  write_files:
    action: github_push_files
    branch: calvin/bootstrap
    files:
      - path: .calvin/stack.yml
        content: proposed_stack
      - path: .calvin/conventions.yml
        content: proposed_conventions
      - path: .calvin/testing.yml
        content: proposed_testing
      - path: .calvin/decisions.yml
        content: "decisions: []\n"
      - path: .calvin/poll.rb
        source: frameworks/calvin/scripts/poll.rb
    commit_message: "calvin: bootstrap .calvin/ via calvanize"
    next: open_pr

  open_pr:
    action: github_create_pr
    title: "calvin: bootstrap .calvin/"
    body: |
      Bootstrap Calvin su {{target_repo}}.

      File creati:
      - `.calvin/stack.yml`
      - `.calvin/conventions.yml`
      - `.calvin/testing.yml`
      - `.calvin/decisions.yml`
      - `.calvin/poll.rb`

      Generato da scenario `calvanize`.
    next: done

  done:
    action: output
    message: |
      ✅ PR aperta: calvin/bootstrap
      Mergea per attivare Calvin su {{target_repo}}.
