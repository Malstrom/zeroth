id: onboarding
on:
  - user wants to set up Calvin on a new repo
  - user wants to onboard a project to Calvin
  - Calvin is not yet configured on the target repo
preconditions:
  - any
creates_issue: false

reads:
  - instance:.calvin/          # exists? → already onboarded

writes:
  - instance:.calvin/conventions.yml
  - instance:.calvin/stack.yml
  - instance:.calvin/decisions.yml
  - instance:.calvin/calvin.rb
  - instance:.calvin/lib/github_client.rb
  - instance:.calvin/lib/context_builder.rb
  - instance:.calvin/lib/aider_runner.rb
  - instance:.calvin/lib/issue_executor.rb

states:

  check_existing:
    action: check_if_.calvin/_exists_in_instance_repo
    on_exists: already_onboarded
    on_missing: collect_repo

  already_onboarded:
    action: inform_already_configured
    next: done

  collect_repo:
    action: ask_target_repo          # e.g. Malstrom/synca
    next: read_stack

  read_stack:
    action: read_instance_repo
    reads:
      - Gemfile
      - Gemfile.lock
      - config/database.yml
      - config/application.rb
      - .ruby-version
    next: fill_stack

  fill_stack:
    action: fill_stack_yml_from_reads
    fills:
      ruby_version: from .ruby-version or Gemfile
      rails_version: from Gemfile.lock
      db.primary: from config/database.yml adapter
      jobs: sidekiq if gem present else null
      test.framework: rspec if gem present else minitest
      auth: devise | jwt | custom if gem present else null
      serializer: blueprinter | active_model_serializers | jbuilder if present else null
      key_gems: gems in Gemfile not already covered above
    next: write_context_files

  write_context_files:
    action: push_files_to_instance_repo
    files:
      - path: .calvin/conventions.yml
        from: Malstrom/zeroth:frameworks/calvin/templates/conventions.yml
      - path: .calvin/stack.yml
        content: filled_stack_yml
      - path: .calvin/decisions.yml
        from: Malstrom/zeroth:frameworks/calvin/templates/decisions.yml
    commit: "chore: add Calvin context files"
    branch: main
    next: write_calvin_files

  write_calvin_files:
    action: push_files_to_instance_repo
    files:
      - path: .calvin/calvin.rb
        from: Malstrom/zeroth:frameworks/calvin/templates/calvin.rb
      - path: .calvin/lib/github_client.rb
        from: Malstrom/zeroth:frameworks/calvin/templates/lib/github_client.rb
      - path: .calvin/lib/context_builder.rb
        from: Malstrom/zeroth:frameworks/calvin/templates/lib/context_builder.rb
      - path: .calvin/lib/aider_runner.rb
        from: Malstrom/zeroth:frameworks/calvin/templates/lib/aider_runner.rb
      - path: .calvin/lib/issue_executor.rb
        from: Malstrom/zeroth:frameworks/calvin/templates/lib/issue_executor.rb
    commit: "chore: add Calvin engine files"
    branch: main
    next: create_labels

  create_labels:
    action: ensure_labels_on_instance_repo
    labels:
      - name: agent         color: "0075ca"
      - name: agent:review  color: "e4e669"
      - name: agent:blocked color: "d73a4a"
    next: show_bootstrap

  show_bootstrap:
    action: show_wsl_bootstrap_instructions
    content:
      env_vars:
        - GITHUB_TOKEN
        - CALVIN_REPO        # filled with collected repo
        - CALVIN_REPO_PATH   # ask user for local WSL path
        - CEREBRAS_API_KEY   # and whichever others user has
      install:
        - "gem install bundler octokit"
        - "pip install aider-chat"
      start: "cd $CALVIN_REPO_PATH && ruby .calvin/calvin.rb"
    next: done

  done:
    action: confirm_onboarding_complete
    summary:
      - .calvin/ pushed to instance repo
      - labels created
      - env vars and start command shown

output:
  state_changes: [calvin-onboarded]
