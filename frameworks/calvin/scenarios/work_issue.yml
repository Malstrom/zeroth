id: work_issue
on:
  - user wants to work on an issue
  - user references issue number or title
preconditions: any

read:
  - instance:.context.yml
  - instance:github:issue:{{issue_number}}

steps:
  - if:
      condition: issue_number missing
      then:
        - say: qual è il numero o titolo dell'issue?
        - stop

  - say: |
      Leggi issue + .context.yml. Produci definizione strutturata:

      ## #{{issue_number}} — {{issue.title}}
      **Goal:** [una riga]
      **Entry points:** [file/classi/route]
      **Constraints:** [convenzioni, file da non toccare, dipendenze]
      **Tests:** [cosa testare, edge cases]
      **Depends on:** [#N | none]

      Se manca info per un campo, chiedi prima. Non assumere.

  - confirm: definizione corretta? modifica se necessario

  - say: |
      Produci commento model-ready usando:
      zeroth:frameworks/calvin/templates/issue_model_ready.md

      Il commento deve essere autosufficiente:
      il modello legge solo commento + .context.yml, nient'altro.

  - action: post_comment
      target: instance:github:issue:{{issue_number}}
      template: frameworks/calvin/templates/issue_model_ready.md
      confirm_before_posting: true

  - say: |
      Come procediamo?
      A) Eseguo ora — implemento in questa sessione, apro PR
      B) Async — aggiungo label `agent`, eseguirà poll.rb

  - if:
      condition: igor_chooses == A
      then:
        - execute:
            reads: [instance:.context.yml, instance:github:issue:{{issue_number}}]
            opens_pr: true
            pr_label: agent:review
            pr_body_includes: "## Calvin notes"
            confirm_pr_before_push: true

  - if:
      condition: igor_chooses == B
      then:
        - action: add_label
            target: instance:github:issue:{{issue_number}}
            label: agent
            confirm_before_action: true
