id: update_context
on:
  - user wants to record a decision
  - user confirms Calvin notes after review
preconditions: any

read:
  - instance:.context.yml

steps:
  - if:
      condition: source == pr_calvin_notes
      then:
        - say: |
            Modifiche proposte a .context.yml da Calvin notes PR #{{pr_number}}:
            ```diff
            {{proposed_diff}}
            ```
            Regole: decisions[] append-only. conventions/testing solo se regola nuova esplicita.
            stack solo se dipendenza reale aggiunta/rimossa.

  - if:
      condition: source == explicit
      then:
        - say: cosa vuoi registrare?
        - say: proponi diff a .context.yml

  - confirm:
      ask: confermo le modifiche?
      on_confirm:
        - action: update_file
            target: instance:.context.yml
            apply: proposed_diff
            commit_message: "chore: update .context.yml — #{{source_ref}}"
      on_reject:
        - say: cosa cambiare nel diff?
        - repeat: from proposed diff
