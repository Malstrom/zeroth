id: update_context
on:
  - user wants to record a decision
  - user confirms Calvin notes after review
  - called from review_pr
preconditions: any

reads:
  - instance:.calvin/conventions.yml
  - instance:.calvin/testing.yml
  - instance:.calvin/decisions.yml

states:
  resolve_source:
    condition: source == pr_calvin_notes
    on_true:
      next: propose_diff_from_pr
    on_false:
      next: ask_explicit

  propose_diff_from_pr:
    action: output
    format: |
      Modifiche proposte da Calvin notes PR #{{pr_number}}:
      ```diff
      {{proposed_diff}}
      ```
      Regole:
      - decisions.yml: append-only, mai modificare entries esistenti
      - conventions.yml / testing.yml: solo se regola nuova esplicita
      - stack.yml: solo se dipendenza reale aggiunta o rimossa
    next: confirm_write

  ask_explicit:
    action: ask
    message: cosa vuoi registrare?
    next: propose_diff_explicit

  propose_diff_explicit:
    action: output
    message: proposta diff a .calvin/
    next: confirm_write

  confirm_write:
    action: confirm
    message: confermo le modifiche?
    on_confirm:
      next: write_files
    on_reject:
      action: ask
      message: cosa cambiare?
      next: propose_diff_from_pr

  write_files:
    action: github_update_files
    target: instance:.calvin/
    apply: proposed_diff
    commit_message: "chore: update .calvin/ — {{source_ref}}"
    next: done

  done:
    action: output
    message: ✅ .calvin/ aggiornato.
