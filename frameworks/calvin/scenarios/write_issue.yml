id: write_issue
on:
  - user wants to work on an issue
  - user references issue number or title
preconditions: any

reads:
  - instance:.calvin/stack.yml
  - instance:.calvin/conventions.yml
  - instance:.calvin/testing.yml
  - instance:github:issue:{{issue_number}}

states:
  resolve_issue:
    condition: issue_number present
    on_missing:
      action: ask
      message: qual è il numero o titolo dell'issue?
      next: stop
    on_present:
      next: draft_definition

  draft_definition:
    action: output
    format: |
      ## #{{issue_number}} — {{issue.title}}
      **Goal:** [una riga — cosa deve fare, non come]
      **Entry points:** [file/classi/route coinvolti]
      **Constraints:** [convenzioni da .calvin/conventions.yml, file da non toccare, dipendenze]
      **Tests:** [cosa testare, edge cases da .calvin/testing.yml]
      **Do not touch:** [file/classi fuori scope]
      **Depends on:** [#N | none]
      **Context:** [info non nel body che il modello deve avere]
    note: if any field is unclear, ask before proceeding — do not assume
    next: confirm_definition

  confirm_definition:
    action: confirm
    message: definizione corretta? modifica se necessario
    on_confirm:
      next: draft_comment
    on_changes:
      next: draft_definition

  draft_comment:
    action: output
    template: frameworks/calvin/templates/issue_qwen_ready.md
    note: comment must be self-contained — model reads only comment + .calvin/, nothing else
    next: confirm_post

  confirm_post:
    action: confirm
    message: posto il commento sulla issue?
    on_confirm:
      next: post_comment
    on_reject:
      next: draft_comment

  post_comment:
    action: github_post_comment
    target: instance:github:issue:{{issue_number}}
    content: draft_comment
    next: confirm_label

  confirm_label:
    action: confirm
    message: aggiungo label `agent` per esecuzione async?
    on_confirm:
      next: add_label
    on_reject:
      next: stop

  add_label:
    action: github_add_label
    target: instance:github:issue:{{issue_number}}
    label: agent
    next: done

  done:
    action: output
    message: |
      ✅ Issue #{{issue_number}} in coda.
      poll.rb eseguirà al prossimo ciclo.
