id: write_issue
on:
  - user wants to work on an issue
  - user references issue number or title
preconditions: any

reads:
  - instance:.calvin/stack.yml
  - instance:.calvin/conventions.yml
  - instance:.calvin/testing.yml
  - instance:github:issue:{{issue_number}}

states:
  resolve_issue:
    condition: issue_number present
    on_missing:
      action: ask
      message: what is the issue number or title?
      next: stop
    on_present:
      next: draft_definition

  draft_definition:
    action: output
    format: |
      ## #{{issue_number}} — {{issue.title}}
      **Goal:** [one line — what to do, not how]
      **Entry points:** [files/classes/routes involved]
      **Constraints:** [conventions from .calvin/conventions.yml, files not to touch, dependencies]
      **Tests:** [what to test, edge cases from .calvin/testing.yml]
      **Do not touch:** [files/classes out of scope]
      **Depends on:** [#N | none]
      **Context:** [info not in the body that the model needs]
    note: if any field is unclear, ask before proceeding — do not assume
    next: confirm_definition

  confirm_definition:
    action: confirm
    message: is the definition correct? edit if needed
    on_confirm:
      next: draft_comment
    on_changes:
      next: draft_definition

  draft_comment:
    action: output
    template: frameworks/calvin/templates/issue_async_ready.md
    note: comment must be self-contained — model reads only comment + .calvin/, nothing else
    next: confirm_post

  confirm_post:
    action: confirm
    message: post the comment on the issue?
    on_confirm:
      next: post_comment
    on_reject:
      next: draft_comment

  post_comment:
    action: github_post_comment
    target: instance:github:issue:{{issue_number}}
    content: draft_comment
    next: confirm_label

  confirm_label:
    action: confirm
    message: add label `agent` for async execution?
    on_confirm:
      next: add_label
    on_reject:
      next: stop

  add_label:
    action: github_add_label
    target: instance:github:issue:{{issue_number}}
    label: agent
    next: done

  done:
    action: output
    message: |
      ✅ Issue #{{issue_number}} queued.
      calvin.rb will pick it up on the next cycle.
