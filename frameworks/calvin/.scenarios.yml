scenarios:
  - id: session_start
    priority: 0
    triggers:
      - first message of the conversation
      - user wants project status or summary
      - user asks what is open or pending
    file: frameworks/calvin/scenarios/session_start.yml

  - id: work_issue
    priority: 10
    triggers:
      - user wants to work on an issue
      - user references an issue number or title
      - user says "facciamo", "lavoriamo", "implementa", "definisci"
    file: frameworks/calvin/scenarios/work_issue.yml

  - id: review_pr
    priority: 10
    triggers:
      - user wants to review a PR
      - user references a PR number
      - user says "review", "guarda la PR", "controlla"
    file: frameworks/calvin/scenarios/review_pr.yml

  - id: update_context
    priority: 5
    triggers:
      - user merged a PR and wants to update context
      - user wants to record a decision
      - user says "aggiorna contesto", "salva decisione"
      - called from review_pr after Calvin notes confirmed
    file: frameworks/calvin/scenarios/update_context.yml

  - id: unknown
    priority: 0
    triggers:
      - anything not matched above
    file: frameworks/calvin/scenarios/unknown.yml
