context_path: .calvin/

structure:
  .calvin/stack.yml:
    template: frameworks/calvin/templates/calvin_context/stack.yml
    access: read-write
    written_by: calvanize
    updated_by: update_context
    required_keys: [project_name, language, framework, version, database, test_framework, key_libraries]

  .calvin/conventions.yml:
    template: frameworks/calvin/templates/calvin_context/conventions.yml
    access: read-write
    written_by: calvanize
    updated_by: update_context
    required_keys: [naming, folder_structure, patterns, do_not_touch]

  .calvin/testing.yml:
    template: frameworks/calvin/templates/calvin_context/testing.yml
    access: read-write
    written_by: calvanize
    updated_by: update_context
    required_keys: [strategy, coverage_rule, always_test, command]

  .calvin/decisions.yml:
    template: frameworks/calvin/templates/calvin_context/decisions.yml
    access: append-only
    updated_by: update_context
    note: never rewrite existing entries — only append

  .calvin/schema.yml:
    generated_by: calvin.rb at startup and on db/schema.rb change
    access: read-only
    note: do not edit manually — auto-generated from db/schema.rb + app/models/
    template: frameworks/calvin/templates/calvin_context/schema.yml

  .calvin/calvin.rb:
    template: frameworks/calvin/scripts/calvin.rb
    access: read-only
    note: entry point — start with ruby .calvin/calvin.rb

  .calvin/lib/:
    template: frameworks/calvin/scripts/lib/
    access: read-only
    note: supporting classes for calvin.rb — do not edit unless intentional

cross_refs:
  - label: decisions entries must have date, decision, rationale
    source: .calvin/decisions.yml
    target_keys: [date, decision, rationale]
    level: warning

  - label: do_not_touch must be non-empty after first 5 issues
    source: .calvin/conventions.yml
    level: warning
    after_issues: 5
