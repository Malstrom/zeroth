context_file: .context.yml

structure:
  .context.yml:
    template: frameworks/calvin/templates/project_context.yml
    access: read-write
    managed_by: [update_context]
    required_keys: [project, stack, conventions, testing, decisions]

  .calvin/poll.rb:
    template: frameworks/calvin/scripts/poll.rb
    access: read-write
    optional: true
    note: copy from scripts/, set env vars

cross_refs:
  - label: decisions entries must have date, decision, rationale
    source: .context.yml decisions[]
    target_keys: [date, decision, rationale]
    level: warning
