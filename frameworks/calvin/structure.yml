root: frameworks/calvin/

files:
  .agent.yml:
    role: operational manifest — read by Perplexity at session start
    written_by: Igor + Perplexity
    updated_by: manual when framework evolves

  .scenarios.yml:
    role: scenario index — maps triggers to scenario files
    written_by: Perplexity
    updated_by: when scenarios are added or renamed

  overview.yml:
    role: decisions, label lifecycle, actor definitions
    written_by: Perplexity
    updated_by: when decisions change

  structure.yml:
    role: this file — map of all framework files with roles
    written_by: Perplexity
    updated_by: when files are added or removed

  README.md:
    role: human entry point — quick start and file map
    written_by: Perplexity
    updated_by: when structure or flow changes

scenarios/:
  create_epic.yml:
    role: create parent issue from chat context, link docs/ paragraphs
    triggers: ["crea epic", "crea issue madre", "apri epic"]

  decompose.yml:
    role: read epic + docs/, propose and create atomic sub-issues
    triggers: ["decomponila", "crea sub issue", "decompose"]

  write_async_ready.yml:
    role: produce and post async-ready comment on a task issue, add label:agent
    triggers: ["prepara per il modello", "async ready", "manda al modello"]

  calvanize.yml:
    role: bootstrap .calvin/ on a new target repo
    triggers: ["calvanize", "inizializza calvin", "bootstrap calvin"]

  review_pr.yml:
    role: review a PR, read Calvin notes, propose .calvin/ updates
    triggers: ["review", "guarda la PR", "controlla"]

  update_context.yml:
    role: apply confirmed .calvin/ updates after PR merge
    triggers: ["aggiorna contesto", "salva decisione", called from review_pr]

  session_start.yml:
    role: orient at session start, show open issues and pending work
    triggers: [first message, status request]

templates/:
  issue_epic.md:
    role: body template for parent issues (epic)
    fields: [Goal, Why, Stack, Docs, Scope, Sub-issues, Notes]

  issue_task.md:
    role: body template for atomic sub-issues (task)
    fields: [Goal, Parent, Stack, Acceptance criteria, Dependencies, Notes]

  issue_async_ready.md:
    role: comment template for model execution — self-contained context
    fields: [Goal, Entry points, Constraints, Tests, Do not touch, Depends on, Context]
    note: model reads only this comment + .calvin/ — nothing else

scripts/:
  calvin.rb:
    role: entry point — polling loop + provider list + logger
    run: ruby .calvin/calvin.rb
    env: [GITHUB_TOKEN, CALVIN_REPO, CALVIN_REPO_PATH, CALVIN_POLL_INTERVAL]

  lib/issue_executor.rb:
    role: orchestrates the full pipeline per issue

  lib/github_client.rb:
    role: Octokit wrapper — fetch issues, post comments, manage labels, open PRs

  lib/context_builder.rb:
    role: loads .calvin/ files + relevant schema entries

  lib/prompt_builder.rb:
    role: assembles final prompt from context + issue

  lib/aider_runner.rb:
    role: runs Aider with provider fallback stack, handles 429 + git reset

  lib/git_committer.rb:
    role: checkout branch, commit, push

  lib/pull_request_opener.rb:
    role: opens PR via GitHub API

  lib/finalizer.rb:
    role: updates labels, posts status comment, cleanup

instance_layout:
  note: per-repo files created by calvanize scenario
  .calvin/stack.yml: tech stack + key libraries
  .calvin/conventions.yml: naming, patterns, do-not-touch rules
  .calvin/testing.yml: test strategy and coverage rules
  .calvin/decisions.yml: append-only architecture decisions
  .calvin/schema.yml: logical model schema (relevant models for prompt injection)
