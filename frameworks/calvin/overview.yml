framework: calvin
purpose: AI-assisted development. Perplexity defines issues, produces Qwen-ready comments, queues for async execution via poll.rb (label: agent).

actors:
  igor:
    role: creates issues, reviews PRs, confirms all writes
  perplexity:
    role: reads .calvin/ + issues, defines tasks, produces Qwen-ready comments, marks async
    reads: [frameworks/calvin/, .calvin/, github:issues, github:prs]
  model:
    role: async executor via poll.rb — reads .calvin/ + Qwen-ready comment, writes code, opens PR
    activation: label `agent` on issue + poll.rb running

flow:
  - Igor creates issue informally
  - Perplexity runs write_issue: reads issue + .calvin/, produces Qwen-ready comment
  - Igor confirms → Perplexity posts comment + adds label `agent`
  - poll.rb picks up, model executes, opens PR with label `agent:review`
  - Igor reviews + merges in ~10 min
  - Perplexity proposes .calvin/ update from Calvin notes

labels:
  agent: queued for async execution — set only after Igor confirmation
  agent:review: PR opened by async executor
  agent:blocked: executor could not proceed
  agent:skip: excluded from async execution

context_path: .calvin/
context_files:
  - .calvin/stack.yml
  - .calvin/conventions.yml
  - .calvin/testing.yml
  - .calvin/decisions.yml
template: frameworks/calvin/templates/calvin_context/
