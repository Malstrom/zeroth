framework: calvin
purpose: AI-assisted development. Perplexity defines issues and executes tasks (sync) or queues them for async execution via poll.rb + Mistral (label: agent).

actors:
  igor:
    role: creates issues, reviews PRs, confirms all writes
  perplexity:
    role: reads .context.yml + issues, defines tasks, executes sync or marks async
    reads: [frameworks/calvin/, .context.yml, github:issues, github:prs]
  mistral:
    role: async executor via poll.rb — Phase 2, not active yet
    activation: label `agent` on issue + poll.rb running

flow:
  sync:
    - Igor points to issue
    - Perplexity reads issue + .context.yml, proposes definition
    - Perplexity produces model-ready comment (Igor confirms before post)
    - Igor chooses: execute now → Perplexity writes code + opens PR
    - Igor merges, Perplexity proposes .context.yml update
  async:
    - Perplexity produces model-ready comment
    - Igor confirms + adds label `agent`
    - poll.rb picks up, Mistral executes, opens PR
    - Igor reviews + merges

labels:
  agent: queued for async execution (set by Igor only)
  agent:review: PR opened by async executor
  agent:blocked: async executor could not proceed
  agent:skip: excluded from async execution

context_file:
  path: .context.yml
  location: instance repo root
  template: frameworks/calvin/templates/project_context.yml
  sections: [project, stack, conventions, testing, decisions]
