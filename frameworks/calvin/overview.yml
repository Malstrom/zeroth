framework: calvin
purpose: Dev assistant. Helps develop issues synchronously in chat or asynchronously via LLM (calvin.rb loop + label agent).

actors:
  igor:
    role: creates issues, reviews PRs, confirms all writes
  perplexity:
    role: reads .calvin/ + issues, defines tasks, produces async-ready comments, marks async
    reads: [frameworks/calvin/, .calvin/, github:issues, github:prs]
  model:
    role: async executor via calvin.rb — reads .calvin/ + async-ready comment, writes code, opens PR
    activation: label `agent` on issue + calvin.rb loop running

flow:
  - Igor creates issue informally
  - Perplexity runs write_issue: reads issue + .calvin/, produces async-ready comment
  - Igor confirms → Perplexity posts comment + adds label `agent`
  - calvin.rb picks up, model executes, opens PR with label `agent:review`
  - Igor reviews + merges in ~10 min
  - Perplexity proposes .calvin/ update from Calvin notes

labels:
  agent: queued for async execution — set only after Igor confirmation
  agent:review: PR opened by async executor
  agent:blocked: executor could not proceed
  agent:skip: excluded from async execution

context_path: .calvin/
context_files:
  - .calvin/stack.yml
  - .calvin/conventions.yml
  - .calvin/testing.yml
  - .calvin/decisions.yml
  - .calvin/schema.yml        # auto-generated, optional
template: frameworks/calvin/templates/calvin_context/
