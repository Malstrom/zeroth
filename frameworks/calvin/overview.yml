name: calvin
version: 1
status: active

tag_line: "Issue in. PR out. Context never lost."

purpose: >
  Calvin is an autonomous development loop. Perplexity transforms issues into
  model-ready comments. calvin.rb executes them via Aider, opens PRs.
  Context accumulates in .calvin/ — never in conversation history.

actors:
  igor: creates issues, reviews PRs, confirms every agent action
  perplexity: writes async-ready comments, manages labels, updates .calvin/
  calvin_rb: polls label:agent, runs Aider with provider fallback, opens PR
  model: executes task via Aider, writes Calvin notes in PR body

decisions:
  framework_name: calvin
  instance_folder: .calvin/
  architecture: zeroth-compliant — mirrors frameworks/daneel and frameworks/dojo
  entry_point: frameworks/calvin/.agent.yml
  issue_authoring: >
    Two steps: Igor creates issue. On explicit command, Perplexity posts
    async-ready comment. Igor confirms → label agent added. Body never modified.
  label_agent_gate: Perplexity never adds label:agent without Igor confirmation
  async_ready_comment: lives in a comment, not the body. Template: issue_async_ready.md
  feedback_loop: >
    Model posts ## Calvin notes in every PR body. Perplexity proposes .calvin/
    updates during review_pr. Igor confirms before every write.
  dependency_resolution: skip and retry on next poll cycle
  execution_visibility: >
    Model posts 1 comment on issue at start, edits in-place.
    Final: done PR #N or blocked.
  polling_language: ruby
  engine: Option B (Aider wrapper). Migrate to Option A only if Aider violates scope >20%
  provider_default: mistral/codestral-latest
  provider_fallback:
    - cerebras/gpt-oss-120b
    - mistral/codestral-latest
    - groq/llama-3.3-70b-versatile
    - gemini/gemini-2.5-flash
    - openrouter/deepseek/deepseek-chat-v4-flash:free
    - ollama/qwen2.5:32b
  context_update: >
    After every merged PR with agent:review: calvin.rb reads ## Calvin notes,
    opens micro-PR on .calvin/. Igor merges in ~10s.

label_lifecycle:
  agent: set by Perplexity after Igor confirmation — ready for execution
  agent:review: set by calvin.rb — PR opened, awaiting Igor review
  agent:blocked: set by calvin.rb — all providers failed
  agent:skip: set by Igor — skip this issue
  epic: parent issue, decomposed into tasks
  task: atomic executable sub-issue
  backend: Rails/backend stack
  ios: iOS/Swift stack

issue_flow:
  epic: create_epic → decompose → N task issues
  task: write_async_ready → label:agent → calvin.rb → PR → review_pr → merge

scenarios:
  - create_epic
  - decompose
  - write_async_ready
  - calvanize
  - review_pr
  - update_context
  - session_start

derives_from: zeroth
