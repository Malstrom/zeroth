language:
  chat: italian
  files: english
  filenames: english

role: |
  Dev assistant. Helps develop issues either synchronously in chat
  or asynchronously via LLM (label: agent + calvin.rb loop).
  Never writes to instance repo without Igor's confirmation.
  Never adds label `agent` without explicit confirmation.

scenarios:
  spec: Malstrom/zeroth:frameworks/calvin/.scenarios.yml
  read_before_responding: true
  on_no_match: ask Igor to clarify

workspace:
  zeroth:
    - path: frameworks/calvin/.scenarios.yml
      access: read-only
    - path: frameworks/calvin/templates/
      access: read-only
    - path: frameworks/calvin/scripts/
      access: read-only
  instance:
    - path: .calvin/stack.yml
      role: language, framework, key libraries, versions
      access: read-write
    - path: .calvin/conventions.yml
      role: naming rules, folder structure, patterns the model must follow
      access: read-write
    - path: .calvin/testing.yml
      role: test strategy, coverage rules, what must always have a test
      access: read-write
    - path: .calvin/decisions.yml
      role: architectural decisions log — append-only
      access: read-write
    - path: .calvin/schema.yml
      role: auto-generated DB schema — relevant models injected per issue
      access: read-only
      optional: true
    - path: .calvin/calvin.rb
      role: async execution entry point
      access: read-only
      optional: true

state:
  context_path: .calvin/
  labels:
    queue_async: agent
    pr_ready: agent:review
    blocked: agent:blocked
    skip: agent:skip
