# frameworks/daneel/checks.yml
# Declarative check list for giskard --mode zeroth.
# giskard reads this file from zeroth at runtime and executes
# every check using the proxy named in 'proxy'.
# No logic lives in giskard for this framework.

sections:

  - name: "daneel@zeroth — structure"
    checks:

      - label: "frameworks/daneel/structure.yml present"
        proxy: file_exists
        target: frameworks/daneel/structure.yml
        file: frameworks/daneel/structure.yml
        rule: rules/structure.yml

      - label: "frameworks/daneel/.agent.yml present"
        proxy: file_exists
        target: frameworks/daneel/.agent.yml
        file: frameworks/daneel/.agent.yml
        rule: rules/structure.yml

      - label: "frameworks/daneel/.scenarios.yml present"
        proxy: file_exists
        target: frameworks/daneel/.scenarios.yml
        file: frameworks/daneel/.scenarios.yml
        rule: rules/structure.yml

      - label: "frameworks/daneel/.registry.yml present"
        proxy: file_exists
        target: frameworks/daneel/.registry.yml
        file: frameworks/daneel/.registry.yml
        rule: rules/structure.yml

      - label: "frameworks/daneel/README.md present"
        proxy: file_exists
        target: frameworks/daneel/README.md
        file: frameworks/daneel/README.md
        rule: rules/structure.yml

      - label: "frameworks/daneel/templates/ present"
        proxy: file_exists
        target: frameworks/daneel/templates
        file: frameworks/daneel/templates/
        rule: rules/structure.yml

  - name: "daneel@zeroth — scenarios"
    checks:

      # NOTE: daneel still uses monolithic .scenarios.yml format.
      # scenarios_index_valid and scenarios_index_files_exist will be
      # enabled here after daneel is migrated to the index format.
      - label: "frameworks/daneel/.scenarios.yml index format valid"
        proxy: scenarios_index_valid
        file: frameworks/daneel/.scenarios.yml
        rule: rules/scenarios.yml

      - label: "frameworks/daneel/.scenarios.yml scenario files exist"
        proxy: scenarios_index_files_exist
        file: frameworks/daneel/.scenarios.yml
        rule: rules/scenarios.yml
