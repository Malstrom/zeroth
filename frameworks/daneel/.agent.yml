# frameworks/daneel/.agent.yml
# AI-only operational manifest for the daneel framework.
# Tool approval policy: defined in Space instructions — not here.

# ---------------------------------------------------------------------------
# LANGUAGE
# ---------------------------------------------------------------------------
language:
  chat: read from .daneel.yml     # language used when speaking with the user
  files: english                  # all file content, commits, PR/issue bodies
  filenames: english              # all file names AND folder names (snake_case, lowercase)

# ---------------------------------------------------------------------------
# WORK RULES
# ---------------------------------------------------------------------------
work_rules:
  log_immutability: append-only — commit before responding
  inbox_immutability: write-once — never edit after creation

# ---------------------------------------------------------------------------
# HARD RULES
# Inherited from zeroth rules/agent.yml — never override.
# ---------------------------------------------------------------------------
hard_rules:
  ref: Malstrom/zeroth:rules/agent.yml#hard_rules

# ---------------------------------------------------------------------------
# SCENARIOS
# Read .scenarios.yml BEFORE any reasoning.
# Every user message must be matched against scenarios first.
# ---------------------------------------------------------------------------
scenarios:
  spec: Malstrom/zeroth:frameworks/daneel/.scenarios.yml
  read_before_responding: true
  on_no_match: propose new scenario to user before proceeding

# ---------------------------------------------------------------------------
# WORKSPACE
# Files are split by repo. "zeroth" = Malstrom/zeroth. "instance" = the
# instance repo declared in Space instructions (e.g. Malstrom/{instance-slug}).
# ---------------------------------------------------------------------------
workspace:
  zeroth:
    # files that live in Malstrom/zeroth
    - path: frameworks/daneel/.scenarios.yml
      role: scenario catalog
      access: read-only
    - path: frameworks/daneel/templates/
      role: file templates for log, inbox, contact, playbook, client context
      access: read-only

  instance:
    # files that live in the instance repo declared in Space instructions
    - path: .daneel.yml
      role: user profile, roles, domains, language, timezone
      access: read-only
    - path: .registry.yml
      role: cross-repo connections
      access: read-only
    - path: contacts/
      role: external and internal contact profiles
      access: read-write
    - path: playbooks/
      role: step-by-step instructions for recurring work types
      access: read-write
    - path: "clients/*/context.yml"
      role: static client info
      access: read-write
    - path: "clients/*/summary.md"
      role: human-facing client summary
      access: read-write
    - path: "clients/*/inbox/*.yml"
      role: raw incoming tasks
      access: write-once
    - path: "clients/*/output/**"
      role: AI-generated output for human delivery
      access: read-write
    - path: "clients/*/playbooks/**"
      role: client-specific playbook overrides
      access: read-write
    - path: "clients/*/log/*.yml"
      role: immutable daily work logs
      access: append-only
    - path: "clients/*/log/*.index.yml"
      role: monthly log index, AI-generated
      access: read-write
    - path: "contacts/*.yml"
      role: contact profiles
      access: read-write
