# frameworks/daneel/onboarding.yml
# Daneel onboarding wizard.
# Read by session_start when clients/ contains only .gitkeep (first session).
# Never read again after first client is created.
#
# Pattern: dojo onboarding.yml pro_path
# The user has GitHub connector active — AI writes files directly.

onboarding:

  # ---------------------------------------------------------------------------
  # TRIGGER CONDITION (evaluated in session_start)
  # ---------------------------------------------------------------------------
  trigger:
    condition: clients_dir_empty
    description: >
      clients/ exists but contains only .gitkeep.
      This means spawn has run but onboarding has not completed yet.

  # ---------------------------------------------------------------------------
  # STEP 1 — COLLECT IDENTITY
  # ---------------------------------------------------------------------------
  collect_identity:

    collect_name:
      ask: "What's your name?"
      field: user_name

    collect_language:
      ask: "What language do you want me to reply in? (e.g. italian, english)"
      field: language

    collect_timezone:
      ask: "Your timezone? (e.g. Europe/Rome, Europe/Moscow)"
      field: timezone

    collect_role:
      ask: "Your role? (e.g. consultant, developer, freelancer)"
      field: role

  # ---------------------------------------------------------------------------
  # STEP 2 — FIRST CLIENT (optional)
  # ---------------------------------------------------------------------------
  collect_first_client:
    ask: |
      Do you have a first client to add now?
      I'll create the folder structure for them.
      If not, say "skip" — you can add clients later with the add_client scenario.
    on_skip: goto write_files
    on_provided:
      collect_client_name:
        ask: "Client name? (will be used as folder slug, e.g. acme)"
        field: first_client_name
        note: snake_case, lowercase, no spaces
      collect_client_sector:
        ask: "Sector or type of work? (e.g. legal, software, consulting)"
        field: first_client_sector

  # ---------------------------------------------------------------------------
  # STEP 3 — WRITE FILES
  # ---------------------------------------------------------------------------
  write_files:
    description: >
      Write initial repo files after collecting identity and optional first client.
      Executed via GitHub connector — no user action needed.
    actions:

      - write:
          path: "README.md"
          generate: true
          guided_by: "Malstrom/zeroth:frameworks/daneel/overview.yml"
          content_hint: |
            Human-readable profile for {{user_name}}.
            Mentions role, language, timezone.
            Lists active clients if any.
            Visible on the GitHub repo landing page.
          access: write-once
          via: PR
          approval: none

      - if:
          condition: first_client_provided
          then:
            - write:
                path: "clients/{{first_client_slug}}/context.yml"
                from: "Malstrom/zeroth:frameworks/daneel/templates/client_context.yml"
                vars:
                  client_name: "{{first_client_name}}"
                  sector: "{{first_client_sector}}"
                  owner: "{{user_name}}"
                access: read-write
                via: PR
                approval: none
            - write:
                path: "clients/{{first_client_slug}}/playbooks/.gitkeep"
                content: ""
                access: write-once
                via: PR
                approval: none

  # ---------------------------------------------------------------------------
  # STEP 4 — DONE
  # ---------------------------------------------------------------------------
  done:
    say: |
      Setup complete, {{user_name}}.
      Your daneel repo is ready.
      {% if first_client_provided %}
      First client added: {{first_client_name}} → clients/{{first_client_slug}}/
      {% endif %}
      Next: tell me about your first task and I'll run ingest_task.
