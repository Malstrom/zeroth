# frameworks/daneel/scenarios/draft_reply.yml
# Scenario: draft_reply
# Trigger: user wants to write a message or reply to a contact
# Output: draft posted as comment on the related issue

scenario: draft_reply

on:
  - user wants to draft a reply or message to a contact
  - user asks to write an email or chat message
  - user says "rispondi a" or "scrivi a" or "bozza messaggio"
  - "draft"
  - "scrivi risposta"
  - "bozza messaggio"
  - "rispondi a"
  - "scrivi a"

read:
  - "contacts/{{contact_slug}}.yml"                # tone, language, salutation, prefers
  - github_issue: "{{issue_number}}"               # context for the reply (if linked to issue)

steps:

  - if: contact_slug is not provided
    then:
      - ask: "Who are you writing to? (contact slug or name)"
      - resolve: contact_slug from user_input via contacts/

  - read:
      path: "contacts/{{contact_slug}}.yml"
      assign: contact
      on_missing:
        - say: "Contact '{{contact_slug}}' not found in contacts/. Create it first or provide the communication style manually."
        - ask: "Language? Tone? How to address them?"
        - assign: contact from user_input

  - if: issue_number is not provided
    then:
      - ask: "Is this reply related to an open issue? (issue number or 'no')"
      - if: user provides issue number
        then:
          - read:
              resource: github_issue
              number: "{{issue_number}}"
              assign: issue

  - ask: |
      What should the reply say? (key points, instructions, or paste the original message to reply to)

  - say: |
      Drafting reply to {{contact.full_name}}:
      — Language: {{contact.communication.language}}
      — Tone: {{contact.communication.tone}}
      — Format: {{contact.communication.format}}
      — Address as: {{contact.communication.salutation}}
      {{contact.communication.avoid ? '— Avoid: ' + contact.communication.avoid | join(', ') : ''}}

  - generate:
      type: reply_draft
      recipient: "{{contact}}"
      context: "{{issue | null}}"
      instructions: "{{user_instructions}"
      assign: draft_text

  - say: |
      ---
      {{draft_text}}
      ---

  - ask: "Approve, edit, or regenerate?"

  - if: user approves
    then:
      - if: issue_number is provided
        then:
          - comment:
              issue: "{{issue_number}}"
              body: |
                ## Draft reply — {{contact.full_name}} — {{today | YYYY-MM-DD}}

                {{draft_text}}

                ---
                _Draft generated by daneel. Review before sending._
          - say: "Draft saved as comment on issue #{{issue_number}}."
        else:
          - say: "Draft ready — no issue linked, copy manually."
          - say: "{{draft_text}}"

  - if: user wants to edit
    then:
      - ask: "Provide corrections or new instructions."
      - restart: from generate

  - if: user wants to regenerate
    then:
      - restart: from generate
