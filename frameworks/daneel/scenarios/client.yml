# frameworks/daneel/scenarios/client.yml
# Scenarios: summarize_client, draft_reply

scenarios:

  summarize_client:
    on:
      - user asks for a client summary
      - user wants an overview of a client relationship
    creates_issue: false
    read:
      - "clients/{slug}/context.yml"
      - "clients/{slug}/summary.md"
    steps:
      - call: recall
      - write:
          path: "clients/{slug}/summary.md"
          access: read-write
          via: PR
      - say: "Summary updated: clients/{slug}/summary.md."
    output:
      state_changes: []

  draft_reply:
    on:
      - user asks to draft a reply or message to a contact
      - user wants to write a message to a client or team member
    creates_issue: false
    read:
      - "contacts/{{contact_file}}"
      - "clients/{slug}/context.yml"
    steps:
      - say: "Draft: {{message_draft}}."
      - propose: "Save draft to output?"
        on_confirm:
          - write:
              path: "clients/{slug}/output/"
              filename: "YYYY-MM-DD_{slug}.md"
              access: write-once
              via: PR
    output:
      state_changes: []
