# source: frameworks/daneel/scenarios/work_session.yml

id: work_session
preconditions:
  - task_context_loaded
on:
  - user wants to work on an open task
  - user says continue this task
  - user asks for progress on a client task
creates_issue: false
read:
  - .daneel.yml
  - clients/
  - contacts/
  - github:issues:open
steps:
  - compute: issue_number
  - compute: client_slug
  - compute: work_type
  - compute: contact_list
  - compute: prior_notes
  - say: |
      Working on issue #{{issue_number}}.
      Client: {{client_slug}}
      Work type: {{work_type}}

  - if:
      condition: client_context_exists(client_slug)
      then:
        - read: "clients/{{client_slug}}/context.yml"

  - if:
      condition: contact_list | count > 0
      then:
        - say: |
            Relevant contacts:
            {{contact_list | format_contact_summary}}

  - if:
      condition: prior_notes | count > 0
      then:
        - say: |
            Prior notes found:
            {{prior_notes | summarize_notes}}

  - ask: ask what the operator wants to do on this task

  - if:
      condition: user_intent == "draft_reply"
      then:
        - read: Malstrom/zeroth:frameworks/daneel/scenarios/draft_reply.yml
        - say: |
            Draft reply scenario loaded.
            Use contact + task context to prepare the reply.

  - if:
      condition: user_intent == "create_playbook"
      then:
        - read: Malstrom/zeroth:frameworks/daneel/scenarios/create_playbook.yml
        - say: |
            Create playbook scenario loaded.
            Will inspect existing playbooks before writing a new one.

  - if:
      condition: user_intent == "close_task"
      then:
        - read: Malstrom/zeroth:frameworks/daneel/scenarios/close_task.yml
        - say: |
            Close task scenario loaded.
            Will prepare closing comment and final state update.

  - say: |
      Continue with the selected work path using the loaded scenario instructions.

  - propose: "Run close_task?"
    on_confirm:
      - call:
          scenario: close_task
          file: frameworks/daneel/scenarios/close_task.yml
          load: on_demand
          with: { issue_number: "{{issue_number}}", slug: "{{slug}}", work_type: "{{work_type}}" }

output:
  state_changes: []
