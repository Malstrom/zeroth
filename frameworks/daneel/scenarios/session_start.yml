# source: frameworks/daneel/scenarios/session_start.yml

id: session_start
on:
  - this is the first message of the conversation and no other scenario matches
  - user greets the system or starts a new work session
  - user opens or resumes daneel
preconditions:
  - any
creates_issue: false
read:
  - .daneel.yml
  - clients/
  - contacts/
  - github:issues:open
steps:
  # ---------------------------------------------------------------------------
  # ONBOARDING IF MISSING
  # ---------------------------------------------------------------------------
  - if:
      condition: profile_missing OR operator_name == ""
      then:
        - say: |
            Profile missing.
            Need to initialize daneel before first use.
        - read: Malstrom/zeroth:frameworks/daneel/onboarding.yml
        - call:
            scenario: onboarding
            file: frameworks/daneel/onboarding.yml
            load: on_demand
        - stop

  # ---------------------------------------------------------------------------
  # NORMAL SESSION
  # ---------------------------------------------------------------------------
  - compute: active_clients
  - compute: open_tasks_by_client

  - if:
      condition: open_tasks_by_client | count == 0
      then:
        - say: |
            Nessun task aperto trovato.
            Puoi incollare un nuovo task o chiedermi di richiamare lavoro passato.
      else:
        - say: |
            Benvenuto {{operator_name}}.
            Hai {{open_tasks_by_client | count}} task aperti.
        - say: |
            Elenco sintetico:
            {{open_tasks_by_client | format_task_summary}}
        - propose: |
            Vuoi riprendere il task più recente per {{open_tasks_by_client[0].client_name}}?
          on_confirm:
            - call:
                scenario: work_session
                file: frameworks/daneel/scenarios/work_session.yml
                load: on_demand
                with: { issue: open_issues_by_client[0] }
          on_reject:
            - ask: ask what the operator wants to do next

output:
  state_changes: []
