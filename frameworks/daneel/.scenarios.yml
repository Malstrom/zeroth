# frameworks/daneel/.scenarios.yml
# Daneel framework — scenario index.
# Format: index — see Malstrom/zeroth:rules/scenarios.yml#file_format.index
# AI reads this first, then fetches ONLY the relevant scenario file.
#
# TRIGGER MATCHING: semantic and language-independent.
# Match user intent regardless of the language they write in (Italian, Russian, English, etc.).
# Never match literal strings — always match meaning.
#
# NOTE: delegate_task, rate_work, log_work, summarize_client removed —
# no corresponding scenario files exist. Re-add when files are implemented.

scenarios:

  - id: session_start
    priority: 0
    preconditions:
      - any
    triggers:
      - session opens automatically
      - this is the first message of the conversation and no other scenario matches
    file: frameworks/daneel/scenarios/session_start.yml

  - id: ingest_task
    priority: 10
    preconditions:
      - any
    triggers:
      - user shares a new task, email, or request
      - user pastes an email or message they received
      - user describes a new incoming request from a client
    file: frameworks/daneel/scenarios/ingest_task.yml

  - id: work_session
    priority: 10
    preconditions:
      - any
    triggers:
      - user starts working on a task themselves
      - user wants to open a work session on a task
    file: frameworks/daneel/scenarios/work_session.yml

  - id: close_task
    priority: 10
    preconditions:
      - any
    triggers:
      - user says a task is done or completed
      - user wants to close or mark as done a task
      - user says a session is ending and wants to record what was done
    file: frameworks/daneel/scenarios/close_task.yml

  - id: create_playbook
    priority: 10
    preconditions:
      - any
    triggers:
      - user wants to create or capture a playbook
      - user wants to document a recurring workflow
    file: frameworks/daneel/scenarios/create_playbook.yml

  - id: draft_reply
    priority: 10
    preconditions:
      - any
    triggers:
      - user asks to draft a reply or message to a contact
      - user wants to write a message to a client or team member
    file: frameworks/daneel/scenarios/draft_reply.yml

  - id: recall
    priority: 10
    preconditions:
      - any
    triggers:
      - user asks about past work for a client or topic
      - user wants to know the history of a client or project
    file: frameworks/daneel/scenarios/recall.yml

  - id: reindex
    priority: 5
    preconditions:
      - any
    triggers:
      - user asks to reindex logs or playbooks
      - user wants to update the index for a client or period
    file: frameworks/daneel/scenarios/reindex.yml

  - id: unknown_scenario
    priority: 0
    preconditions:
      - any
    triggers:
      - any message that does not match any other scenario
    file: frameworks/daneel/scenarios/session_start.yml
