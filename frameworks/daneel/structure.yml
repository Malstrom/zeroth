# frameworks/daneel/structure.yml
# Canonical directory layout for any daneel_{instance} repo.
# All names: snake_case (L2-13)
# AI files: .yml | Human files: .md (L2-1)
# Immutable files declared in .agent.yml file_access.immutable (L2-7, L2-8)

root: daneel_{instance}

files:
  - path: .agent.yml
    type: yml
    role: AI manifest and entry point — points to scenarios in zeroth
    access: read-only
    required: true

  - path: .registry.yml
    type: yml
    role: cross-repo connection map
    access: read-only
    required: true

  - path: README.md
    type: md
    role: human navigation hub — written by onboarding, updated by AI
    access: write-only (AI does not read)
    required: true

folders:

  clients:
    path: clients/{slug}/
    description: everything related to a single client
    created_by: onboarding (first client) or add_client scenario
    subfolders:

      - path: clients/{slug}/context.yml
        type: yml
        role: static client info (name, sector, tools, notes)
        from_template: frameworks/daneel/templates/client_context.yml
        immutable: false

      - path: clients/{slug}/playbooks/
        description: client-specific playbooks
        created_by: onboarding
        files:
          - pattern: "{playbook_slug}.yml"
            type: yml
            role: client-specific playbook
            from_template: frameworks/daneel/templates/playbook_client.yml
            immutable: false
          - path: _index.yml
            type: yml
            role: index of client playbooks
            from_template: frameworks/daneel/templates/playbook_index.yml
            created_by: create_playbook (first playbook)
            immutable: false

      # TBD: inbox/ and output/ — file-based input/output design pending
      # Blocked on: AI can only read text files from GitHub (not PDF, .docx, .eml).
      # Will be addressed in a separate issue.
      #
      # - path: clients/{slug}/inbox/
      #   description: raw incoming task files (email text, attachments as text)
      # - path: clients/{slug}/output/
      #   description: AI-generated deliverables (contracts, reports, code)

  contacts:
    path: contacts/
    description: all external contacts, not scoped per client
    files:
      - pattern: "{client}_{firstname}_{lastname}.yml"
        type: yml
        role: external contact profile
        from_template: frameworks/daneel/templates/contact.yml
        immutable: false
      - pattern: "internal_{firstname}_{lastname}.yml"
        type: yml
        role: internal team member profile
        from_template: frameworks/daneel/templates/contact.yml
        immutable: false

  playbooks:
    path: playbooks/
    description: root playbooks promoted from client playbooks
    created_by: spawn (empty), populated by create_playbook on first promotion
    files:
      - pattern: "{slug}.yml"
        type: yml
        role: cross-client promoted playbook
        from_template: frameworks/daneel/templates/playbook_root.yml
        immutable: false
      - path: _index.yml
        type: yml
        role: index of root playbooks
        from_template: frameworks/daneel/templates/playbook_index.yml
        created_by: create_playbook (first root promotion)
        immutable: false

reindex_trigger:
  manual: true
  automatic:
    condition: a client playbook exists with no entry in _index.yml
    action: run reindex scenario for that client
