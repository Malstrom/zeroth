# frameworks/daneel/overview.yml
# Daneel framework — professional memory + operational assistant
# Status: DRAFT (issue #272)

name: daneel
version: 1
status: draft

tag_line: "The AI remembers everything you have done. You just work."

purpose: >
  Daneel is an AI-native framework that acts as persistent professional memory
  and operational assistant for any type of knowledge work.
  The AI does not track tasks — it accompanies you in doing them,
  remembers everything, and uses that memory when needed.

key_problems_solved:
  - "I worked 3 years for a client and cannot remember what I did."
  - "I need to reply to a client but do not remember the context."
  - "I receive a task and do not know if I have done something similar before."
  - "I want to log what I did without switching to another tool."

target_users:
  - consultants
  - developers
  - freelancers
  - anyone doing recurring work for multiple clients

core_concepts:
  client: an external entity you do work for
  contact: a person at a client you communicate with — global, not per-client
  playbook: step-by-step instructions for a recurring work type
  recall: AI operation to retrieve past work via closed GitHub issues
  reindex: AI maintenance operation to rebuild playbook index files

scenarios:
  - ingest_task
  - session_start
  - work_session
  - close_task
  - create_playbook
  - draft_reply
  - recall
  - reindex

derives_from: zeroth
L2_compliance: see rules/laws.yml in zeroth

# ---------------------------------------------------------------------------
# WORK TYPE VOCABULARY
# Closed enum — used as primary matching key for playbook lookup and issue
# search. Every issue must have a label work:{work_type}.
# The AI must always map a task to one of these values — never free text.
# If no value fits precisely, use 'other'.
# ---------------------------------------------------------------------------
work_type:
  values:
    - contract_review      # reviewing or negotiating a contract
    - sla_negotiation      # negotiating service level agreements
    - code_review          # reviewing, deploying, or debugging code
    - protocol_validation  # validating technical or operational protocols
    - auth                 # authentication, access, permissions
    - onboarding           # onboarding a new client, user, or system
    - incident             # incident response and resolution
    - reporting            # producing reports or summaries
    - meeting              # preparing for or following up on a meeting
    - admin                # administrative tasks with no other category
    - other                # anything that does not fit the above
  notes: >
    This enum is the single source of truth for work_type across all templates,
    schemas, scenarios, and GitHub label conventions. Any change here must be
    propagated to: playbook_client.yml schema, playbook_root.yml schema,
    contact.yml schema (if used), and GitHub labels.

# ---------------------------------------------------------------------------
# LABEL CONVENTIONS
# Every GitHub issue created by daneel must have exactly two labels:
#   client:{slug}     — identifies the client (e.g. client:acme)
#   work:{work_type}  — identifies the work type (e.g. work:contract_review)
# These two labels enable all search operations in recall, ingest_task,
# and cross-client pattern recognition.
# Labels must be created in GitHub before first use.
# ---------------------------------------------------------------------------
label_conventions:
  client:
    prefix: "client:"
    example: "client:acme"
    description: "One per issue. Identifies the client this work belongs to."
  work:
    prefix: "work:"
    example: "work:contract_review"
    description: "One per issue. Must match a value in work_type.values."
  rules:
    - Every issue must have exactly one client label and one work label
    - Labels must be created in GitHub before the first issue of that type
    - The AI creates missing labels automatically at ingest_task time

# ---------------------------------------------------------------------------
# ONBOARDING
# Read by spawn scenario to collect identity data before creating the repo.
# ---------------------------------------------------------------------------
onboarding:
  questions:
    - field: user_name
      ask: "Your name?"
    - field: language
      ask: "Language for chat? (e.g. italian, english)"
    - field: timezone
      ask: "Your timezone? (e.g. Europe/Rome, Europe/Moscow)"
    - field: role
      ask: "Your role? (e.g. consultant, developer, freelancer)"
    - field: first_client
      ask: "First client name? (can add more later)"
  creates: .daneel.yml
  identity_template: templates/.daneel.yml
