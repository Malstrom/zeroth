# frameworks/daneel/templates/contact.yml
# Template for contact profile files.
# Path: contacts/{client}_{firstname}_{lastname}.yml
#
# Contacts are GLOBAL — one file per person, not per client.
# A person who works across multiple clients has one file with a clients list.
# Slug convention: {primary_client}_{firstname}_{lastname} — all lowercase, underscore-separated.
#
# Schema defined in #274.

schema:
  fields:
    slug:      { type: string, required: true,  notes: "unique identifier — {client}_{first}_{last}" }
    full_name: { type: string, required: true }
    clients:   { type: list,   required: true,  min: 1, notes: "list of client slugs this contact is associated with" }
    role:      { type: string, required: false }
    language:  { type: enum,   required: true,  values: [ru, en, it, other] }
    tone:      { type: enum,   required: true,  values: [formal, neutral, informal] }
    prefers:   { type: string, required: false, notes: "communication preferences: format, length, avoid" }
    notify:    { type: object, required: false, notes: "channel + target for async notifications" }

# ---------------------------------------------------------------------------
# CONTACT DATA
# ---------------------------------------------------------------------------
slug: "{{client}}_{{firstname}}_{{lastname}}"
full_name: "{{Full Name}}"
clients:
  - "{{client_slug}}"           # add more slugs if this person works across clients
role: "{{job title}}"

communication:
  language: "{{ru|en|it|other}}"
  tone: "{{formal|neutral|informal}}"
  salutation: "{{how to address them, e.g. \u042e\u043b\u0438\u044f or Dr. Smith}}"
  format: "{{bullet_points|prose|table}}"
  avoid: []                     # e.g. [humor, idioms, long_paragraphs]
  prefers: "{{free text about communication style or preferences}}"

# ---------------------------------------------------------------------------
# OPTIONAL — add when contact uses a specific notification channel
# ---------------------------------------------------------------------------
# notify:
#   channel: "{{telegram | slack | email}}"
#   target: "{{@handle or email}}"

# ---------------------------------------------------------------------------
# OPTIONAL — add for internal contacts only (client: _internal)
# Omit entirely for external contacts.
# ---------------------------------------------------------------------------
# skills:
#   - work_type: "{{work_type}}"
#     level: "{{expert|good|learning}}"
#     notes: "{{optional}}"

history:
  first_contact: "{{YYYY-MM-DD}}"
  notes: "{{any relevant background about this contact}}"
