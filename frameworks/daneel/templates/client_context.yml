# frameworks/daneel/templates/client_context.yml
# Template for client context files.
# Path: clients/{slug}/context.yml
# Created by: ingest_task (first task for a new client)
# Updated by: AI whenever new client domains emerge
#
# FIXED section is always present.
# OPTIONAL sections are added by AI only when relevant for this client.
# Never add null fields for unused domains — omit the section entirely.

# ---------------------------------------------------------------------------
# FIXED — always present
# ---------------------------------------------------------------------------
slug: "{{client_slug}}"
name: "{{full client name}}"
sector: "{{industry or sector}}"
country: "{{country}}"
language: "{{primary language}}"
first_work: "{{YYYY-MM-DD}}"
work_types_used: []             # populated by AI — values from work_type enum in overview.yml

# ---------------------------------------------------------------------------
# OPTIONAL — add when client has infrastructure or SSH-managed systems
# ---------------------------------------------------------------------------
# infrastructure:
