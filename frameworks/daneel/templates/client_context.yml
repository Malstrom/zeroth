#     - host: "{{IP or hostname}}"
#       port: 22
#       user: "{{username}}"
#       key: "{{path to private key}}"
#       role: "{{prod | staging | jump}}"
#   maintenance_window: "{{days and times | null}}"
#   notify:
#     channel: "{{slack | telegram | email | null}}"
#     target: "{{channel name or username}}"

