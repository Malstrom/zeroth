# .scenarios.yml
# AI-only scenario catalog for zeroth.
# Defines all user-triggered flows.
# Read by the AI at session start via .agent.yml.
# Syntax: rules/scenarios.yml

required_scenarios:

  add_framework:
    trigger_patterns:
      - user wants to add a new framework definition to zeroth
      - user wants to create rules for a new framework type
    read:
      - templates/overview.yml
      - templates/.agent.yml
      - templates/.scenarios.yml
      - templates/.registry.yml
    actions:
      - create:
          file: "frameworks/{name}/overview.yml"
          from: templates/overview.yml
          via: PR
      - create:
          file: "frameworks/{name}/checklist.yml"
          via: PR
      - create:
          file: "frameworks/{name}/.agent.yml"
          from: templates/.agent.yml
          via: PR
      - create:
          file: "frameworks/{name}/.scenarios.yml"
          from: templates/.scenarios.yml
          via: PR
      - create:
          file: "frameworks/{name}/structure.yml"
          via: PR
      - update:
          file: README.md
          fields: [registered_frameworks]
          via: PR
      - update:
          file: .registry.yml
          fields: [connections]
          via: PR
    state_changes:
      - framework-added

  add_checker:
    trigger_patterns:
      - user wants to add a giskard checker for a framework
      - user wants to validate a framework with giskard
      - user wants to create checks/frameworks/{name}.py in giskard
    read:
      - "Malstrom/giskard:checks/frameworks/README.yml"
      - "frameworks/{name}/structure.yml"
      - "frameworks/{name}/.scenarios.yml"
      - "frameworks/{name}/templates/"
    actions:
      - open issue on Malstrom/giskard before any work
      - create:
          file: "Malstrom/giskard:checks/frameworks/{name}.py"
          via: PR
    state_changes:
      - checker-added
