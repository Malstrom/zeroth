# .scenarios.yml
# AI-only scenario catalog for zeroth.
# Format: index — see rules/scenarios.yml#file_format.index
# AI reads this first, then fetches ONLY the relevant scenario file.

scenarios:
  - id: session_start
    triggers:
      - session opens automatically
    file: scenarios/session_start.yml

  - id: spawn
    triggers:
      - user wants to create a new repo from a framework
      - user wants to instantiate a framework
      - user wants to spawn a new instance of dojo, aurora, or any registered framework
    file: scenarios/spawn.yml

  - id: improve
    triggers:
      - user wants to improve a framework
      - user wants to improve zeroth
      - user wants to improve giskard
      - user reports a problem or bug
      - user has a new idea for the system
    file: scenarios/improve.yml

  - id: unknown_scenario
    triggers:
      - any message that does not match any other scenario
    file: scenarios/unknown_scenario.yml
