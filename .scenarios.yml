# .scenarios.yml
# AI-only scenario catalog for zeroth.
# Defines all user-triggered flows. Read by the AI at session start via .agent.yml.
# Syntax: rules/scenarios.yml

required_scenarios:

  session_start:
    trigger_patterns:
      - session opens automatically
    read:
      - .registry.yml
    actions:
      - say: "Zeroth session started."
      - say: "Frameworks registered: {{registry.connections | count}}. Rules: {{repo_map | count}}."
      - propose: "What would you like to work on?"
    state_changes: []

  add_framework:
    trigger_patterns:
      - user wants to add a new framework to zeroth
      - user wants to create rules for a new framework
    read:
      - templates/overview.yml
      - templates/.agent.yml
      - templates/.scenarios.yml
      - templates/.registry.yml
    actions:
      - create:
          file: "frameworks/{name}/overview.yml"
          from: templates/overview.yml
          via: PR
      - create:
          file: "frameworks/{name}/checklist.yml"
          via: PR
      - create:
          file: "frameworks/{name}/.agent.yml"
          from: templates/.agent.yml
          via: PR
      - create:
          file: "frameworks/{name}/.scenarios.yml"
          from: templates/.scenarios.yml
          via: PR
      - update:
          file: README.md
          fields: [registered_frameworks]
          via: PR
      - update:
          file: .registry.yml
          fields: [connections]
          via: PR
      - emit: framework-added
    state_changes:
      - framework-added

  update_rule:
    trigger_patterns:
      - user wants to update or add a rule in zeroth
      - user wants to change how something works in zeroth
    read:
      - "rules/{rule}.yml"
    actions:
      - update:
          file: "rules/{rule}.yml"
          via: PR
      - if:
          condition: rule_impacts_framework_agent
          then:
            - emit: rule-updated
    state_changes:
      - rule-updated

  fix_giskard:
    trigger_patterns:
      - user reports a giskard check is failing
      - user wants to fix or update giskard
    read:
      - "frameworks/{framework}/checklist.yml"
    actions:
      - if:
          condition: root_cause == checklist
          then:
            - update:
                file: "frameworks/{framework}/checklist.yml"
                via: PR
          else:
            - if:
                condition: root_cause == giskard
                then:
                  - update:
                      file: Malstrom/giskard:giskard.py
                      via: PR
    state_changes:
      - giskard-updated

  validate_framework:
    trigger_patterns:
      - user wants to validate a framework against its checklist
      - user asks if a framework is compliant
    read:
      - "frameworks/{name}/checklist.yml"
    actions:
      - say: "Validating {name} against checklist..."
      - propose: "Fix failed items?"
        on_confirm:
          - call: update_rule
    state_changes: []

  unknown_scenario:
    trigger_patterns:
      - any message that does not match any other scenario
    read: []
    actions:
      - propose: "Did you mean: {{closest_scenario}}?"
        on_confirm:
          - call: "{{closest_scenario}}"
      - if:
          condition: no_match
          then:
            - say: "Scenario not defined. Want me to add it?"
    state_changes: []
